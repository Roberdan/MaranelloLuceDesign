        --shell-border: #2e2e2e; --shell-text: #f0ece4; --shell-muted: #8a8680; --shell-ghost: #5a5650;
        --shell-accent: #e8c87a; --shell-accent-text: #111;
      }
      body.mn-avorio {
        --shell-bg: #f5efe4; --shell-nav: #f8f1e6; --shell-card: #fffaf4; --shell-card-2: #fffdf8;
        --shell-border: #d9cbb7; --shell-text: #241f19; --shell-muted: #7b6d5a; --shell-ghost: #8e7f6b;
        --shell-accent: #b7410e; --shell-accent-text: #fff8ef;
      }
      body.mn-colorblind { --shell-accent: #0072B2; --shell-accent-text: #fff; }
      body.mn-sugar {
        --shell-bg: #f4f4f6; --shell-nav: #fff; --shell-card: #fff; --shell-card-2: #fff;
        --shell-border: #d8d8de; --shell-text: #111; --shell-muted: #666; --shell-ghost: #888;
        --shell-accent: #111; --shell-accent-text: #fff;
      }
      body.mn-navy {
        --shell-bg: #060d1a; --shell-nav: #0b1424; --shell-card: #0f1c30; --shell-card-2: #142238;
        --shell-border: #1e2f48; --shell-text: #e8ecf4; --shell-muted: #8898b8; --shell-ghost: #586888;
        --shell-accent: #C9A227; --shell-accent-text: #060d1a;
      }

      #pmo-navbar .mn-header-shell__actions--segmented,
      #pmo-navbar .mn-header-shell__actions--cluster { border-color: var(--shell-border); border-radius: 14px; background: var(--shell-card); box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 4%, transparent); }
      #pmo-navbar .mn-header-shell__action { min-width: 48px; min-height: 48px; border-radius: 10px; color: var(--shell-muted); }
      #pmo-navbar .mn-header-shell__action:hover { background: color-mix(in srgb, var(--shell-card-2) 92%, var(--shell-accent) 8%); color: var(--shell-text); }
      #pmo-navbar .mn-header-shell__action--active { background: color-mix(in srgb, var(--shell-accent) 20%, transparent); color: var(--shell-accent); }
      #pmo-navbar .mn-header-shell__action:disabled { opacity: 0.35; cursor: not-allowed; }
      #pmo-navbar .mn-header-shell__icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
      #pmo-navbar .mn-header-shell__search { width: 100%; min-width: 0; min-height: 52px; padding: 8px 12px; gap: 12px; border-color: var(--shell-border); border-radius: 14px; background: var(--shell-card); }

      .pmo-sb-title { font-family: var(--font-display); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--mn-text-muted); margin: 0 0 0.625rem 0.25rem; }
      .pmo-prog { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.5rem; border-radius: var(--radius-md); border: none; background: transparent; width: 100%; text-align: left; color: var(--mn-text); cursor: pointer; margin-bottom: 1px; }
      .pmo-prog:hover { background: var(--mn-surface-sunken); }
      .pmo-prog.is-active { background: var(--mn-surface-sunken); }
      .pmo-prog:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; border-radius: var(--radius-md); }

      .pmo-view { padding: 1.25rem; }
      .pmo-sec { font-family: var(--font-display); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--mn-accent); margin: 0 0 0.75rem; }
      .pmo-card { background: var(--mn-surface-raised); border: 1px solid var(--mn-border); border-radius: var(--radius-md); padding: 1.25rem; margin-bottom: 1.25rem; }

      .pmo-chart-wrap canvas { width: 100% !important; height: 100% !important; }

      /* ── Detail panel ────────────────────────────────────── */
      #pmo-detail { overflow: hidden; border-left: 1px solid var(--mn-border); background: var(--mn-surface); }

      .pmo-xbtn { font-size: 0.875rem; line-height: 1; padding: 6px 10px; border: 1px solid var(--mn-border); border-radius: var(--radius-md); background: transparent; color: var(--mn-text-muted); cursor: pointer; min-height: 28px; font-family: var(--font-mono); }
      .pmo-xbtn:hover { border-color: var(--mn-accent); color: var(--mn-accent); }
      .pmo-xbtn:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: 2px; }
      .pmo-tabs { display: flex; border-bottom: 1px solid var(--mn-border); margin-bottom: 1rem; overflow-x: auto; scrollbar-width: none; }
      .pmo-tabs::-webkit-scrollbar { display: none; }
      .pmo-tabbtn { font-family: var(--font-body); font-size: 0.78rem; padding: 7px 11px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--mn-text-muted); cursor: pointer; white-space: nowrap; margin-bottom: -1px; min-height: 36px; }
      .pmo-tabbtn:hover { color: var(--mn-text); }
      .pmo-tabbtn.is-active { color: var(--mn-accent); border-bottom-color: var(--mn-accent); }
      .pmo-tabbtn:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
      .pmo-tabp { display: none; }
      .pmo-tabp.is-active { display: block; }
      .pmo-field { margin-bottom: 0.875rem; }
      .pmo-fl { font-family: var(--font-mono); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mn-text-muted); display: block; margin-bottom: 3px; }
      .pmo-fv { font-family: var(--font-body); font-size: 0.875rem; color: var(--mn-text); }
      .pmo-pbwrap { height: 6px; background: var(--mn-border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
      .pmo-pb { height: 100%; border-radius: 3px; background: var(--mn-accent); }
      .pmo-placeholder { padding: 2rem 1rem; text-align: center; color: var(--mn-text-muted); font-size: 0.875rem; border: 2px dashed var(--mn-border); border-radius: var(--radius-md); }

      /* ── Badges ──────────────────────────────────────────── */
      .pmo-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 10px; font-weight: 600; border: 1px solid currentColor; }
      .pmo-badge--ok     { color: var(--mn-signal-ok); }
      .pmo-badge--warn   { color: var(--mn-signal-warning); }
      .pmo-badge--danger { color: var(--mn-signal-danger); }
      .pmo-badge--info   { color: var(--mn-info); }
      .pmo-badge--muted  { color: var(--mn-text-muted); }

      /* ── Utility ─────────────────────────────────────────── */
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
      @media (max-width: 768px) { #pmo-sidebar { display: none; } #pmo-app, #pmo-app.has-detail { grid-template-columns: 1fr; } }
    }
  </style>
</head>

    ];

    /* ── Helpers ───────────────────────────────────────────── */
    function esc(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    }

    function bdg(val) {
      var v = String(val || '');
      var lv = v.toLowerCase();
      var cls = 'pmo-badge--muted';
      if (lv === 'on track' || lv === 'complete' || lv === 'closed' || lv === 'low' || lv === 'ok') cls = 'pmo-badge--ok';
      else if (lv === 'at risk' || lv === 'medium' || lv === 'monitor' || lv === 'active' || lv === 'starting') cls = 'pmo-badge--warn';
      else if (lv === 'behind' || lv === 'high' || lv === 'blocked' || lv === 'open' || lv === 'escalated' || lv === 'critical') cls = 'pmo-badge--danger';
      else if (lv === 'completed' || lv === 'info') cls = 'pmo-badge--info';
      return '<span class="pmo-badge ' + cls + '">' + esc(v) + '</span>';
    }

    function fld(label, valueHtml) {
      return '<div class="pmo-field"><span class="pmo-fl">' + esc(label) + '</span><div class="pmo-fv">' + valueHtml + '</div></div>';
    }

    function pbr(pct) {
      var n = Math.max(0, Math.min(100, Number(pct) || 0));
      return '<div class="pmo-pbwrap" role="progressbar" aria-valuenow="' + n + '" aria-valuemin="0" aria-valuemax="100" aria-label="Progress ' + n + '%"><div class="pmo-pb" style="width:' + n + '%;"></div></div><span style="font-family:var(--font-mono);font-size:0.75rem;color:var(--mn-text-muted)">' + n + '%</span>';
    }

    function filterByProg(arr) {
      if (!selectedProg) return arr;
      return arr.filter(function (r) { return r._pid === selectedProg; });
    }

    function icon(name) {
      return (M.icons && typeof M.icons[name] === 'function') ? M.icons[name]() : '';
    }

    /* ── Sidebar ───────────────────────────────────────────── */
    function buildSidebar() {
      PROGRAMS.forEach(function (p) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pmo-prog' + (p.id === '' ? ' is-active' : '');
        btn.setAttribute('role', 'listitem');
        btn.setAttribute('aria-pressed', p.id === '' ? 'true' : 'false');
        btn.setAttribute('data-pid', p.id);
        var inner = '<span class="pmo-dot" style="background:' + p.dotColor + ';" aria-hidden="true"></span><span class="pmo-pi">';
        inner += '<span class="pmo-pname">' + p.label + '</span>';
        if (p.id) {
          inner += '<span class="pmo-pmeta">' + p.budget + ' \u2014 ' + p.status + '</span>';
          inner += '<div class="pmo-bwrap" role="progressbar" aria-valuenow="' + p.pct + '" aria-valuemin="0" aria-valuemax="100" aria-label="' + p.label + ' progress ' + p.pct + '%">';
          inner += '<div class="pmo-bbar" style="width:' + p.pct + '%;background:' + p.dotColor + ';"></div></div>';
        }
        inner += '</span>';
        btn.innerHTML = inner;
        btn.addEventListener('click', function () { applyProgFilter(p.id); });
        progList.appendChild(btn);
      });
    }

    function applyProgFilter(pid) {
      selectedProg = pid;
      var btns = progList.querySelectorAll('.pmo-prog');
      for (var i = 0; i < btns.length; i++) {
        var active = btns[i].getAttribute('data-pid') === pid;
        if (active) { btns[i].classList.add('is-active'); } else { btns[i].classList.remove('is-active'); }
        btns[i].setAttribute('aria-pressed', active ? 'true' : 'false');
      }
      if (headerCtrl && headerCtrl.setFilter) {
        headerCtrl.setFilter('program', [pid || 'all']);
      }
      showView(currentView);
    }

    /* ── Header (mn-header-shell) ──────────────────────────── */
    function syncViewButtons() {
      VIEW_IDS.forEach(function (id) {
        var btn = document.querySelector('[data-header-shell-action-id="' + id + '"]');
        if (!btn) return;
        if (id === currentView) { btn.classList.add('mn-header-shell__action--active'); }
        else { btn.classList.remove('mn-header-shell__action--active'); }
      });
    }

    function mountHeader() {
      var filterGroups = [
        {
          id: 'program', label: 'Program',
          options: [
            { id: 'all',     label: 'All Programs'    },
            { id: 'quantum', label: 'Quantum Platform' },
            { id: 'nimbus',  label: 'Nimbus Migration' },
            { id: 'helios',  label: 'Helios 360'       },
            { id: 'cobalt',  label: 'Cobalt Data Lake'  },
            { id: 'fortis',  label: 'Fortis Security'  }
          ]
        }
      ];

      var host = document.createElement('mn-header-shell');
      host.config = {
        ariaLabel: 'ConvergIO Programs navigation',
        sections: [
          { type: 'brand', label: 'ConvergIO Programs', logoSrc: '../src/assets/favicon.svg', logoAlt: 'ConvergIO mark', href: './index.html' },
          {
            type: 'actions', role: 'pre', presentation: 'segmented',
            items: [
              { id: 'timeline',  label: 'Timeline',  icon: icon('gantt'),         active: true },
              { id: 'portfolio', label: 'Portfolio', icon: icon('table')                       },
              { id: 'resources', label: 'Resources', icon: icon('capacity')                    },
              { id: 'risks',     label: 'Risks',     icon: icon('shield')                      }
            ]
          },
          {
            type: 'search',
            placeholder: 'Search programs, tasks, risks... \u2318K',
            shortcut: '\u2318K',
            filterButtonLabel: 'Program',
            filters: filterGroups
          },
          {
            type: 'actions', role: 'post', presentation: 'cluster',
            items: [
              { id: 'alerts', title: 'Alerts (3)',  icon: icon('bellDot') || icon('bell') },
              { id: 'report', title: 'Export Report', icon: icon('report')               }
            ]
          },
          { type: 'divider' },
          { type: 'theme' },
          { type: 'profile', name: 'Jennifer Walsh' }
        ],
        callbacks: {
          onAction: function (payload) {
            if (VIEW_IDS.indexOf(payload.id) !== -1) {
              currentView = payload.id;
              syncViewButtons();
              closeDetail();
              doRender(currentView);
            }
            if (payload.id === 'alerts') {
              if (M.commandPalette) M.commandPalette({ placeholder: 'Active alerts', items: [
                { label: 'ALERT: Cobalt cloud cost overrun approaching threshold', action: function () { applyProgFilter('cobalt'); } },
                { label: 'ALERT: Nimbus data migration at risk - 18% progress',   action: function () { applyProgFilter('nimbus'); } },
                { label: 'ALERT: R-006 GDPR compliance gap requires immediate action', action: function () { currentView = 'risks'; syncViewButtons(); doRender('risks'); } }
              ]});
            }
            if (payload.id === 'report') {
              if (M.commandPalette) M.commandPalette({ placeholder: 'Export report', items: [
                { label: 'Export: Portfolio Summary (PDF)'  },
                { label: 'Export: Risk Register (CSV)'      },
                { label: 'Export: Gantt Timeline (PNG)'     },
                { label: 'Export: Resource Utilization (XLSX)' }
              ]});
            }
          },
          onSearch: function (payload) {
            if ((payload.query || '').toLowerCase().indexOf('cmd') !== -1 || payload.triggerKey === 'k') {
              openPalette();
            }
          },
          onFilter: function (payload) {
            if (payload.groupId === 'program') {
              var val = (payload.values && payload.values[0]) || 'all';
              applyProgFilter(val === 'all' ? '' : val);
            }
          }
        }
      };
      navbar.textContent = '';
      navbar.appendChild(host);
      headerCtrl = host;

      var ready = (typeof host.whenReady === 'function') ? host.whenReady() : Promise.resolve();
      ready.then(function () {
        if (!host.isConnected) return;
        syncViewButtons();
      });
    }

    /* ── View switching ────────────────────────────────────── */
    function showView(viewId) {
      currentView = viewId;
      syncViewButtons();
      closeDetail();
      if (cleanupFn) { try { cleanupFn(); } catch (_) {} cleanupFn = null; }
      if (M.StateScaffold) {
        var scaffold = new M.StateScaffold(mainEl, { state: 'loading' });
        setTimeout(function () {
          scaffold.destroy();
          mainEl.innerHTML = '';
          cleanupFn = doRender(viewId) || null;
        }, 400);
      } else {
        mainEl.innerHTML = '';
        cleanupFn = doRender(viewId) || null;
      }
    }

    function doRender(viewId) {
      if (cleanupFn) { try { cleanupFn(); } catch (_) {} cleanupFn = null; }
      mainEl.innerHTML = '';
      if (viewId === 'timeline')  return renderTimeline();
      if (viewId === 'portfolio') return renderPortfolio();
      if (viewId === 'resources') return renderResources();
      if (viewId === 'risks')     return renderRisks();
    }

    /* ── VIEW: Timeline ────────────────────────────────────── */
    function renderTimeline() {
      mainEl.innerHTML =
        '<div class="pmo-view">' +
          '<h2 class="pmo-sec">Program Health</h2>' +
          '<div id="pmo-strip" class="pmo-strip-wrap"></div>' +
          '<h2 class="pmo-sec">Program Timeline</h2>' +
          '<div id="pmo-gantt" class="pmo-gantt-wrap"></div>' +
        '</div>';

      M.dashboardStrip('pmo-strip', {
        ariaLabel: 'Program health instrument strip',
        zones: [
          {
            type: 'gauge', label: 'PROGRAM HEALTH', size: 'sm',
            gaugeConfig: {
              value: 82, max: 100, colorMode: 'higher-better',
              ticks: 10, subticks: 5, startAngle: -225, endAngle: 45, showNeedle: true,
              numbers: [0, 25, 50, 75, 100],
              complications: {
                centerValue: '82', centerUnit: '%', centerLabel: 'HEALTH',
                arcBar: { labelLeft: '0', labelRight: '100' },
                statusLed: { label: 'ON TRACK' }
              }
            }
          },
          {
            type: 'board', title: 'PORTFOLIO STATUS',
            stats: [
              { label: 'ACTIVE',   value: 8 },
              { label: 'ON SCHED', value: 5 },
              { label: 'BEHIND',   value: 2 },
              { label: 'BLOCKED',  value: 1 }
            ]
          },
          {
            type: 'trend', title: 'BURN RATE / UTIL',
            items: [
              { label: 'BURN RATE', value: 68, data: [42, 48, 53, 58, 62, 68] },
              { label: 'RESOURCE',  value: 76, data: [60, 63, 68, 71, 74, 76] }
            ]
          }
        ]
      });

      var tasks = selectedProg ? ALL_GANTT.filter(function (t) { return t.id === selectedProg; }) : ALL_GANTT;
      var ganttWrap = document.getElementById('pmo-gantt');
      if (M.gantt && ganttWrap && tasks.length) {
        M.gantt(ganttWrap, tasks, {
          onClick: function (task) { openDetail({ type: 'task', name: task.title, task: task }); }
        });
      }
    }

    /* ── VIEW: Portfolio ───────────────────────────────────── */
    function renderPortfolio() {
      mainEl.innerHTML =
        '<div class="pmo-view">' +
          '<h2 class="pmo-sec">Portfolio Overview</h2>' +
          '<div id="pmo-ptable"></div>' +
        '</div>';

      var tbl = M.dataTable('pmo-ptable', {
        ariaLabel: 'Program portfolio overview',
        stickyHeader: true,
        stripedRows: true,
        columns: [
          { key: 'program',   label: 'Program',    type: 'text',     sortable: true                        },
          { key: 'owner',     label: 'PM',         type: 'text',     sortable: true                        },
          { key: 'status',    label: 'Status',     type: 'badge',    sortable: true,  filterable: true      },
          { key: 'budget',    label: 'Budget',     type: 'text',     sortable: false, align: 'right'        },
          { key: 'spent',     label: 'Spent',      type: 'text',     sortable: false, align: 'right'        },
          { key: 'remaining', label: 'Remaining',  type: 'text',     sortable: false, align: 'right'        },
          { key: 'risk',      label: 'Risk',       type: 'badge',    sortable: true,  filterable: true      },
          { key: 'progress',  label: 'Progress',   type: 'progress'                                        }
        ],
        data: filterByProg(PORTFOLIO),
        onRowClick: function (row) { openDetail({ type: 'program', name: row.program, row: row }); }
      });
      return function () { if (tbl && tbl.destroy) tbl.destroy(); };
    }

    /* ── VIEW: Resources ───────────────────────────────────── */
    function renderResources() {
      mainEl.innerHTML =
        '<div class="pmo-view">' +
          '<h2 class="pmo-sec">Resource Utilization</h2>' +
          '<div class="pmo-gauge-grid">' +
            '<div class="pmo-gc" role="group" aria-label="Engineering utilization">' +
              '<canvas id="pmo-g-eng" width="200" height="200" role="img" aria-label="Engineering resource utilization at 91 percent, high"></canvas>' +
              '<span class="sr-only">Engineering: 91% utilized. High utilization — action required.</span>' +
              '<span class="pmo-glabel">Engineering</span>' +
            '</div>' +
            '<div class="pmo-gc" role="group" aria-label="Design utilization">' +
              '<canvas id="pmo-g-des" width="200" height="200" role="img" aria-label="Design resource utilization at 67 percent, medium"></canvas>' +
              '<span class="sr-only">Design: 67% utilized. Medium utilization.</span>' +
              '<span class="pmo-glabel">Design</span>' +
            '</div>' +
            '<div class="pmo-gc" role="group" aria-label="QA utilization">' +
              '<canvas id="pmo-g-qa"  width="200" height="200" role="img" aria-label="QA resource utilization at 45 percent, capacity available"></canvas>' +
              '<span class="sr-only">QA: 45% utilized. Available capacity.</span>' +
              '<span class="pmo-glabel">QA</span>' +
            '</div>' +
          '</div>' +
          '<h2 class="pmo-sec">Budget Allocation by Program</h2>' +
          '<div class="pmo-card">' +
            '<div class="pmo-chart-wrap">' +
              '<canvas id="pmo-bchart" role="img" aria-label="Bar chart: budget by program. Quantum $2.1M, Nimbus $3.4M, Helios $1.8M, Cobalt $950K, Fortis $1.2M"></canvas>' +
              '<span class="sr-only">Budget allocation: Quantum Platform $2,100K, Nimbus Migration $3,400K, Helios 360 $1,800K, Cobalt Data Lake $950K, Fortis Security $1,200K.</span>' +
            '</div>' +
          '</div>' +
        '</div>';

      [
        { id: 'pmo-g-eng', value: 91, label: 'ENGINEERING', led: 'HIGH UTIL'  },
        { id: 'pmo-g-des', value: 67, label: 'DESIGN',      led: 'MED UTIL'   },
        { id: 'pmo-g-qa',  value: 45, label: 'QA',          led: 'OK'         }
      ].forEach(function (gc) {
        M.createGauge({
          target: '#' + gc.id,
          size: 'md',
          config: {
            value: gc.value, max: 100, colorMode: 'lower-better',
            ticks: 10, subticks: 5, startAngle: -225, endAngle: 45, showNeedle: true,
            numbers: [0, 25, 50, 75, 100],
            complications: {
              centerValue: String(gc.value), centerUnit: '%', centerLabel: gc.label,
              arcBar: { labelLeft: '0', labelRight: '100' },
              statusLed: { label: gc.led }
            }
          }
        });
      });

      var bc = document.getElementById('pmo-bchart');
      if (bc && M.charts && M.charts.barChart) {
        M.charts.barChart(bc, [
          { label: 'Quantum', value: 2100 },
          { label: 'Nimbus',  value: 3400 },
          { label: 'Helios',  value: 1800 },
          { label: 'Cobalt',  value: 950  },
          { label: 'Fortis',  value: 1200 }
        ], { showLabels: true, showValues: true, animate: true, responsive: true });
      }
    }

    /* ── VIEW: Risks ───────────────────────────────────────── */
    function renderRisks() {
      mainEl.innerHTML =
        '<div class="pmo-view">' +
          '<h2 class="pmo-sec">Risk Register</h2>' +
          '<div id="pmo-rtable"></div>' +
        '</div>';

      var tbl = M.dataTable('pmo-rtable', {
        ariaLabel: 'Risk register',
        stickyHeader: true,
        stripedRows: true,
        columns: [
          { key: 'id',          label: 'ID',          type: 'text',  sortable: true                   },
          { key: 'description', label: 'Description', type: 'text'                                    },
          { key: 'program',     label: 'Program',     type: 'text',  sortable: true, filterable: true },
          { key: 'impact',      label: 'Impact',      type: 'badge', sortable: true, filterable: true },
          { key: 'prob',        label: 'Probability', type: 'text',  sortable: true, align: 'right'   },
          { key: 'owner',       label: 'Owner',       type: 'text',  sortable: true                   },
          { key: 'status',      label: 'Status',      type: 'badge', sortable: true, filterable: true }
        ],
        data: filterByProg(RISKS),
        onRowClick: function (row) { openDetail({ type: 'risk', name: row.id + ': ' + row.description, row: row }); }
      });
      return function () { if (tbl && tbl.destroy) tbl.destroy(); };
    }

    /* ── Detail panel ──────────────────────────────────────── */
    function openDetail(data) {
      var d   = data || {};
      var row = d.row || d.task || {};

      detailEl.innerHTML =
        '<div class="pmo-dt">' +
          '<div class="pmo-dth">' +
            '<h2 class="pmo-dttitle" id="pmo-dt-title">' + esc(d.name || 'Detail') + '</h2>' +
            '<button type="button" class="pmo-xbtn" id="pmo-dt-close" aria-label="Close detail panel">X</button>' +
          '</div>' +
          '<div class="pmo-tabs" role="tablist" aria-label="Detail sections">' +
            '<button type="button" class="pmo-tabbtn is-active" role="tab" aria-selected="true"  aria-controls="pmo-tp-details"  id="pmo-th-details">Details</button>'  +
            '<button type="button" class="pmo-tabbtn"           role="tab" aria-selected="false" aria-controls="pmo-tp-tasks"    id="pmo-th-tasks">Tasks</button>'     +
            '<button type="button" class="pmo-tabbtn"           role="tab" aria-selected="false" aria-controls="pmo-tp-res"      id="pmo-th-res">Resources</button>'   +
            '<button type="button" class="pmo-tabbtn"           role="tab" aria-selected="false" aria-controls="pmo-tp-risks"    id="pmo-th-risks">Risks</button>'     +
            '<button type="button" class="pmo-tabbtn"           role="tab" aria-selected="false" aria-controls="pmo-tp-hist"     id="pmo-th-hist">History</button>'    +
          '</div>' +
          '<div id="pmo-tp-details" class="pmo-tabp is-active" role="tabpanel" aria-labelledby="pmo-th-details">' + buildDetailTab(d, row) + '</div>' +
          '<div id="pmo-tp-tasks"   class="pmo-tabp"           role="tabpanel" aria-labelledby="pmo-th-tasks"><div class="pmo-placeholder">Task breakdown linked to project management system.</div></div>' +
          '<div id="pmo-tp-res"     class="pmo-tabp"           role="tabpanel" aria-labelledby="pmo-th-res"><div class="pmo-placeholder">Resource assignments and utilization details.</div></div>' +
          '<div id="pmo-tp-risks"   class="pmo-tabp"           role="tabpanel" aria-labelledby="pmo-th-risks"><div class="pmo-placeholder">Associated risks and mitigation actions.</div></div>' +
          '<div id="pmo-tp-hist"    class="pmo-tabp"           role="tabpanel" aria-labelledby="pmo-th-hist"><div class="pmo-placeholder">Audit trail and change history.</div></div>' +
        '</div>';

      var tbs = detailEl.querySelectorAll('.pmo-tabbtn');
      for (var ti = 0; ti < tbs.length; ti++) {
        tbs[ti].addEventListener('click', function (e) {
          var pid = e.currentTarget.getAttribute('aria-controls');
          for (var tj = 0; tj < tbs.length; tj++) {
            tbs[tj].classList.remove('is-active');
            tbs[tj].setAttribute('aria-selected', 'false');
          }
          e.currentTarget.classList.add('is-active');
          e.currentTarget.setAttribute('aria-selected', 'true');
          var panels = detailEl.querySelectorAll('.pmo-tabp');
          for (var tp = 0; tp < panels.length; tp++) {
            if (panels[tp].id === pid) { panels[tp].classList.add('is-active'); } else { panels[tp].classList.remove('is-active'); }
          }
        });
      }

      var closeBtn = document.getElementById('pmo-dt-close');
      if (closeBtn) closeBtn.addEventListener('click', closeDetail);

      detailEl.setAttribute('aria-hidden', 'false');
      appEl.classList.add('has-detail');
    }

    function closeDetail() {
      detailEl.setAttribute('aria-hidden', 'true');
      detailEl.innerHTML = '';
      appEl.classList.remove('has-detail');
    }

    function buildDetailTab(d, row) {
      if (d.type === 'risk') {
        return fld('Risk ID',     esc(row.id          || '-')) +
               fld('Description', esc(row.description || '-')) +
               fld('Program',     esc(row.program     || '-')) +
               fld('Impact',      bdg(row.impact))             +
               fld('Probability', esc(row.prob        || '-')) +
               fld('Owner',       esc(row.owner       || '-')) +
               fld('Status',      bdg(row.status));
      }
      if (d.type === 'program') {
        return fld('Program',   esc(row.program   || '-')) +
               fld('PM Owner',  esc(row.owner     || '-')) +
               fld('Status',    bdg(row.status))           +
               fld('Budget',    esc(row.budget    || '-')) +
               fld('Spent',     esc(row.spent     || '-')) +
               fld('Remaining', esc(row.remaining || '-')) +
               fld('Risk',      bdg(row.risk))             +
               fld('Progress',  pbr(row.progress ? row.progress.value : 0));
      }
      var task = d.task || {};
      return fld('Task',     esc(task.title   || d.name || '-')) +
             fld('Program',  esc(task.program || '-'))           +
             fld('Owner',    esc(task.owner   || '-'))           +
             fld('Status',   bdg(task.status  || '-'))           +
             fld('Progress', pbr(task.progress || 0))            +
             fld('Start',    esc(task.start   || '-'))           +
             fld('End',      esc(task.end     || '-'));
    }

    /* ── Command palette ───────────────────────────────────── */
    function openPalette() {
      if (!M.commandPalette) return;
      M.commandPalette({
        placeholder: 'Search programs, views, commands...',
        items: [
          { label: 'View: Timeline',           action: function () { showView('timeline');  } },
          { label: 'View: Portfolio',          action: function () { showView('portfolio'); } },
          { label: 'View: Resources',          action: function () { showView('resources'); } },
          { label: 'View: Risks',              action: function () { showView('risks');     } },
          { label: 'Filter: All Programs',     action: function () { applyProgFilter('');         } },
          { label: 'Filter: Quantum Platform', action: function () { applyProgFilter('quantum');  } },
          { label: 'Filter: Nimbus Migration', action: function () { applyProgFilter('nimbus');   } },
          { label: 'Filter: Helios 360',       action: function () { applyProgFilter('helios');   } },
          { label: 'Filter: Cobalt Data Lake', action: function () { applyProgFilter('cobalt');   } },
          { label: 'Filter: Fortis Security',  action: function () { applyProgFilter('fortis');   } },
          { label: 'Theme: Nero',              action: function () { M.setTheme('nero');       } },
          { label: 'Theme: Editorial',         action: function () { M.setTheme('editorial');  } },
          { label: 'Theme: Avorio',            action: function () { M.setTheme('avorio');     } },
          { label: 'Theme: Colorblind',        action: function () { M.setTheme('colorblind'); } },
          { label: 'Theme: Sugar',             action: function () { M.setTheme('sugar');      } },
          { label: 'Theme: Navy',              action: function () { M.setTheme('navy');       } }
        ]
      });
    }

    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openPalette(); }
    });

    /* ── Bootstrap ─────────────────────────────────────────── */
    buildSidebar();
    mountHeader();
    showView('timeline');
  })();
  </script>
</body>
</html>

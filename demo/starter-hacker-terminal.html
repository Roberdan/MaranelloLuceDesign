<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS//CORE — Hacker Operations Center</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    /* ── Animations ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Base ── */
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--mn-surface);
      color: var(--mn-text);
      font-family: var(--font-mono);
    }

    /* ── Scanlines overlay (1% opacity) ── */
    .hk-scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.01) 2px,
        rgba(0,0,0,0.01) 4px
      );
    }

    /* ── Shell: header + body ── */
    #hk-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }
    #hk-navbar { position: sticky; top: 0; z-index: 20; }
    #hk-body {
      display: grid;
      grid-template-columns: 220px 1fr;
      overflow: hidden;
    }
    #hk-body.with-detail { grid-template-columns: 220px 1fr 380px; }

    /* ── Header shell overrides ── */
    #hk-navbar .mn-header-shell {
      background: var(--mn-surface-raised);
      border-bottom: 1px solid var(--mn-border);
      font-family: var(--font-mono);
    }
    #hk-navbar .mn-header-shell__brand {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mn-accent);
      text-shadow: 0 0 8px var(--mn-accent);
      align-items: flex-start;
    }
    #hk-navbar .mn-header-shell__brand-logo {
      width: 24px;
      height: 24px;
      filter: drop-shadow(0 0 6px color-mix(in srgb, var(--mn-accent) 50%, transparent));
    }
    #hk-navbar .mn-header-shell__actions--segmented,
    #hk-navbar .mn-header-shell__actions--cluster {
      border-color: var(--mn-border);
      border-radius: 4px;
      background: var(--mn-surface);
      box-shadow: inset 0 1px 0 color-mix(in srgb, var(--mn-accent) 5%, transparent);
    }
    #hk-navbar .mn-header-shell__action {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
      border-radius: 3px;
      min-width: 44px;
      min-height: 44px;
    }
    #hk-navbar .mn-header-shell__action:hover {
      color: var(--mn-accent);
      background: color-mix(in srgb, var(--mn-accent) 10%, transparent);
      box-shadow: 0 0 6px color-mix(in srgb, var(--mn-accent) 25%, transparent);
    }
    #hk-navbar .mn-header-shell__action--active {
      color: var(--mn-accent);
      background: color-mix(in srgb, var(--mn-accent) 14%, transparent);
      box-shadow: 0 0 8px color-mix(in srgb, var(--mn-accent) 35%, transparent);
    }
    #hk-navbar .mn-header-shell__icon svg {
      width: 16px; height: 16px;
      fill: none; stroke: currentColor;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
    }
    #hk-navbar .mn-header-shell__search {
      background: var(--mn-surface);
      border-color: var(--mn-border);
      border-radius: 4px;
      font-family: var(--font-mono);
      min-height: 44px;
    }
    #hk-navbar .mn-header-shell__search-input {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mn-text);
    }
    #hk-navbar .mn-header-shell__search-input::placeholder { color: var(--mn-text-muted); }
    #hk-navbar .mn-header-shell__shortcut {
      border-color: var(--mn-border);
      background: var(--mn-surface-sunken);
      color: var(--mn-text-muted);
      font-family: var(--font-mono);
      font-size: 0.6rem;
    }
    #hk-navbar .mn-header-shell__filters { display: none; }
    #hk-navbar .mn-header-shell__theme { padding-left: 12px; border-left-color: var(--mn-border); }
    #hk-navbar .mn-profile-trigger {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: color-mix(in srgb, var(--mn-accent) 14%, transparent);
      color: var(--mn-accent);
      border: 1px solid color-mix(in srgb, var(--mn-accent) 35%, var(--mn-border));
      box-shadow: 0 0 6px color-mix(in srgb, var(--mn-accent) 20%, transparent);
    }

    /* ── Brand subtitle + live indicator injected by JS ── */
    .hk-brand-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .hk-brand-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hk-brand-sub {
      font-family: var(--font-mono);
      font-size: 0.48rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
    }
    .hk-brand-live {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 0.48rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
    }
    .hk-brand-live__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--signal-ok);
      box-shadow: 0 0 5px var(--signal-ok);
      animation: blink 1s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* ── Sidebar threat feed ── */
    #hk-sidebar {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--mn-border);
      background: var(--mn-surface);
    }
    .hk-sidebar-inner {
      padding: 0.75rem;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .hk-feed-header {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mn-accent);
      text-shadow: 0 0 6px var(--mn-accent);
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }
    .hk-feed-header__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--mn-accent);
      animation: blink 0.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    .hk-feed {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      overflow-y: auto;
      flex: 1;
    }
    .hk-feed__entry {
      display: grid;
      grid-template-columns: 5.5rem 6px 1fr;
      gap: 0.3rem;
      align-items: start;
      font-family: var(--font-mono);
      font-size: 0.53rem;
      letter-spacing: 0.05em;
      line-height: 1.4;
      padding: 0.3rem 0.35rem;
      border-left: 2px solid transparent;
      transition: border-color 0.12s;
      cursor: default;
    }
    .hk-feed__entry:hover { border-left-color: var(--mn-accent); }
    .hk-feed__time { color: var(--mn-text-muted); white-space: nowrap; }
    .hk-feed__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-top: 3px;
      flex-shrink: 0;
    }
    .hk-feed__dot--danger  { background: var(--signal-danger);  box-shadow: 0 0 4px var(--signal-danger); }
    .hk-feed__dot--warning { background: var(--signal-warning); box-shadow: 0 0 4px var(--signal-warning); }
    .hk-feed__dot--ok      { background: var(--signal-ok);      box-shadow: 0 0 4px var(--signal-ok); }
    .hk-feed__msg { color: var(--mn-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Main ── */
    #hk-main { overflow-y: auto; height: 100%; }
    .hk-main-pad { padding: 1rem; min-height: 100%; box-sizing: border-box; }
    .hk-section-title {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
      text-shadow: 0 0 5px color-mix(in srgb, var(--mn-accent) 40%, transparent);
      margin: 1.25rem 0 0.6rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--mn-border);
    }
    .hk-section-title:first-child { margin-top: 0; }

    .hk-card {
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .hk-card:hover {
      border-color: var(--mn-accent);
      box-shadow: 0 0 8px color-mix(in srgb, var(--mn-accent) 18%, transparent);
    }
    .hk-card__title {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mn-text-muted);
      margin: 0 0 0.6rem;
    }
    .hk-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .hk-row--3 { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 960px) { .hk-row { grid-template-columns: 1fr; } .hk-row--3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .hk-row--3 { grid-template-columns: 1fr; } #hk-sidebar { display: none; } }

    /* ── Gauge ── */
    .hk-gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .hk-gauge-canvas-sm { width: 120px; height: 120px; }

    /* ── Sparkline ── */
    .hk-spark-wrap { position: relative; width: 100%; height: 80px; }
    .hk-spark-wrap canvas { width: 100%; height: 100%; }

    /* ── Network ── */
    .hk-network-wrap {
      width: 100%;
      height: 320px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      position: relative;
    }
    .hk-node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(7.5rem, 1fr));
      gap: 0.5rem;
      padding: 0.5rem 0;
    }
    .hk-node-card {
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      padding: 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.53rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .hk-node-card:hover { border-color: var(--mn-accent); box-shadow: 0 0 8px color-mix(in srgb, var(--mn-accent) 28%, transparent); }
    .hk-node-card__indicator { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 0.4rem; }
    .hk-node-card__label { color: var(--mn-text); }
    .hk-node-card__status { color: var(--mn-text-muted); font-size: 0.48rem; margin-top: 0.2rem; }
    .hk-node-card--danger  { border-color: var(--signal-danger); }
    .hk-node-card--warning { border-color: var(--signal-warning); }
    .hk-node-card--ok      { border-color: var(--signal-ok); }
    .hk-node-card--danger  .hk-node-card__indicator { background: var(--signal-danger);  box-shadow: 0 0 6px var(--signal-danger); }
    .hk-node-card--warning .hk-node-card__indicator { background: var(--signal-warning); box-shadow: 0 0 6px var(--signal-warning); }
    .hk-node-card--ok      .hk-node-card__indicator { background: var(--signal-ok);      box-shadow: 0 0 6px var(--signal-ok); }

    /* ── Badges ── */
    .hk-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.48rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius-sm);
      border: 1px solid currentColor;
    }
    .hk-badge--critical { color: var(--signal-danger); }
    .hk-badge--high     { color: var(--signal-warning); }
    .hk-badge--medium   { color: var(--mn-accent); }
    .hk-badge--zerod    { color: var(--signal-danger); animation: blink 1s ease-in-out infinite; }
    .hk-badge--patched  { color: var(--signal-ok); }
    .hk-badge--inprog   { color: var(--mn-accent); }

    /* ── Strip / heatmap / table containers ── */
    #hk-strip { margin-bottom: 1rem; }
    #hk-heatmap { margin-bottom: 1rem; }
    #hk-intercept-table { margin-top: 0.25rem; }

    /* ── Detail panel ── */
    .hk-detail-panel {
      display: none;
      height: 100%;
      overflow-y: auto;
      border-left: 1px solid var(--mn-border);
      background: var(--mn-surface);
    }
    #hk-body.with-detail .hk-detail-panel { display: block; }
    .hk-detail {
      padding: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.63rem;
    }
    .hk-detail__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--mn-border);
      padding-bottom: 0.5rem;
    }
    .hk-detail__id {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mn-accent);
      text-shadow: 0 0 6px var(--mn-accent);
    }
    .hk-detail__close {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      background: transparent;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      color: var(--mn-text-muted);
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      transition: border-color 0.15s, color 0.15s;
      min-height: 28px;
    }
    .hk-detail__close:hover { border-color: var(--mn-accent); color: var(--mn-accent); }
    .hk-tabs { display: flex; gap: 0.25rem; margin-bottom: 0.75rem; }
    .hk-tab-btn {
      font-family: var(--font-mono);
      font-size: 0.53rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      background: transparent;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      color: var(--mn-text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      min-height: 28px;
    }
    .hk-tab-btn.is-active,
    .hk-tab-btn:hover { border-color: var(--mn-accent); color: var(--mn-accent); }
    .hk-tab-panel { display: none; }
    .hk-tab-panel.is-active { display: block; }
    .hk-detail__field {
      display: grid;
      grid-template-columns: 8rem 1fr;
      gap: 0.25rem;
      margin-bottom: 0.4rem;
      font-size: 0.58rem;
    }
    .hk-detail__label { color: var(--mn-text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .hk-detail__value { color: var(--mn-text); }
    .hk-trace-path {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--mn-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
    .hk-trace-path .hk-trace-node {
      color: var(--mn-accent);
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-sm);
      margin: 0 0.12rem;
    }
    .hk-trace-arrow { color: var(--mn-text-muted); margin: 0 0.2rem; }

    @media (max-width: 1100px) {
      #hk-navbar .mn-header-shell__shortcut { display: none; }
      #hk-body.with-detail { grid-template-columns: 0 1fr 340px; }
    }
  </style>
</head>
<body class="mn-nero">
  <div class="hk-scanlines" aria-hidden="true"></div>

  <div id="hk-shell">
    <header id="hk-navbar" role="banner"></header>

    <div id="hk-body">
      <!-- Sidebar: Threat Feed -->
      <aside id="hk-sidebar" aria-label="Live threat feed">
        <div class="hk-sidebar-inner">
          <div class="hk-feed-header" aria-hidden="true">
            <div class="hk-feed-header__dot"></div>
            <span>THREAT FEED // LIVE</span>
          </div>
          <nav class="hk-feed" id="hk-feed" role="list" aria-label="Live threat feed entries"></nav>
        </div>
      </aside>

      <!-- Main content -->
      <main id="hk-main" aria-label="Operations main panel"></main>

      <!-- Detail panel -->
      <aside class="hk-detail-panel" id="hk-detail-panel" aria-label="Detail panel">
        <div id="hk-detail-content"></div>
      </aside>
    </div>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script type="module" src="../packages/elements/dist/wc/mn-header-shell.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      var navbarEl     = document.getElementById('hk-navbar');
      var bodyEl       = document.getElementById('hk-body');
      var mainEl       = document.getElementById('hk-main');
      var feedEl       = document.getElementById('hk-feed');
      var detailPanel  = document.getElementById('hk-detail-panel');
      var detailContent = document.getElementById('hk-detail-content');

      /* ── Theme restore ── */
      (function () {
        try {
          var saved = localStorage.getItem('mn-theme');
          if (saved) M.setTheme(saved);
          else M.setTheme('nero');
        } catch (_) {}
      }());

      /* ── Icon helpers ── */
      function icon(name) {
        if (!M.icons || typeof M.icons[name] !== 'function') return '';
        return M.icons[name]();
      }

      function signalSvg() {
        return '<svg viewBox="0 0 18 18" width="18" height="18" fill="none" aria-hidden="true"><path d="M2 9a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M5 9a4 4 0 0 1 8 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M7.5 9a1.5 1.5 0 0 1 3 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="9" cy="9" r="1" fill="currentColor"/></svg>';
      }
      function shieldSvg() {
        return '<svg viewBox="0 0 18 18" width="18" height="18" fill="none" aria-hidden="true"><path d="M9 2 3 5v4.5C3 13 5.7 15.4 9 16.5c3.3-1.1 6-3.5 6-7V5L9 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6.5 9l1.8 1.8L12 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      function lockSvg() {
        return '<svg viewBox="0 0 18 18" width="18" height="18" fill="none" aria-hidden="true"><rect x="3.5" y="8" width="11" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M6 8V5.5a3 3 0 0 1 6 0V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="12" r="1.2" fill="currentColor"/></svg>';
      }
      function barsSvg() {
        return '<svg viewBox="0 0 18 18" width="18" height="18" fill="none" aria-hidden="true"><rect x="1" y="11" width="3" height="6" rx="1" fill="currentColor" opacity="0.45"/><rect x="5.5" y="8" width="3" height="9" rx="1" fill="currentColor" opacity="0.65"/><rect x="10" y="5" width="3" height="12" rx="1" fill="currentColor" opacity="0.82"/><rect x="14.5" y="2" width="2.5" height="15" rx="1" fill="currentColor"/></svg>';
      }
      function defconSvg() {
        return '<svg viewBox="0 0 62 16" width="62" height="16" aria-hidden="true"><rect x="0.5" y="0.5" width="61" height="15" rx="2.5" stroke="currentColor" stroke-width="1"/><text x="31" y="11.5" text-anchor="middle" font-size="7.5" font-family="monospace" fill="currentColor" font-weight="700" letter-spacing="0.5">DEFCON 3</text></svg>';
      }
      function streamSvg() {
        return '<svg viewBox="0 0 18 18" width="18" height="18" fill="none" aria-hidden="true"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="11.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1.5" y="11.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="11.5" y="11.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>';
      }

      /* ─────────────────────────────────────────────────
         DATA
      ───────────────────────────────────────────────── */
      var FEED_ENTRIES = [
        { time: '14:32:07', sev: 'danger',  msg: 'INTRUSION ATTEMPT // NODE SIGMA-9 // BLOCKED' },
        { time: '14:31:52', sev: 'danger',  msg: 'EXFIL DETECTED // PORT 8443 // TRACING' },
        { time: '14:31:41', sev: 'ok',      msg: 'CERT ROTATION // CLUSTER OMEGA // COMPLETE' },
        { time: '14:30:18', sev: 'danger',  msg: 'ZERO-DAY CVE-2026-4471 // PATCHING IN PROGRESS' },
        { time: '14:29:55', sev: 'warning', msg: 'LATERAL MOVE // SUBNET 10.42.X // CONTAINED' },
        { time: '14:29:03', sev: 'warning', msg: 'BEACON SIGNAL // DARK RELAY // INTERCEPTED' },
        { time: '14:28:44', sev: 'ok',      msg: 'CRYPTO HANDSHAKE // QUANTUM CHANNEL // VERIFIED' },
        { time: '14:27:12', sev: 'danger',  msg: 'ANOMALY SCORE 0.94 // SECTOR 7G // ESCALATED' },
        { time: '14:26:38', sev: 'warning', msg: 'PORT SCAN // NODE ECHO-MESH // LOGGED' },

              { label: 'BETA',    cells: [{ value: 50,  label: '50'  }, { value: 90,  label: '90'  }, { value: 580, label: '580' }, { value: 820, label: '820' }, { value: 700, label: '700' }, { value: 270, label: '270' }] },
              { label: 'GAMMA',   cells: [{ value: 110, label: '110' }, { value: 200, label: '200' }, { value: 730, label: '730' }, { value: 950, label: '950' }, { value: 870, label: '870' }, { value: 390, label: '390' }] },
              { label: 'DELTA',   cells: [{ value: 30,  label: '30'  }, { value: 60,  label: '60'  }, { value: 420, label: '420' }, { value: 680, label: '680' }, { value: 590, label: '590' }, { value: 180, label: '180' }] },
              { label: 'EPSILON', cells: [{ value: 140, label: '140' }, { value: 310, label: '310' }, { value: 860, label: '860' }, { value: 990, label: '990' }, { value: 920, label: '920' }, { value: 440, label: '440' }] },
              { label: 'ZETA',    cells: [{ value: 70,  label: '70'  }, { value: 150, label: '150' }, { value: 500, label: '500' }, { value: 750, label: '750' }, { value: 630, label: '630' }, { value: 240, label: '240' }] },
              { label: 'ETA',     cells: [{ value: 200, label: '200' }, { value: 380, label: '380' }, { value: 780, label: '780' }, { value: 880, label: '880' }, { value: 810, label: '810' }, { value: 350, label: '350' }] },
              { label: 'THETA',   cells: [{ value: 90,  label: '90'  }, { value: 170, label: '170' }, { value: 610, label: '610' }, { value: 840, label: '840' }, { value: 720, label: '720' }, { value: 290, label: '290' }] },
            ],
            onCellClick: function (row, cell, ri, ci) {
              console.log('[hacker] sector:', row.label, 'block:', TIME_BLOCKS[ci], 'volume:', cell.value);
            }
          });
        }

        var interceptTbl = null;
        if (M.dataTable) {
          interceptTbl = M.dataTable('hk-intercept-table', {
            ariaLabel: 'Network intercept log',
            stickyHeader: true,
            stripedRows: true,
            columns: [
              { key: 'ts',    label: 'TIMESTAMP',     type: 'text' },
              { key: 'src',   label: 'SOURCE IP',     type: 'text', sortable: true },
              { key: 'dst',   label: 'DEST IP',       type: 'text', sortable: true },
              { key: 'proto', label: 'PROTOCOL',      type: 'text', sortable: true },
              { key: 'size',  label: 'PAYLOAD SIZE',  type: 'text', sortable: true },
              { key: 'cls',   label: 'CLASSIFICATION',type: 'badge', sortable: true }
            ],
            data: INTERCEPT_DATA,
            onRowClick: function (row, idx) { openInterceptDetail(row, idx); }
          });
        }

        return function () {
          if (interceptTbl && interceptTbl.destroy) interceptTbl.destroy();
        };
      }

      /* ─────────────────────────────────────────────────
         DETAIL PANEL
      ───────────────────────────────────────────────── */
      function buildTracePath(raw) {
        var parts = raw.split('>>').map(function (s) { return s.replace(/^\s+|\s+$/g, ''); });
        var html = '';
        parts.forEach(function (p, i) {
          html += '<span class="hk-trace-node">' + p + '</span>';
          if (i < parts.length - 1) html += '<span class="hk-trace-arrow" aria-hidden="true">&#x25B6;</span>';
        });
        return html;
      }

      function openVulnDetail(vuln) {
        var TRACES = {
          'NETWORK':  'EXTERNAL >> RELAY-BETA >> CORE-ALPHA >> ' + vuln.system,
          'LOCAL':    'INSIDER >> LOCAL-SHELL >> ' + vuln.system,
          'ADJACENT': 'SUBNET-ADJ >> ECHO-MESH >> ' + vuln.system,
          'PHYSICAL': 'PHYSICAL-ACCESS >> USB-DROP >> ' + vuln.system,
        };
        var MITIGATION = {
          'PATCHED':       { op: 'CIPHER-3',  patch: 'v2.1.4', eta: 'DEPLOYED' },
          'IN PROGRESS':   { op: 'GHOST-7',   patch: 'v2.0.9', eta: '2026-04-02' },
          'INVESTIGATING': { op: 'PHANTOM-9', patch: 'TBD',    eta: 'UNKNOWN' },
          'ZERO-DAY':      { op: 'VECTOR-1',  patch: 'NONE',   eta: 'CRITICAL' },
        };
        var mit = MITIGATION[vuln.status] || MITIGATION['INVESTIGATING'];
        var trace = TRACES[vuln.vector] || TRACES['NETWORK'];
        var cvss = (vuln.severity === 'CRITICAL' ? '9.' : vuln.severity === 'HIGH' ? '7.' : '5.') + '3';

        detailContent.innerHTML =
          '<div class="hk-detail">' +
          '<div class="hk-detail__header">' +
            '<span class="hk-detail__id">' + vuln.cve + '</span>' +
            '<button type="button" class="hk-detail__close" id="hk-close-btn" aria-label="Close detail panel">&#x2715;</button>' +
          '</div>' +
          '<div class="hk-tabs" role="tablist" aria-label="Detail tabs">' +
            '<button type="button" class="hk-tab-btn is-active" data-tab="analysis"   role="tab" aria-selected="true"  aria-controls="hk-dt-analysis">ANALYSIS</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="trace"      role="tab" aria-selected="false" aria-controls="hk-dt-trace">TRACE</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="mitigation" role="tab" aria-selected="false" aria-controls="hk-dt-mitigation">MITIGATION</button>' +
          '</div>' +
          '<div id="hk-dt-analysis" class="hk-tab-panel is-active" role="tabpanel">' +
            field('CVE ID', vuln.cve) +
            field('SEVERITY', vuln.severity) +
            field('VECTOR', vuln.vector) +
            field('SYSTEM', vuln.system) +
            field('CVSS SCORE', cvss) +
            field('DISCOVERY', vuln.disc) +
            field('RESEARCHER', 'OPERATOR ECHO-5 // NEXUS CORE THREAT INTEL') +
            field('DESCRIPTION', 'Buffer overflow in ' + vuln.system + ' permits unauthenticated RCE via crafted ' + vuln.vector.toLowerCase() + ' packet sequence.') +
          '</div>' +
          '<div id="hk-dt-trace" class="hk-tab-panel" role="tabpanel">' +
            '<p class="hk-detail__label" style="margin-bottom:0.75rem">ATTACK PATH RECONSTRUCTION</p>' +
            '<div class="hk-trace-path" aria-label="Attack trace path">' + buildTracePath(trace) + '</div>' +
            field('T0', '14:04:11 UTC') +
            field('T1', '14:07:33 UTC') +
            field('T2', '14:09:48 UTC') +
            field('T3', '14:12:07 UTC') +
          '</div>' +
          '<div id="hk-dt-mitigation" class="hk-tab-panel" role="tabpanel">' +
            field('STATUS', vuln.status) +
            field('OPERATOR', mit.op) +
            field('PATCH VERSION', mit.patch) +
            field('ETA / STATUS', mit.eta) +
            field('PRIORITY', vuln.severity === 'CRITICAL' ? 'P0 — IMMEDIATE' : vuln.severity === 'HIGH' ? 'P1 — URGENT' : 'P2 — NORMAL') +
          '</div>' +
          '</div>';

        openDetail();
        wireDetailPanel();
      }

      function openInterceptDetail(row, idx) {
        var num = String(idx + 1);
        while (num.length < 4) num = '0' + num;
        var action = row.cls === 'MALICIOUS' ? 'BLOCKED + TRACED' : row.cls === 'SUSPICIOUS' ? 'FLAGGED FOR REVIEW' : 'LOGGED';

        detailContent.innerHTML =
          '<div class="hk-detail">' +
          '<div class="hk-detail__header">' +
            '<span class="hk-detail__id">INTERCEPT #' + num + '</span>' +
            '<button type="button" class="hk-detail__close" id="hk-close-btn" aria-label="Close detail panel">&#x2715;</button>' +
          '</div>' +
          '<div class="hk-tabs" role="tablist" aria-label="Detail tabs">' +
            '<button type="button" class="hk-tab-btn is-active" data-tab="analysis"   role="tab" aria-selected="true"  aria-controls="hk-dt-analysis">ANALYSIS</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="trace"      role="tab" aria-selected="false" aria-controls="hk-dt-trace">TRACE</button>' +
            '<button type="button" class="hk-tab-btn"           data-tab="mitigation" role="tab" aria-selected="false" aria-controls="hk-dt-mitigation">MITIGATION</button>' +
          '</div>' +
          '<div id="hk-dt-analysis" class="hk-tab-panel is-active" role="tabpanel">' +
            field('TIMESTAMP', row.ts) +
            field('SOURCE IP', row.src) +
            field('DEST IP', row.dst) +
            field('PROTOCOL', row.proto) +
            field('PAYLOAD SIZE', row.size) +
            field('CLASSIFICATION', row.cls) +
          '</div>' +
          '<div id="hk-dt-trace" class="hk-tab-panel" role="tabpanel">' +
            '<p class="hk-detail__label" style="margin-bottom:0.75rem">NETWORK PATH RECONSTRUCTION</p>' +
            '<div class="hk-trace-path" aria-label="Network trace path">' + buildTracePath(row.src + ' >> RELAY-BETA >> NEXUS-HUB >> ' + row.dst) + '</div>' +
            field('HOP COUNT', '3') +
            field('LATENCY', '4ms') +
            field('TTL', '128') +
          '</div>' +
          '<div id="hk-dt-mitigation" class="hk-tab-panel" role="tabpanel">' +
            field('ACTION TAKEN', action) +
            field('ASSIGNED TO', 'OPERATOR GHOST-7') +
            field('RULE TRIGGERED', 'IDS-RULE-' + (4400 + idx * 13)) +
            field('LOGGED AT', row.ts + ' UTC') +
          '</div>' +
          '</div>';

        openDetail();
        wireDetailPanel();
      }

      function field(label, value) {
        return '<div class="hk-detail__field">' +
          '<span class="hk-detail__label">' + label + '</span>' +
          '<span class="hk-detail__value">' + value + '</span>' +
        '</div>';
      }

      function wireDetailPanel() {
        detailContent.addEventListener('click', function (e) {
          /* Close button */
          var closeBtn = e.target.closest('#hk-close-btn');
          if (closeBtn) { closeDetail(); return; }

          /* Tab switching */
          var btn = e.target.closest('[data-tab]');
          if (!btn) return;
          var id = btn.getAttribute('data-tab');
          var panel = detailContent;
          var tabBtns = panel.querySelectorAll('[data-tab]');
          var tabPanels = panel.querySelectorAll('.hk-tab-panel');
          var i;
          for (i = 0; i < tabBtns.length; i++) {
            var active = tabBtns[i].getAttribute('data-tab') === id;
            tabBtns[i].setAttribute('aria-selected', String(active));
            if (active) tabBtns[i].classList.add('is-active');
            else tabBtns[i].classList.remove('is-active');
          }
          for (i = 0; i < tabPanels.length; i++) {
            if (tabPanels[i].id === 'hk-dt-' + id) tabPanels[i].classList.add('is-active');
            else tabPanels[i].classList.remove('is-active');
          }
        }, { once: false });
      }

      /* ─────────────────────────────────────────────────
         COMMAND PALETTE
      ───────────────────────────────────────────────── */
      function openCommandPalette() {
        if (!M.commandPalette) return;
        M.commandPalette({
          placeholder: 'QUERY NEURAL MESH...',
          items: [
            { label: 'VIEW: SIGINT — Signal Intelligence',   action: function () { switchView('sigint'); } },
            { label: 'VIEW: NETMAP — Network Topology',      action: function () { switchView('netmap'); } },
            { label: 'VIEW: VULNSCAN — Vulnerability Scan',  action: function () { switchView('vulnscan'); } },
            { label: 'VIEW: DATASTREAM — Live Telemetry',    action: function () { switchView('datastream'); } },
            { label: 'THEME: Nero (default)',                action: function () { M.setTheme('nero'); } },
            { label: 'THEME: Navy',                          action: function () { M.setTheme('navy'); } },
            { label: 'THEME: Editorial',                     action: function () { M.setTheme('editorial'); } },
            { label: 'THEME: Avorio',                        action: function () { M.setTheme('avorio'); } },
            { label: 'THEME: Colorblind',                    action: function () { M.setTheme('colorblind'); } },
            { label: 'THEME: Sugar',                         action: function () { M.setTheme('sugar'); } },
          ]
        });
      }

      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          openCommandPalette();
        }
      });

      /* ─────────────────────────────────────────────────
         HEADER SHELL MOUNT
      ───────────────────────────────────────────────── */
      function mountHeader() {
        var headerHost = document.createElement('mn-header-shell');

        headerHost.config = {
          ariaLabel: 'NEXUS CORE navigation',
          sections: [
            {
              type: 'brand',
              label: 'NEXUS//CORE',
              logoSrc: '../src/assets/favicon.svg',
              logoAlt: 'NEXUS CORE mark',
              href: './index.html'
            },
            {
              type: 'actions',
              role: 'pre',
              presentation: 'segmented',
              items: [
                { id: 'sigint',     label: 'SIGINT',     icon: signalSvg(), active: true },
                { id: 'netmap',     label: 'NETMAP',     icon: icon('network') || '' },
                { id: 'vulnscan',   label: 'VULNSCAN',   icon: shieldSvg() },
                { id: 'datastream', label: 'DATASTREAM', icon: streamSvg() },
              ]
            },
            {
              type: 'search',
              placeholder: 'QUERY NEURAL MESH...',
              shortcut: 'Cmd-K',
            },
            {
              type: 'actions',
              role: 'post',
              presentation: 'cluster',
              items: [
                { id: 'defcon', title: 'DEFCON status: 3', icon: defconSvg() },
                { id: 'comms',  title: 'Encrypted comms',  icon: lockSvg() },
                { id: 'load',   title: 'System load 62%',  icon: barsSvg() },
              ]
            },
            { type: 'divider' },
            { type: 'theme' },
            { type: 'profile', name: 'GHOST-7' }
          ],
          callbacks: {
            onAction: function (payload) {
              if (viewIds.indexOf(payload.id) !== -1) switchView(payload.id);
            },
            onSearch: function (payload) {
              if (!payload.query) openCommandPalette();
            }
          }
        };

        navbarEl.textContent = '';
        navbarEl.appendChild(headerHost);

        var ready = typeof headerHost.whenReady === 'function'
          ? headerHost.whenReady()
          : Promise.resolve();

        ready.then(function () {
          if (!headerHost.isConnected) return;

          /* Inject brand subtitle + LIVE indicator */
          var brandEl = navbarEl.querySelector('.mn-header-shell__brand');
          if (brandEl) {
            /* Subtitle row */
            var sub = document.createElement('span');
            sub.className = 'hk-brand-sub';
            sub.textContent = 'v7.4.1 // CLEARANCE: OMEGA';
            brandEl.appendChild(sub);

            /* Live indicator */
            var live = document.createElement('span');
            live.className = 'hk-brand-live';
            live.setAttribute('aria-label', 'System status: live');
            var dot = document.createElement('span');
            dot.className = 'hk-brand-live__dot';
            dot.setAttribute('aria-hidden', 'true');
            live.appendChild(dot);
            live.appendChild(document.createTextNode('LIVE'));
            brandEl.appendChild(live);
          }

          syncNavButtons();
        });
      }

      /* ── Boot ── */
      mountHeader();
      switchView('sigint');
    }());
  </script>
</body>

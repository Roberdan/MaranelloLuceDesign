<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Template — Maranello Luce Design</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--mn-surface); color: var(--mn-text); font-family: var(--font-body, sans-serif); }

    /* ── Shell: sidebar + main ── */
    .shell { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--mn-surface-raised);
      border-right: 1px solid var(--mn-border);
      display: flex; flex-direction: column;
      padding: 20px 16px;
      overflow-y: auto;
    }
    .sidebar__brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-display); font-weight: 700; font-size: 1rem;
      color: var(--mn-text); margin-bottom: 6px;
    }
    .sidebar__version {
      font-size: 0.7rem; font-weight: 600;
      background: var(--mn-accent); color: var(--mn-surface);
      padding: 2px 8px; border-radius: 10px;
    }
    .sidebar__search {
      width: 100%; margin: 12px 0 8px;
      padding: 8px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--mn-border); background: var(--mn-surface);
      color: var(--mn-text-muted); font-size: 0.85rem;
      font-family: var(--font-body, sans-serif);
    }
    .sidebar__search:focus { outline: 2px solid var(--mn-accent); outline-offset: -1px; border-color: var(--mn-accent); color: var(--mn-text); }
    .sidebar__shortcut {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--mn-text-muted); margin-bottom: 16px;
    }
    .sidebar__group-label {
      font-family: var(--font-display); font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--mn-text-muted); margin: 20px 0 6px; padding-left: 8px;
    }
    .sidebar__group-label:first-of-type { margin-top: 8px; }
    .sidebar__nav { display: flex; flex-direction: column; gap: 2px; }
    .sidebar__link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-radius: var(--radius-md);
      font-size: 0.875rem; color: var(--mn-text);
      text-decoration: none; cursor: pointer; border: none; background: none;
      width: 100%; text-align: left; font-family: inherit;
      transition: background 0.12s;
    }
    .sidebar__link:hover { background: color-mix(in srgb, var(--mn-accent) 8%, transparent); }
    .sidebar__link:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .sidebar__link.is-active { background: color-mix(in srgb, var(--mn-accent) 15%, transparent); color: var(--mn-accent); font-weight: 600; }
    .sidebar__badge {
      font-size: 0.7rem; font-weight: 600; min-width: 20px; text-align: center;
      padding: 2px 6px; border-radius: 10px;
      background: var(--mn-accent); color: var(--mn-surface);
    }
    .sidebar__spacer { flex: 1; }
    .sidebar__footer { padding-top: 16px; border-top: 1px solid var(--mn-border); margin-top: 12px; }
    .sidebar__footer-link {
      display: block; padding: 6px 12px; border-radius: var(--radius-md);
      font-size: 0.8rem; color: var(--mn-text-muted); text-decoration: none;
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      font-family: inherit;
    }
    .sidebar__footer-link:hover { color: var(--mn-text); background: color-mix(in srgb, var(--mn-accent) 6%, transparent); }

    /* ── Main area ── */
    .main { display: flex; flex-direction: column; overflow-y: auto; }
    .main__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; border-bottom: 1px solid var(--mn-border);
      background: var(--mn-surface-raised); flex-shrink: 0;
    }
    .main__breadcrumb { font-size: 0.85rem; color: var(--mn-text-muted); }
    .main__breadcrumb span { color: var(--mn-text); font-weight: 600; font-size: 1.1rem; }
    .main__actions { display: flex; gap: 8px; align-items: center; }
    .main__content { flex: 1; padding: 24px 28px; }

    /* ── Composable grid ── */
    .mn-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }
    .mn-col-1 { grid-column: span 1; } .mn-col-2 { grid-column: span 2; }
    .mn-col-3 { grid-column: span 3; } .mn-col-4 { grid-column: span 4; }
    .mn-col-5 { grid-column: span 5; } .mn-col-6 { grid-column: span 6; }
    .mn-col-7 { grid-column: span 7; } .mn-col-8 { grid-column: span 8; }
    .mn-col-9 { grid-column: span 9; } .mn-col-10 { grid-column: span 10; }
    .mn-col-11 { grid-column: span 11; } .mn-col-12 { grid-column: span 12; }

    .mn-cell {
      background: var(--mn-surface-raised);
      border: 1px solid var(--mn-border);
      border-radius: var(--radius-md);
      padding: 16px;
      min-height: 120px;
      display: flex; flex-direction: column;
    }
    .mn-cell__label {
      font-family: var(--font-display); font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); margin-bottom: 12px;
    }
    .mn-cell__body { flex: 1; }

    /* ── Theme select in header ── */
    .theme-select {
      font-size: 0.8rem; padding: 4px 8px; border-radius: var(--radius-md);
      border: 1px solid var(--mn-border); background: var(--mn-surface);
      color: var(--mn-text); font-family: inherit;
    }
    .theme-select:focus-visible { outline: 2px solid var(--mn-accent); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <script>try { var t = localStorage.getItem('mn-theme'); if (t && t !== 'editorial') document.body.classList.add('mn-' + t); } catch(e) {}</script>

  <div class="shell">
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar__brand">
        <img src="../src/assets/favicon.svg" alt="" width="24" height="24">
        Maranello Luce
        <span class="sidebar__version">v6.5</span>
      </div>

      <input type="search" class="sidebar__search" placeholder="Cerca pagina..." aria-label="Search pages">
      <div class="sidebar__shortcut">/</div>

      <div class="sidebar__group-label">Generale</div>
      <nav class="sidebar__nav" id="nav-generale">
        <button class="sidebar__link is-active" data-page="dashboard">Dashboard</button>
        <button class="sidebar__link" data-page="utenti">Utenti</button>
        <button class="sidebar__link" data-page="audit">Audit Log <span class="sidebar__badge">3</span></button>
      </nav>

      <div class="sidebar__group-label">Sicurezza</div>
      <nav class="sidebar__nav">
        <button class="sidebar__link" data-page="tokens">PAT Tokens</button>
        <button class="sidebar__link" data-page="flags">Feature Flags</button>
      </nav>

      <div class="sidebar__group-label">Account</div>
      <nav class="sidebar__nav">
        <button class="sidebar__link" data-page="billing">Fatturazione</button>
      </nav>

      <div class="sidebar__spacer"></div>
      <div class="sidebar__footer">
        <button class="sidebar__footer-link" data-page="settings">Impostazioni</button>
        <button class="sidebar__footer-link" data-page="help">Documentazione</button>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main">
      <header class="main__header">
        <div class="main__breadcrumb" id="breadcrumb">Admin &rsaquo; <span>Dashboard</span></div>
        <div class="main__actions">
          <select class="theme-select" id="theme-picker" aria-label="Theme">
            <option value="editorial">Editorial</option>
            <option value="nero">Nero</option>
            <option value="avorio">Avorio</option>
            <option value="colorblind">Colorblind</option>
            <option value="sugar">Sugar</option>
            <option value="navy">Navy</option>
          </select>
        </div>
      </header>

      <div class="main__content" id="page-content">
        <!-- ── COMPOSABLE GRID ── -->
        <div class="mn-grid">

          <!-- Row 1: 3 + 6 + 3 -->
          <div class="mn-cell mn-col-3">
            <div class="mn-cell__label">KPI</div>
            <div class="mn-cell__body" id="cell-kpi"></div>
          </div>
          <div class="mn-cell mn-col-6">
            <div class="mn-cell__label">Chart</div>
            <div class="mn-cell__body" id="cell-chart"></div>
          </div>
          <div class="mn-cell mn-col-3">
            <div class="mn-cell__label">Gauge</div>
            <div class="mn-cell__body" id="cell-gauge"></div>
          </div>

          <!-- Row 2: 4 + 4 + 4 -->
          <div class="mn-cell mn-col-4">
            <div class="mn-cell__label">Sparkline</div>
            <div class="mn-cell__body" id="cell-spark1"></div>
          </div>
          <div class="mn-cell mn-col-4">
            <div class="mn-cell__label">Donut</div>
            <div class="mn-cell__body" id="cell-spark2"></div>
          </div>
          <div class="mn-cell mn-col-4">
            <div class="mn-cell__label">Bar</div>
            <div class="mn-cell__body" id="cell-spark3"></div>
          </div>

          <!-- Row 3: 8 + 4 -->
          <div class="mn-cell mn-col-8">
            <div class="mn-cell__label">Data Table</div>
            <div class="mn-cell__body" id="cell-table"></div>
          </div>
          <div class="mn-cell mn-col-4">
            <div class="mn-cell__label">Activity</div>
            <div class="mn-cell__body" id="cell-activity"></div>
          </div>

          <!-- Row 4: 12 full width -->
          <div class="mn-cell mn-col-12">
            <div class="mn-cell__label">Gantt Timeline</div>
            <div class="mn-cell__body" id="cell-gantt"></div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="../dist/iife/maranello.min.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      // ── Theme ──
      var picker = document.getElementById('theme-picker');
      var saved = localStorage.getItem('mn-theme') || 'editorial';
      picker.value = saved;
      picker.addEventListener('change', function () {
        M.setTheme(picker.value);
        localStorage.setItem('mn-theme', picker.value);
      });

      // ── Sidebar nav ──
      var links = document.querySelectorAll('.sidebar__link');
      var breadcrumb = document.getElementById('breadcrumb');
      for (var i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function () {
          for (var j = 0; j < links.length; j++) links[j].classList.remove('is-active');
          this.classList.add('is-active');
          var page = this.getAttribute('data-page');
          var label = this.textContent.trim().split('\n')[0].trim();
          breadcrumb.innerHTML = 'Admin &rsaquo; <span>' + label + '</span>';
        });
      }

      // ── Mount components into grid cells ──

      // KPI strip
      var kpiEl = document.getElementById('cell-kpi');
      if (kpiEl) {
        kpiEl.innerHTML = '<div style="font-size:2rem;font-weight:700;color:var(--mn-accent)">2,847</div><div style="font-size:0.75rem;color:var(--mn-text-muted)">Active users</div>';
      }

      // Gauge
      var gaugeEl = document.getElementById('cell-gauge');
      if (gaugeEl && M.createGauge) {
        var canvas = document.createElement('canvas');
        canvas.width = 140; canvas.height = 140;
        canvas.setAttribute('role', 'img');
        canvas.setAttribute('aria-label', 'Server load gauge at 72 percent');
        gaugeEl.appendChild(canvas);
        M.createGauge(canvas, { value: 72, max: 100, color: '#FFC72C', showNeedle: true, complications: { centerValue: '72', centerUnit: '%', centerLabel: 'LOAD' } });
      }

      // Chart (sparkline)
      var chartEl = document.getElementById('cell-chart');
      if (chartEl && M.sparkline) {
        var c = document.createElement('canvas');
        c.width = 500; c.height = 120;
        c.setAttribute('role', 'img');
        c.setAttribute('aria-label', 'Revenue trend sparkline');
        chartEl.appendChild(c);
        M.sparkline(c, [42,45,48,52,49,55,58,62,59,65,68,72,70,75,78,82,80,85,88,92,90,95,98,102]);
      }

      // Sparkline 1
      var s1 = document.getElementById('cell-spark1');
      if (s1 && M.sparkline) {
        var c1 = document.createElement('canvas');
        c1.width = 280; c1.height = 80;
        c1.setAttribute('role', 'img'); c1.setAttribute('aria-label', 'Request rate');
        s1.appendChild(c1);
        M.sparkline(c1, [120,135,128,142,155,148,160,172,165,178,185,190]);
      }

      // Donut
      var s2 = document.getElementById('cell-spark2');
      if (s2 && M.donut) {
        var c2 = document.createElement('canvas');
        c2.width = 160; c2.height = 160;
        c2.setAttribute('role', 'img'); c2.setAttribute('aria-label', 'Traffic by source');
        s2.appendChild(c2);
        M.donut(c2, [{ value: 48, label: 'Direct' }, { value: 32, label: 'Referral' }, { value: 20, label: 'Organic' }]);
      }

      // Bar chart
      var s3 = document.getElementById('cell-spark3');
      if (s3 && M.barChart) {
        var c3 = document.createElement('canvas');
        c3.width = 280; c3.height = 120;
        c3.setAttribute('role', 'img'); c3.setAttribute('aria-label', 'Errors by service');
        s3.appendChild(c3);
        M.barChart(c3, [{ label: 'API', value: 45 }, { label: 'Auth', value: 23 }, { label: 'DB', value: 12 }, { label: 'Cache', value: 8 }]);
      }

      // Data table
      var tableEl = document.getElementById('cell-table');
      if (tableEl && M.dataTable) {
        M.dataTable(tableEl, {
          columns: [
            { key: 'name', label: 'Name', sortable: true },
            { key: 'role', label: 'Role' },
            { key: 'status', label: 'Status', type: 'status' },
            { key: 'activity', label: 'Last Active' }
          ],
          data: [
            { name: 'Mara Fossati', role: 'Admin', status: 'Active', activity: '2 min ago' },
            { name: 'Leo Hartmann', role: 'Editor', status: 'Active', activity: '15 min ago' },
            { name: 'Anika Patel', role: 'Viewer', status: 'Idle', activity: '2h ago' },
            { name: 'Diego Navarro', role: 'Admin', status: 'Active', activity: '5 min ago' },
            { name: 'Suki Tanaka', role: 'Editor', status: 'Offline', activity: '1d ago' },
          ]
        });
      }

      // Activity feed
      var actEl = document.getElementById('cell-activity');
      if (actEl) {
        var items = [
          { who: 'Mara F.', what: 'deployed v3.2.1', when: '2 min ago' },
          { who: 'Leo H.', what: 'updated feature flag', when: '15 min ago' },
          { who: 'Anika P.', what: 'reviewed audit log', when: '1h ago' },
          { who: 'Diego N.', what: 'rotated PAT token', when: '3h ago' },
        ];
        var html = '';
        for (var a = 0; a < items.length; a++) {
          html += '<div style="padding:6px 0;border-bottom:1px solid var(--mn-border);font-size:0.8rem">';
          html += '<strong style="color:var(--mn-text)">' + items[a].who + '</strong> ';
          html += '<span style="color:var(--mn-text-muted)">' + items[a].what + '</span>';
          html += '<div style="font-size:0.7rem;color:var(--mn-text-muted);margin-top:2px">' + items[a].when + '</div>';
          html += '</div>';
        }
        actEl.innerHTML = html;
      }

      // Gantt
      var ganttEl = document.getElementById('cell-gantt');
      if (ganttEl && M.gantt) {
        M.gantt(ganttEl, {
          tasks: [
            { id: '1', label: 'Platform Setup', start: '2026-03-01', end: '2026-03-15', state: 'completed', progress: 100 },
            { id: '2', label: 'API Development', start: '2026-03-10', end: '2026-04-10', state: 'active', progress: 65 },
            { id: '3', label: 'Frontend Build', start: '2026-03-20', end: '2026-04-20', state: 'active', progress: 40 },
            { id: '4', label: 'Testing', start: '2026-04-15', end: '2026-05-01', state: 'planned', progress: 0 },
            { id: '5', label: 'Launch', start: '2026-05-01', end: '2026-05-05', state: 'planned', progress: 0 },
          ]
        });
      }
    })();
  </script>
</body>
</html>

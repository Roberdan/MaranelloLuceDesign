<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvergIO Workspace</title>
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    @layer workspace {
      body { margin: 0; background: var(--mn-surface); color: var(--mn-text); }

      /* Toolbar */
      .ws-toolbar {
        display: flex; align-items: center; gap: 0.375rem;
        padding: 0 0.75rem; height: 100%;
        background: var(--mn-surface-raised);
        font-family: var(--font-mono, monospace);
      }
      .ws-toolbar__brand {
        font-weight: 700; font-size: 0.875rem; color: var(--mn-text);
        letter-spacing: -0.02em; white-space: nowrap;
      }
      .ws-toolbar__sep { width: 1px; height: 1.25rem; background: var(--mn-border); flex-shrink: 0; margin: 0 0.125rem; }
      .ws-toolbar__spacer { flex: 1 1 auto; }
      .ws-toolbar__avatar {
        width: 1.875rem; height: 1.875rem; border-radius: 50%;
        background: var(--mn-accent); color: var(--mn-surface);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.625rem; font-weight: 700; flex-shrink: 0;
        border: 2px solid var(--mn-border); cursor: default;
      }
      .ws-view-btn[aria-pressed="true"] {
        outline: 2px solid var(--mn-accent);
        background: var(--mn-surface-raised);
      }

      /* Sidebar */
      .ws-sidebar { padding: 0.375rem; display: flex; flex-direction: column; gap: 0.125rem; }
      .ws-sidebar__label {
        font-size: 0.5625rem; text-transform: uppercase; letter-spacing: 0.1em;
        color: var(--mn-text-muted); padding: 0.5rem 0.5rem 0.125rem;
        font-family: var(--font-mono, monospace);
      }
      .ws-proj-btn {
        display: flex; align-items: center; gap: 0.5rem;
        width: 100%; background: none; border: none;
        padding: 0.4rem 0.5rem; border-radius: var(--radius-sm);
        cursor: pointer; font-size: 0.8rem; color: var(--mn-text);
        text-align: left; font-family: var(--font-mono, monospace);
      }
      .ws-proj-btn:hover { background: var(--mn-surface-raised); }
      .ws-proj-btn.is-active { background: var(--mn-surface-raised); font-weight: 700; }
      .ws-proj-btn:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
      .ws-dot {
        width: 0.5rem; height: 0.5rem; border-radius: 50%; flex-shrink: 0;
        background: var(--mn-text-muted);
      }
      .ws-dot[data-color="green"]  { background: var(--mn-status-success, var(--mn-accent)); }
      .ws-dot[data-color="blue"]   { background: var(--mn-status-info,    var(--mn-accent)); }
      .ws-dot[data-color="amber"]  { background: var(--mn-status-warning, var(--mn-accent)); }
      .ws-dot[data-color="red"]    { background: var(--mn-status-error,   var(--mn-accent)); }
      .ws-dot[data-color="purple"] { background: var(--mn-accent-secondary, var(--mn-accent)); }

      /* Board (Kanban) */
      .ws-board {
        display: flex; gap: 1rem; padding: 1rem;
        overflow-x: auto; box-sizing: border-box;
        align-items: flex-start; min-height: 100%;
      }
      .ws-board-col { flex: 0 0 14.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
      .ws-board-col__hd {
        display: flex; align-items: center; gap: 0.5rem;
        padding: 0.375rem 0.25rem;
        border-bottom: 2px solid var(--mn-border); margin-bottom: 0.125rem;
      }
      .ws-board-col__name {
        font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.07em; color: var(--mn-text-muted);
        font-family: var(--font-mono, monospace);
      }
      .ws-board-col__count {
        font-size: 0.6875rem; background: var(--mn-surface-raised);
        border: 1px solid var(--mn-border); border-radius: var(--radius-sm);
        padding: 0.0625rem 0.35rem; color: var(--mn-text-muted);
      }
      .ws-card {
        width: 100%; background: var(--mn-surface-raised);
        border: 1px solid var(--mn-border);
        border-radius: var(--radius-md); padding: 0.625rem 0.75rem;
        cursor: pointer; text-align: left;
      }
      .ws-card:hover { border-color: var(--mn-accent); }
      .ws-card:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: 2px; }
      .ws-card__title {
        font-size: 0.8rem; font-weight: 600; color: var(--mn-text);
        margin-bottom: 0.5rem; line-height: 1.4;
        font-family: var(--font-mono, monospace);
      }
      .ws-card__meta { display: flex; align-items: center; gap: 0.375rem; }
      .ws-card__avatar {
        width: 1.375rem; height: 1.375rem; border-radius: 50%;
        background: var(--mn-surface); border: 1px solid var(--mn-border);
        color: var(--mn-text-muted); display: flex; align-items: center;
        justify-content: center; font-size: 0.5625rem; font-weight: 700;
        font-family: var(--font-mono, monospace); flex-shrink: 0;
      }
      .ws-card__pdot {
        width: 0.4375rem; height: 0.4375rem; border-radius: 50%;
        flex-shrink: 0; display: inline-block;
      }
      .ws-card__proj {
        font-size: 0.5625rem; color: var(--mn-text-muted); margin-left: auto;
        font-family: var(--font-mono, monospace); overflow: hidden;
        white-space: nowrap; text-overflow: ellipsis; max-width: 6rem;
      }
      .ws-pdot-critical { background: var(--mn-status-error,   var(--mn-accent)); }
      .ws-pdot-high     { background: var(--mn-status-warning, var(--mn-accent)); }
      .ws-pdot-medium   { background: var(--mn-status-info,    var(--mn-accent)); }
      .ws-pdot-low      { background: var(--mn-text-muted); }

      /* List view */
      .ws-list { padding: 1rem; overflow: auto; box-sizing: border-box; }

      /* Timeline view */
      .ws-timeline { padding: 1rem; overflow: auto; box-sizing: border-box; }
      .ws-tl-group { margin-bottom: 1.5rem; }
      .ws-tl-group__label {
        font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.08em; color: var(--mn-text-muted);
        margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.375rem;
        font-family: var(--font-mono, monospace);
      }
      .ws-tl-row {
        display: grid; grid-template-columns: 14rem 1fr; gap: 0.75rem;
        align-items: center; margin-bottom: 0.375rem;
      }
      .ws-tl-row__name {
        font-size: 0.75rem; color: var(--mn-text); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
        font-family: var(--font-mono, monospace);
      }
      .ws-tl-row__track {
        position: relative; background: var(--mn-surface-raised);
        border-radius: var(--radius-sm); height: 1.5rem; overflow: hidden;
      }
      .ws-tl-row__bar {
        position: absolute; top: 0.25rem; bottom: 0.25rem;
        border-radius: var(--radius-sm); background: var(--mn-accent); opacity: 0.85;
      }
      .ws-tl-row__bar[data-proj="apollo"]  { background: var(--mn-status-success, var(--mn-accent)); }
      .ws-tl-row__bar[data-proj="mercury"] { background: var(--mn-status-info,    var(--mn-accent)); }
      .ws-tl-row__bar[data-proj="venus"]   { background: var(--mn-status-warning, var(--mn-accent)); }
      .ws-tl-row__bar[data-proj="mars"]    { background: var(--mn-status-error,   var(--mn-accent)); }
      .ws-tl-row__bar[data-proj="jupiter"] { background: var(--mn-accent-secondary, var(--mn-accent)); }
      .ws-tl-row__due {
        position: absolute; right: 0.375rem; top: 50%; transform: translateY(-50%);
        font-size: 0.5625rem; color: var(--mn-text-muted);
        font-family: var(--font-mono, monospace);
      }

      /* Detail panel */
      .ws-detail { padding: 1.25rem; overflow: auto; box-sizing: border-box; }
      .ws-detail__hd { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 1rem; }
      .ws-detail__title {
        flex: 1; font-size: 0.9375rem; font-weight: 700; margin: 0;
        color: var(--mn-text); line-height: 1.35; font-family: var(--font-mono, monospace);
      }
      .ws-detail__close {
        background: none; border: 1px solid var(--mn-border);
        border-radius: var(--radius-sm); padding: 0.25rem 0.5rem;
        cursor: pointer; color: var(--mn-text-muted); font-size: 0.75rem;
        flex-shrink: 0; font-family: var(--font-mono, monospace);
      }
      .ws-detail__close:hover { color: var(--mn-text); border-color: var(--mn-text); }
      .ws-detail__close:focus-visible { outline: 2px solid var(--mn-accent); }
      .ws-detail__fields { display: grid; gap: 0.625rem; margin-bottom: 1rem; }
      .ws-detail__field {
        display: grid; grid-template-columns: 6.5rem 1fr;
        gap: 0.375rem; align-items: start; font-size: 0.8rem;
      }
      .ws-detail__label { color: var(--mn-text-muted); font-family: var(--font-mono, monospace); }
      .ws-detail__val   { color: var(--mn-text); font-family: var(--font-mono, monospace); }
      .ws-detail__desc {
        font-size: 0.8rem; color: var(--mn-text-muted); line-height: 1.6;
        background: var(--mn-surface); border: 1px solid var(--mn-border);
        border-radius: var(--radius-sm); padding: 0.5rem 0.75rem;
        margin-bottom: 1rem; font-family: var(--font-mono, monospace);
      }
      .ws-detail__tags { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-bottom: 1rem; }
      .ws-detail__act-hd {
        font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.07em; color: var(--mn-text-muted);
        margin-bottom: 0.5rem; font-family: var(--font-mono, monospace);
      }
      .ws-act-item {
        padding: 0.5rem 0; border-top: 1px solid var(--mn-border);
        font-size: 0.75rem; color: var(--mn-text-muted); line-height: 1.5;
        font-family: var(--font-mono, monospace);
      }
      .ws-act-item strong { color: var(--mn-text); }

      /* Badge */
      .ws-badge {
        display: inline-flex; align-items: center;
        padding: 0.1rem 0.45rem; border-radius: var(--radius-sm);
        font-size: 0.6875rem; font-weight: 600; border: 1px solid;
        font-family: var(--font-mono, monospace);
      }
      .ws-badge--neutral { border-color: var(--mn-border); color: var(--mn-text-muted); background: var(--mn-surface-raised); }
      .ws-badge--info    { border-color: var(--mn-accent); color: var(--mn-accent); background: var(--mn-surface-raised); }
      .ws-badge--success { border-color: var(--mn-status-success, var(--mn-accent)); color: var(--mn-status-success, var(--mn-accent)); background: var(--mn-surface-raised); }
      .ws-badge--warning { border-color: var(--mn-status-warning, var(--mn-accent)); color: var(--mn-status-warning, var(--mn-accent)); background: var(--mn-surface-raised); }
      .ws-badge--error   { border-color: var(--mn-status-error,   var(--mn-accent)); color: var(--mn-status-error, var(--mn-accent)); background: var(--mn-surface-raised); }
    }
  </style>
</head>
<body class="mn-nero">

<mn-app-shell id="ws-shell" layout="full">

  <!-- Nav slot: sidebar -->
  <div slot="nav">
    <aside class="mn-sidebar" aria-label="Workspace navigation">
      <div class="mn-sidebar__header">
        <span class="mn-sidebar__brand">ConvergIO</span>
      </div>
      <div class="ws-sidebar">
        <span class="ws-sidebar__label" id="proj-section-label">Projects</span>
        <nav id="project-nav" aria-labelledby="proj-section-label">
          <button type="button" class="ws-proj-btn is-active" data-project="all" aria-current="true">
            <span class="ws-dot" aria-hidden="true"></span>
            All Projects
          </button>
          <button type="button" class="ws-proj-btn" data-project="apollo">
            <span class="ws-dot" data-color="green" aria-hidden="true"></span>
            Apollo Platform
          </button>
          <button type="button" class="ws-proj-btn" data-project="mercury">
            <span class="ws-dot" data-color="blue" aria-hidden="true"></span>
            Mercury API
          </button>
          <button type="button" class="ws-proj-btn" data-project="venus">
            <span class="ws-dot" data-color="amber" aria-hidden="true"></span>
            Venus Dashboard
          </button>
          <button type="button" class="ws-proj-btn" data-project="mars">
            <span class="ws-dot" data-color="red" aria-hidden="true"></span>
            Mars Analytics
          </button>
          <button type="button" class="ws-proj-btn" data-project="jupiter">
            <span class="ws-dot" data-color="purple" aria-hidden="true"></span>
            Jupiter AI
          </button>
        </nav>
      </div>
    </aside>
  </div>

  <!-- Toolbar slot: header -->
  <div slot="toolbar">
    <div class="ws-toolbar" role="toolbar" aria-label="Workspace toolbar">
      <button type="button" class="mn-btn mn-btn--ghost" id="sidebar-toggle"
              aria-label="Toggle sidebar" aria-expanded="true">Nav</button>
      <span class="ws-toolbar__brand">ConvergIO Workspace</span>
      <span class="ws-toolbar__sep" aria-hidden="true"></span>
      <div role="group" aria-label="View switcher">
        <button type="button" class="mn-btn mn-btn--ghost ws-view-btn"
                id="btn-board" data-view="board" aria-pressed="true">Board</button>
        <button type="button" class="mn-btn mn-btn--ghost ws-view-btn"
                id="btn-list" data-view="list" aria-pressed="false">List</button>
        <button type="button" class="mn-btn mn-btn--ghost ws-view-btn"
                id="btn-timeline" data-view="timeline" aria-pressed="false">Timeline</button>
      </div>
      <span class="ws-toolbar__sep" aria-hidden="true"></span>
      <button type="button" class="mn-btn mn-btn--ghost" id="filter-btn"
              aria-label="Toggle filters">Filter</button>
      <button type="button" class="mn-btn mn-btn--ghost" id="cmd-k-btn"
              aria-label="Open command palette, shortcut Ctrl K">Cmd+K</button>
      <span class="ws-toolbar__spacer"></span>
      <button type="button" class="mn-btn mn-btn--ghost" id="notif-btn"
              aria-label="Notifications">Bell</button>
      <button type="button" class="mn-btn mn-btn--ghost" id="settings-btn"
              aria-label="Settings">Gear</button>
      <label for="theme-select" class="mn-sr-only">Theme</label>
      <select id="theme-select" class="mn-form-select" aria-label="Select theme"
              style="font-family:var(--font-mono,monospace);font-size:0.75rem;">
        <option value="nero" selected>Nero</option>
        <option value="editorial">Editorial</option>
        <option value="avorio">Avorio</option>
        <option value="colorblind">Colorblind</option>
        <option value="sugar">Sugar</option>
        <option value="navy">Navy</option>
      </select>
      <div class="ws-toolbar__avatar" role="img" aria-label="Signed in as Alex Chen">AC</div>
    </div>
  </div>

  <!-- Main slot: primary content -->
  <div slot="main" id="mn-slot-page" class="mn-slot mn-slot--page"></div>

  <!-- Detail slot: side panel -->
  <div slot="detail" id="mn-slot-side-panel" class="mn-slot mn-slot--side-panel"></div>

</mn-app-shell>

<script src="../dist/iife/maranello.min.js"></script>
<script type="module" src="../dist/wc/mn-app-shell.js"></script>
<script>
(function () {
  'use strict';

  var M = window.Maranello;
  if (!M) { console.error('Maranello not loaded'); return; }

  /* Data */

  var PROJECTS = {
    all:     { name: 'All Projects',    color: '' },
    apollo:  { name: 'Apollo Platform', color: 'green' },
    mercury: { name: 'Mercury API',     color: 'blue' },
    venus:   { name: 'Venus Dashboard', color: 'amber' },
    mars:    { name: 'Mars Analytics',  color: 'red' },
    jupiter: { name: 'Jupiter AI',      color: 'purple' }
  };

  var PEOPLE = {
    AC: 'Alex Chen',
    SK: 'Sarah Kim',
    MJ: 'Marcus Johnson',
    PP: 'Priya Patel',
    LO: "Liam O'Brien",
    SR: 'Sofia Rodriguez'
  };

  var TASKS = [
    { id:'t01', title:'Implement JWT refresh flow',    assignee:'AC', priority:'Critical', status:'In Progress', due:'2025-02-14', project:'mercury', tags:['Auth','Backend'],     start:5,  width:30, desc:'Implement token refresh logic with sliding window expiry. Handle race conditions on concurrent requests.' },
    { id:'t02', title:'Migrate user service to gRPC', assignee:'MJ', priority:'High',     status:'In Progress', due:'2025-03-01', project:'apollo',  tags:['Backend','Migration'],start:10, width:40, desc:'Replace REST endpoints with gRPC for the user microservice. Update all client libraries and protos.' },
    { id:'t03', title:'Add dark mode toggle',          assignee:'SR', priority:'Medium',   status:'In Progress', due:'2025-02-20', project:'venus',   tags:['UI','Theming'],       start:20, width:25, desc:'Add a persistent dark/light toggle to the dashboard header. Respect prefers-color-scheme on first load.' },
    { id:'t04', title:'Fix memory leak in websocket',  assignee:'AC', priority:'High',     status:'In Progress', due:'2025-02-10', project:'apollo',  tags:['Bug','Perf'],         start:3,  width:20, desc:'Event listeners accumulate on ws reconnect. Audit lifecycle hooks and clean up on disconnect.' },
    { id:'t05', title:'Design onboarding flow',        assignee:'SK', priority:'Medium',   status:'In Progress', due:'2025-02-28', project:'venus',   tags:['UX','Design'],        start:15, width:35, desc:'Step-by-step onboarding: org setup, team invite, first project creation. Include progress indicator.' },
    { id:'t06', title:'Refactor auth middleware',      assignee:'PP', priority:'High',     status:'Review',      due:'2025-02-17', project:'mercury', tags:['Auth','Refactor'],    start:8,  width:28, desc:'Extract auth checks into a reusable middleware chain. Consolidate token validation and error handling.' },
    { id:'t07', title:'Add rate limiting',             assignee:'LO', priority:'Medium',   status:'Review',      due:'2025-02-22', project:'apollo',  tags:['Backend','Security'], start:12, width:30, desc:'Per-endpoint rate limiting with configurable thresholds per tier. Use Redis sliding window counters.' },
    { id:'t08', title:'Create analytics module',       assignee:'SR', priority:'Medium',   status:'Review',      due:'2025-03-10', project:'mars',    tags:['Analytics','Feature'],start:18, width:38, desc:'Core analytics module: event ingestion pipeline, aggregation jobs, and embeddable dashboard widgets.' },
    { id:'t09', title:'Write E2E tests',               assignee:'MJ', priority:'Low',      status:'Done',        due:'2025-01-31', project:'jupiter', tags:['Testing','QA'],       start:0,  width:22, desc:'End-to-end tests for core user journey: signup, onboarding, project creation, team invite.' },
    { id:'t10', title:'Optimize DB queries',           assignee:'PP', priority:'High',     status:'Done',        due:'2025-01-28', project:'mars',    tags:['Perf','DB'],          start:0,  width:18, desc:'Profile and optimize the 5 slowest queries. Add missing indexes and rewrite N+1 patterns.' },
    { id:'t11', title:'Implement notifications',       assignee:'AC', priority:'Medium',   status:'Done',        due:'2025-01-25', project:'jupiter', tags:['Feature','UX'],       start:0,  width:15, desc:'Real-time in-app notifications with read/unread state, grouping, and email digest fallback option.' },
    { id:'t12', title:'Build search indexer',          assignee:'SK', priority:'High',     status:'Backlog',     due:'2025-03-20', project:'apollo',  tags:['Search','Backend'],   start:30, width:45, desc:'Index all entities for full-text search. Support faceted filtering and typo tolerance via fuzzy match.' },
    { id:'t13', title:'Implement SSO',                 assignee:'MJ', priority:'Critical', status:'Backlog',     due:'2025-03-15', project:'mercury', tags:['Auth','Enterprise'],  start:35, width:40, desc:'SAML 2.0 and OIDC SSO. Auto-provision users from IdP. Admin configuration UI with domain mapping.' },
    { id:'t14', title:'Create API docs',               assignee:'PP', priority:'Low',      status:'Backlog',     due:'2025-04-01', project:'venus',   tags:['Docs','DX'],          start:40, width:35, desc:'Auto-generate OpenAPI docs with interactive playground. Write usage guides per endpoint group.' },
    { id:'t15', title:'Add CSV export',                assignee:'LO', priority:'Medium',   status:'Backlog',     due:'2025-03-28', project:'mars',    tags:['Feature','Data'],     start:38, width:30, desc:'Export any table view to CSV with column selection. Stream large datasets server-side to avoid timeout.' }
  ];

  /* App state */
  var activeProject = 'all';
  var currentView   = 'board';
  var activeRender  = null;

  function getFilteredTasks() {
    if (activeProject === 'all') return TASKS.slice();
    return TASKS.filter(function (t) { return t.project === activeProject; });
  }

  /* Core setup */
  var shellEl   = document.getElementById('ws-shell');
  var pageSlot  = document.getElementById('mn-slot-page');
  var registry  = M.ViewRegistry.getInstance();
  registry.clear();
  var navigation   = new M.NavigationModel();
  var orchestrator = new M.PanelOrchestrator(registry, navigation);
  shellEl.orchestrator = orchestrator;

  /* Helpers */
  function esc(s) {
    var d = document.createElement('span');
    d.textContent = String(s == null ? '' : s);
    return d.innerHTML;
  }

  function priorityBadge(p) {
    var m = { Critical:'ws-badge--error', High:'ws-badge--warning', Medium:'ws-badge--info', Low:'ws-badge--neutral' };
    return m[p] || 'ws-badge--neutral';
  }

  function statusBadge(s) {
    var m = { Backlog:'ws-badge--neutral', 'In Progress':'ws-badge--info', Review:'ws-badge--warning', Done:'ws-badge--success' };
    return m[s] || 'ws-badge--neutral';
  }

  function priorityDot(p) {
    var m = { Critical:'ws-pdot-critical', High:'ws-pdot-high', Medium:'ws-pdot-medium', Low:'ws-pdot-low' };
    return m[p] || '';
  }

  function openTaskDetail(task) {
    if (orchestrator.isOpen('task-detail')) orchestrator.close('task-detail');
    orchestrator.open('task-detail', 'side-panel', task);
    shellEl.setAttribute('layout', 'side-detail');
  }

  /* View: Board (Kanban) */
  registry.register({
    id: 'board',
    title: 'Board',
    defaultPlacement: 'page',
    factory: function (container) {
      var boardEl = document.createElement('div');
      boardEl.className = 'ws-board';
      boardEl.setAttribute('role', 'region');
      boardEl.setAttribute('aria-label', 'Kanban task board');
      container.appendChild(boardEl);

      var COLS = ['Backlog', 'In Progress', 'Review', 'Done'];

      function renderBoard() {
        boardEl.innerHTML = '';
        var tasks = getFilteredTasks();
        var grouped = {};
        COLS.forEach(function (c) { grouped[c] = []; });
        tasks.forEach(function (t) { if (grouped[t.status]) grouped[t.status].push(t); });

        COLS.forEach(function (colName) {
          var colEl = document.createElement('div');
          colEl.className = 'ws-board-col';

          var hdEl = document.createElement('div');
          hdEl.className = 'ws-board-col__hd';
          var nameEl = document.createElement('span');
          nameEl.className = 'ws-board-col__name';
          nameEl.textContent = colName;
          var countEl = document.createElement('span');
          countEl.className = 'ws-board-col__count';
          countEl.setAttribute('aria-label', grouped[colName].length + ' tasks');
          countEl.textContent = String(grouped[colName].length);
          hdEl.appendChild(nameEl);
          hdEl.appendChild(countEl);
          colEl.appendChild(hdEl);

          grouped[colName].forEach(function (task) {
            var card = document.createElement('button');
            card.type = 'button';
            card.className = 'ws-card';
            card.setAttribute('aria-label',
              task.title + ', ' + task.priority + ' priority, ' + task.status +
              ', assigned to ' + (PEOPLE[task.assignee] || task.assignee));

            var titleEl = document.createElement('div');
            titleEl.className = 'ws-card__title';
            titleEl.textContent = task.title;

            var metaEl = document.createElement('div');
            metaEl.className = 'ws-card__meta';

            var avEl = document.createElement('span');
            avEl.className = 'ws-card__avatar';
            avEl.setAttribute('aria-hidden', 'true');
            avEl.textContent = task.assignee;

            var dotEl = document.createElement('span');
            dotEl.className = 'ws-card__pdot ' + priorityDot(task.priority);
            dotEl.setAttribute('aria-hidden', 'true');

            var projEl = document.createElement('span');
            projEl.className = 'ws-card__proj';
            projEl.setAttribute('aria-hidden', 'true');
            projEl.textContent = PROJECTS[task.project] ? PROJECTS[task.project].name : task.project;

            metaEl.appendChild(avEl);
            metaEl.appendChild(dotEl);
            metaEl.appendChild(projEl);
            card.appendChild(titleEl);
            card.appendChild(metaEl);

            (function (t) {
              card.addEventListener('click', function () { openTaskDetail(t); });
            }(task));

            colEl.appendChild(card);
          });

          boardEl.appendChild(colEl);
        });
      }

      renderBoard();
      activeRender = renderBoard;
      return function () { if (activeRender === renderBoard) activeRender = null; };
    }
  });

  /* View: List */
  registry.register({
    id: 'list',
    title: 'List',
    defaultPlacement: 'page',
    factory: function (container) {
      var wrapEl = document.createElement('div');
      wrapEl.className = 'ws-list';
      var tableHostEl = document.createElement('div');
      wrapEl.appendChild(tableHostEl);
      container.appendChild(wrapEl);

      function toRow(t) {
        return {
          id: t.id,
          title: t.title,
          assignee: PEOPLE[t.assignee] || t.assignee,
          priority: t.priority,
          status: t.status,
          due: t.due,
          project: PROJECTS[t.project] ? PROJECTS[t.project].name : t.project,
          _raw: t
        };
      }

      var table = M.dataTable(tableHostEl, {
        columns: [
          { key: 'title',    label: 'Task',     type: 'text',   sortable: true },
          { key: 'assignee', label: 'Assignee', type: 'text',   sortable: true },
          { key: 'priority', label: 'Priority', type: 'tag',    sortable: true },
          { key: 'status',   label: 'Status',   type: 'status', sortable: true },
          { key: 'due',      label: 'Due',       type: 'date',   sortable: true },
          { key: 'project',  label: 'Project',  type: 'text',   sortable: true }
        ],
        data: getFilteredTasks().map(toRow),
        onRowClick: function (row) {
          openTaskDetail(row._raw || row);
        }
      });

      function renderList() {
        table.setData(getFilteredTasks().map(toRow));
      }

      activeRender = renderList;
      return function () {
        if (activeRender === renderList) activeRender = null;
        table.destroy();
      };
    }
  });

  /* View: Timeline */
  registry.register({
    id: 'timeline',
    title: 'Timeline',
    defaultPlacement: 'page',
    factory: function (container) {
      var tlEl = document.createElement('div');
      tlEl.className = 'ws-timeline';
      tlEl.setAttribute('role', 'region');
      tlEl.setAttribute('aria-label', 'Task timeline');
      container.appendChild(tlEl);

      function renderTimeline() {
        tlEl.innerHTML = '';
        var tasks = getFilteredTasks();

        var groups = {};
        var order  = [];
        tasks.forEach(function (t) {
          if (!groups[t.project]) { groups[t.project] = []; order.push(t.project); }
          groups[t.project].push(t);
        });

        order.forEach(function (pid) {
          var proj = PROJECTS[pid];
          if (!proj) return;

          var groupEl = document.createElement('div');
          groupEl.className = 'ws-tl-group';

          var labelEl = document.createElement('div');
          labelEl.className = 'ws-tl-group__label';
          var dotEl = document.createElement('span');
          dotEl.className = 'ws-dot';
          if (proj.color) dotEl.setAttribute('data-color', proj.color);
          dotEl.setAttribute('aria-hidden', 'true');
          labelEl.appendChild(dotEl);
          labelEl.appendChild(document.createTextNode(' ' + proj.name));
          groupEl.appendChild(labelEl);

          groups[pid].forEach(function (task) {
            var rowEl = document.createElement('div');
            rowEl.className = 'ws-tl-row';

            var nameEl = document.createElement('div');
            nameEl.className = 'ws-tl-row__name';
            nameEl.title = task.title;
            nameEl.textContent = task.title;

            var trackEl = document.createElement('div');
            trackEl.className = 'ws-tl-row__track';
            trackEl.setAttribute('role', 'img');
            trackEl.setAttribute('aria-label', task.title + ', due ' + task.due);

            var barEl = document.createElement('div');
            barEl.className = 'ws-tl-row__bar';
            barEl.setAttribute('data-proj', task.project);
            barEl.style.left  = task.start + '%';
            barEl.style.width = Math.max(task.width, 4) + '%';

            var dueEl = document.createElement('span');
            dueEl.className = 'ws-tl-row__due';
            dueEl.textContent = task.due;

            trackEl.appendChild(barEl);
            trackEl.appendChild(dueEl);
            rowEl.appendChild(nameEl);
            rowEl.appendChild(trackEl);
            groupEl.appendChild(rowEl);
          });

          tlEl.appendChild(groupEl);
        });
      }

      renderTimeline();
      activeRender = renderTimeline;
      return function () { if (activeRender === renderTimeline) activeRender = null; };
    }
  });

  /* View: Task Detail */
  registry.register({
    id: 'task-detail',
    title: 'Task Detail',
    defaultPlacement: 'side-panel',
    factory: function (container, task) {
      if (!task) return function () {};

      var detailEl = document.createElement('div');
      detailEl.className = 'ws-detail';

      var projName     = PROJECTS[task.project] ? PROJECTS[task.project].name : task.project;
      var assigneeName = PEOPLE[task.assignee] || task.assignee;
      var priCls       = priorityBadge(task.priority);
      var stCls        = statusBadge(task.status);

      /* Header */
      var hdEl = document.createElement('div');
      hdEl.className = 'ws-detail__hd';
      var titleEl = document.createElement('h2');
      titleEl.className = 'ws-detail__title';
      titleEl.textContent = task.title;
      var closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'ws-detail__close';
      closeBtn.setAttribute('aria-label', 'Close task detail');
      closeBtn.textContent = 'X';
      hdEl.appendChild(titleEl);
      hdEl.appendChild(closeBtn);

      /* Fields */
      var fieldsEl = document.createElement('div');
      fieldsEl.className = 'ws-detail__fields';

      function addField(label, valueNode) {
        var f = document.createElement('div');
        f.className = 'ws-detail__field';
        var l = document.createElement('span');
        l.className = 'ws-detail__label';
        l.textContent = label;
        f.appendChild(l);
        f.appendChild(valueNode);
        fieldsEl.appendChild(f);
      }

      function textVal(txt) {
        var s = document.createElement('span');
        s.className = 'ws-detail__val';
        s.textContent = txt;
        return s;
      }

      function badgeVal(txt, cls) {
        var v = document.createElement('span');
        v.className = 'ws-detail__val';
        var b = document.createElement('span');
        b.className = 'ws-badge ' + cls;
        b.textContent = txt;
        v.appendChild(b);
        return v;
      }

      addField('Assignee', textVal(assigneeName));
      addField('Priority', badgeVal(task.priority, priCls));
      addField('Status',   badgeVal(task.status,   stCls));
      addField('Due Date', textVal(task.due));
      addField('Project',  textVal(projName));

      /* Description */
      var descEl = document.createElement('p');
      descEl.className = 'ws-detail__desc';
      descEl.setAttribute('aria-label', 'Task description');
      descEl.textContent = task.desc;

      /* Tags */
      var tagsEl = document.createElement('div');
      tagsEl.className = 'ws-detail__tags';
      tagsEl.setAttribute('aria-label', 'Tags');
      (task.tags || []).forEach(function (tag) {
        var b = document.createElement('span');
        b.className = 'ws-badge ws-badge--neutral';
        b.textContent = tag;
        tagsEl.appendChild(b);
      });

      /* Activity */
      var actHdEl = document.createElement('div');
      actHdEl.className = 'ws-detail__act-hd';
      actHdEl.id = 'act-hd-' + esc(task.id);
      actHdEl.textContent = 'Activity';

      var feedEl = document.createElement('div');
      feedEl.setAttribute('role', 'feed');
      feedEl.setAttribute('aria-labelledby', actHdEl.id);

      var tag0 = (task.tags && task.tags[0]) ? task.tags[0] : 'general';
      var activities = [
        { actor: 'AC', msg: 'commented 2h ago \u2014 Reviewed the edge cases. Looks good for staging.' },
        { actor: 'SK', msg: 'changed status to ' + task.status + ' 1d ago' },
        { actor: 'MJ', msg: 'assigned task to ' + assigneeName + ' 2d ago' },
        { actor: 'PP', msg: 'added tag ' + tag0 + ' 3d ago' }
      ];
      activities.forEach(function (a) {
        var item = document.createElement('div');
        item.className = 'ws-act-item';
        var strong = document.createElement('strong');
        strong.textContent = a.actor;
        item.appendChild(strong);
        item.appendChild(document.createTextNode(' ' + a.msg));
        feedEl.appendChild(item);
      });

      detailEl.appendChild(hdEl);
      detailEl.appendChild(fieldsEl);
      detailEl.appendChild(descEl);
      detailEl.appendChild(tagsEl);
      detailEl.appendChild(actHdEl);
      detailEl.appendChild(feedEl);
      container.appendChild(detailEl);

      closeBtn.addEventListener('click', function () {
        orchestrator.close('task-detail');
        shellEl.setAttribute('layout', 'full');
      });

      return function () {};
    }
  });

  /* View switching */

  function updateViewBtns(viewId) {
    var btns = document.querySelectorAll('.ws-view-btn');
    for (var i = 0; i < btns.length; i++) {
      var active = btns[i].getAttribute('data-view') === viewId;
      btns[i].setAttribute('aria-pressed', active ? 'true' : 'false');
    }
  }

  function switchToView(viewId) {
    currentView = viewId;
    if (orchestrator.isOpen('task-detail')) {
      orchestrator.close('task-detail');
      shellEl.setAttribute('layout', 'full');
    }
    orchestrator.closeAll();
    var scaffold = new M.StateScaffold(pageSlot, { state: 'loading' });
    setTimeout(function () {
      scaffold.destroy();
      pageSlot.innerHTML = '';
      orchestrator.open(viewId, 'page');
      updateViewBtns(viewId);
    }, 500);
  }

  function refreshCurrentView() {
    if (typeof activeRender === 'function') {
      activeRender();
    } else {
      switchToView(currentView);
    }
  }

  /* Toolbar view switcher */
  var viewGroup = document.querySelector('[role="group"][aria-label="View switcher"]');
  if (viewGroup) {
    viewGroup.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-view]');
      if (!btn) return;
      var viewId = btn.getAttribute('data-view');
      if (viewId === currentView) return;
      switchToView(viewId);
    });
  }

  /* Sidebar project filter */
  var projectNav = document.getElementById('project-nav');
  if (projectNav) {
    projectNav.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-project]');
      if (!btn) return;
      activeProject = btn.getAttribute('data-project');
      var allBtns = projectNav.querySelectorAll('[data-project]');
      for (var i = 0; i < allBtns.length; i++) {
        var isActive = allBtns[i].getAttribute('data-project') === activeProject;
        if (isActive) {
          allBtns[i].classList.add('is-active');
          allBtns[i].setAttribute('aria-current', 'true');
        } else {
          allBtns[i].classList.remove('is-active');
          allBtns[i].removeAttribute('aria-current');
        }
      }
      refreshCurrentView();
    });
  }

  /* Sidebar toggle */
  var sidebarToggle = document.getElementById('sidebar-toggle');
  if (sidebarToggle) {
    sidebarToggle.addEventListener('click', function () {
      var collapsed = shellEl.classList.contains('mn-app-shell--sidebar-collapsed');
      if (collapsed) {
        shellEl.classList.remove('mn-app-shell--sidebar-collapsed');
        sidebarToggle.setAttribute('aria-expanded', 'true');
      } else {
        shellEl.classList.add('mn-app-shell--sidebar-collapsed');
        sidebarToggle.setAttribute('aria-expanded', 'false');
      }
    });
  }

  /* Theme select */
  var themeSelect = document.getElementById('theme-select');
  if (themeSelect) {
    themeSelect.addEventListener('change', function (e) {
      M.setTheme(e.target.value);
    });
  }

  /* Command palette (Ctrl/Cmd+K) */
  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      if (typeof M.commandPalette === 'function') M.commandPalette();
    }
  });

  var cmdKBtn = document.getElementById('cmd-k-btn');
  if (cmdKBtn) {
    cmdKBtn.addEventListener('click', function () {
      if (typeof M.commandPalette === 'function') M.commandPalette();
    });
  }

  /* Init */
  M.setTheme('nero');
  switchToView('board');

})();
</script>
</body>
</html>

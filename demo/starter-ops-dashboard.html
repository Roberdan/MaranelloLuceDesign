<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvergIO Operations</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    /* ── Shell theme vars ── */
    body {
      --shell-bg: #0a0a0a; --shell-nav: #141414; --shell-card: #171717;
      --shell-card-2: #1d1d1d; --shell-border: #262626;
      --shell-text: #eee; --shell-muted: #9a9a9a; --shell-ghost: #666;
      --shell-accent: #FFC72C; --shell-accent-text: #111;
      margin: 0; background: var(--mn-surface); color: var(--mn-text);
      font-family: var(--font-body, sans-serif);
    }
    body.mn-avorio {
      --shell-bg: #f5efe4; --shell-nav: #f8f1e6; --shell-card: #fffaf4;
      --shell-card-2: #fffdf8; --shell-border: #d9cbb7;
      --shell-text: #241f19; --shell-muted: #7b6d5a; --shell-ghost: #8e7f6b;
      --shell-accent: #b7410e; --shell-accent-text: #fff8ef;
    }
    body.mn-colorblind { --shell-accent: #0072B2; --shell-accent-text: #fff; }
    body.mn-sugar {
      --shell-bg: #f4f4f6; --shell-nav: #fff; --shell-card: #fff;
      --shell-card-2: #ffffff; --shell-border: #d8d8de;
      --shell-text: #111; --shell-muted: #666; --shell-ghost: #888;
      --shell-accent: #111; --shell-accent-text: #fff;
    }

    /* ── Root layout ── */
    #app-root { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #app-body {
      display: grid;
      grid-template-columns: 240px 1fr;
      flex: 1 1 0; min-height: 0; overflow: hidden;
    }
    #app-body.detail-open { grid-template-columns: 240px 1fr 380px; }

    /* ── Navbar ── */
    #navbar { position: sticky; top: 0; z-index: 20; backdrop-filter: blur(12px); }
    body.mn-avorio #navbar, body.mn-sugar #navbar {
      background: color-mix(in srgb, var(--shell-nav) 96%, transparent);
    }
    #navbar .mn-header-shell { gap: 12px; background: var(--shell-nav); border-bottom-color: var(--shell-border); }
    #navbar .mn-header-shell__brand { color: var(--shell-text); font-size: 1rem; }
    #navbar .mn-header-shell__brand-logo {
      width: 28px; height: 28px;
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--shell-accent) 35%, transparent));
    }
    #navbar .mn-header-shell__actions--segmented,
    #navbar .mn-header-shell__actions--cluster {
      border-color: var(--shell-border); border-radius: 14px;
      background: var(--shell-card);
      box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 4%, transparent);
    }
    #navbar .mn-header-shell__action {
      min-width: 44px; min-height: 44px; border-radius: 10px; color: var(--shell-muted);
    }
    #navbar .mn-header-shell__action:hover {
      background: color-mix(in srgb, var(--shell-card-2) 92%, var(--shell-accent) 8%);
      color: var(--shell-text);
    }
    #navbar .mn-header-shell__action--active {
      background: color-mix(in srgb, var(--shell-accent) 20%, transparent);
      color: var(--shell-accent);
    }
    #navbar .mn-header-shell__action:disabled { opacity: .35; cursor: not-allowed; }
    #navbar .mn-header-shell__icon svg {
      width: 20px; height: 20px; fill: none; stroke: currentColor;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
    }
    #navbar .mn-header-shell__search {
      width: 100%; min-width: 0; min-height: 52px; padding: 8px 12px;
      gap: 12px; border-color: var(--shell-border); border-radius: 14px;
      background: var(--shell-card);
    }
    #navbar .mn-header-shell__search-input {
      flex: 1 1 14rem; min-width: 10rem; color: var(--shell-text); font-size: 1rem;
    }
    #navbar .mn-header-shell__search-input::placeholder {
      color: color-mix(in srgb, var(--shell-muted) 78%, transparent);
    }
    #navbar .mn-header-shell__shortcut {
      border-color: #444; background: #262626; color: #999; font-size: 0.875rem;
    }
    body.mn-avorio #navbar .mn-header-shell__shortcut,
    body.mn-sugar  #navbar .mn-header-shell__shortcut {
      border-color: var(--shell-border); background: var(--shell-card-2); color: var(--shell-muted);
    }
    #navbar .mn-header-shell__filters { display: none; }
    #navbar .mn-header-shell__filter-group legend {
      color: var(--shell-ghost); font-size: .78rem; letter-spacing: .08em; text-transform: uppercase;
    }
    #navbar .mn-header-shell__filter-option {
      min-height: 36px; border-color: var(--shell-border); background: transparent; color: var(--shell-text);
    }
    #navbar .mn-header-shell__filter-option.is-selected {
      color: var(--shell-accent);
      border-color: color-mix(in srgb, var(--shell-accent) 55%, var(--shell-border));
      background: color-mix(in srgb, var(--shell-accent) 12%, transparent);
    }
    #navbar .mn-header-shell__theme { padding-left: 14px; border-left-color: var(--shell-border); }
    #navbar .mn-profile-trigger {
      width: 40px; height: 40px; border-radius: 50%;
      background: color-mix(in srgb, var(--shell-accent) 18%, transparent);
      color: var(--shell-accent); font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid color-mix(in srgb, var(--shell-accent) 30%, var(--shell-border));
    }
    .mn-bell-badge {
      position: absolute; top: -6px; right: -8px;
      background: var(--mn-error, #dc2626); color: #fff;
      font-size: 0.6rem; font-weight: 700; line-height: 1;
      border-radius: 8px; padding: 2px 5px; pointer-events: none;
      font-family: var(--font-mono, monospace);
    }

    /* ── Sidebar ── */
    #sidebar {
      background: var(--mn-surface-raised); border-right: 1px solid var(--mn-border);
      display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; min-height: 0;
    }
    .sidebar-label {
      font-family: var(--font-display); font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--mn-text-muted); padding: 0.875rem 0.875rem 0.3rem;
    }
    .service-list { list-style: none; margin: 0; padding: 0 0.5rem 0.5rem; }
    .service-item {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.6rem;
      border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 0.68rem;
      color: var(--mn-text); cursor: pointer; transition: background 0.12s;
      border: none; background: transparent; width: 100%; text-align: left; min-height: 36px;
    }
    .service-item:hover { background: var(--mn-surface-sunken); }
    .service-item:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: 1px; }
    .service-item.is-active { background: var(--mn-surface-sunken); color: var(--mn-accent); }
    .svc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .svc-dot--ok    { background: var(--mn-success); }
    .svc-dot--warn  { background: var(--mn-warning); }
    .svc-dot--error { background: var(--mn-error); }
    .health-card {
      margin: 0.75rem 0.625rem; padding: 0.75rem 0.875rem;
      background: var(--mn-surface-sunken); border: 1px solid var(--mn-border);
      border-radius: var(--radius-md);
    }
    .health-card-title {
      font-family: var(--font-display); font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--mn-text-muted); margin-bottom: 0.35rem;
    }
    .health-pct {
      font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700;
      color: var(--mn-success); line-height: 1;
    }
    .health-sublabel { font-size: 0.65rem; color: var(--mn-text-muted); margin: 0.2rem 0 0.5rem; }
    .health-bar-track { height: 4px; background: var(--mn-border); border-radius: 2px; overflow: hidden; }
    .health-bar-fill { height: 100%; background: var(--mn-success); border-radius: 2px; }

    /* ── Main area ── */
    #main-area { overflow-y: auto; min-height: 0; background: var(--mn-surface); }
    .view { display: flex; flex-direction: column; min-height: 100%; }
    .view[hidden] { display: none; }
    .strip-mount { padding: 1rem 1.5rem 0; }
    .charts-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
      padding: 1rem 1.5rem 1.5rem;
    }
    .chart-card {
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem 0.875rem;
    }
    .chart-card-label {
      font-family: var(--font-display); font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--mn-text-muted); margin-bottom: 0.625rem;
    }
    .chart-card canvas { display: block; width: 100%; height: 120px; }
    .table-mount { padding: 1.25rem 1.5rem; min-height: 400px; }
    .status-mount { padding: 1.25rem 1.5rem; }

    /* ── Detail panel ── */
    #detail-panel {
      background: var(--mn-surface-raised); border-left: 1px solid var(--mn-border);
      display: flex; flex-direction: column; overflow: hidden; min-height: 0;
    }
    #detail-panel[hidden] { display: none; }
    .detail-topbar {
      display: flex; align-items: center; gap: 0.75rem; justify-content: space-between;
      padding: 0.875rem 1rem 0.75rem; border-bottom: 1px solid var(--mn-border); flex-shrink: 0;
    }
    .detail-title {
      font-family: var(--font-mono); font-size: 0.8rem; font-weight: 700;
      color: var(--mn-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .detail-close-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; min-width: 32px; border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); background: transparent;
      color: var(--mn-text-muted); cursor: pointer; transition: border-color 0.12s, color 0.12s;
    }
    .detail-close-btn:hover { border-color: var(--mn-accent); color: var(--mn-text); }
    .detail-close-btn:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: 2px; }
    .detail-close-btn svg {
      width: 16px; height: 16px; stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; fill: none;
    }
    .detail-tabs-bar {
      display: flex; padding: 0 1rem;
      border-bottom: 1px solid var(--mn-border); flex-shrink: 0;
    }
    .detail-tab-btn {
      padding: 0.6rem 0.875rem; border: none; background: transparent;
      font-family: var(--font-display); font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--mn-text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s; min-height: 40px;
    }
    .detail-tab-btn:hover { color: var(--mn-text); }
    .detail-tab-btn[aria-selected="true"] {
      color: var(--mn-accent); border-bottom-color: var(--mn-accent);
    }
    .detail-tab-btn:focus-visible { outline: 2px solid var(--mn-accent); outline-offset: 2px; }
    .detail-pane { flex: 1 1 0; overflow-y: auto; padding: 1rem; }
    .detail-pane[hidden] { display: none; }
    .detail-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 0.5rem 0; border-bottom: 1px solid var(--mn-border); font-size: 0.8rem;
      gap: 0.5rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-key { color: var(--mn-text-muted); font-family: var(--font-mono); flex-shrink: 0; }
    .detail-row-val { color: var(--mn-text); font-family: var(--font-mono); text-align: right; }
    .detail-timeline-item {
      display: flex; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid var(--mn-border);
    }
    .detail-timeline-item:last-child { border-bottom: none; }
    .detail-tl-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      margin-top: 0.3rem; background: var(--mn-accent);
    }
    .detail-tl-text { font-size: 0.78rem; color: var(--mn-text); line-height: 1.45; }
    .detail-tl-time { font-size: 0.65rem; color: var(--mn-text-muted); font-family: var(--font-mono); margin-top: 0.15rem; }
    .detail-related-item {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0;
      border-bottom: 1px solid var(--mn-border);
      font-size: 0.78rem; font-family: var(--font-mono); color: var(--mn-text-muted);
    }
    .detail-related-item:last-child { border-bottom: none; }
    .detail-related-id { color: var(--mn-accent); flex-shrink: 0; }

    /* ── Inline badges ── */
    .sev-badge, .st-badge, .env-badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700;
      font-family: var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.05em; white-space: nowrap;
    }
    .sev-badge--critical { background: color-mix(in srgb, var(--mn-error)   18%, transparent); color: var(--mn-error); }
    .sev-badge--warning  { background: color-mix(in srgb, var(--mn-warning) 18%, transparent); color: var(--mn-warning); }
    .sev-badge--info     { background: color-mix(in srgb, var(--mn-info)    18%, transparent); color: var(--mn-info); }
    .st-badge--open     { background: color-mix(in srgb, var(--mn-error)    15%, transparent); color: var(--mn-error); }
    .st-badge--ack      { background: color-mix(in srgb, var(--mn-warning)  15%, transparent); color: var(--mn-warning); }
    .st-badge--resolved { background: color-mix(in srgb, var(--mn-success)  15%, transparent); color: var(--mn-success); }
    .st-badge--running  { background: color-mix(in srgb, var(--mn-accent)   15%, transparent); color: var(--mn-accent); }
    .st-badge--success  { background: color-mix(in srgb, var(--mn-success)  15%, transparent); color: var(--mn-success); }
    .st-badge--failed   { background: color-mix(in srgb, var(--mn-error)    15%, transparent); color: var(--mn-error); }
    .st-badge--pending  { background: color-mix(in srgb, var(--mn-text-muted) 15%, transparent); color: var(--mn-text-muted); }
    .env-badge--prod    { background: color-mix(in srgb, var(--mn-error)    12%, transparent); color: var(--mn-error); }
    .env-badge--staging { background: color-mix(in srgb, var(--mn-warning)  12%, transparent); color: var(--mn-warning); }
    .env-badge--dev     { background: color-mix(in srgb, var(--mn-info)     12%, transparent); color: var(--mn-info); }

    /* ── Responsive ── */
    @media (max-width: 1200px) {
      #app-body { grid-template-columns: 200px 1fr; }
      #app-body.detail-open { grid-template-columns: 200px 1fr 320px; }
    }
    @media (max-width: 860px) {
      #app-body, #app-body.detail-open { grid-template-columns: 1fr; }
      #sidebar { display: none; }
      .charts-row { grid-template-columns: 1fr; }
      #navbar .mn-header-shell__shortcut { display: none; }
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body class="mn-nero">

<div id="app-root">
  <header id="navbar" role="banner"></header>

  <div id="app-body">

    <!-- ── Sidebar ── -->
    <nav id="sidebar" aria-label="Service navigation">
      <div class="sidebar-label" aria-hidden="true">Services</div>
      <ul class="service-list" role="list" id="service-list" aria-label="Services"></ul>
      <div class="sidebar-label" aria-hidden="true">System Health</div>
      <div class="health-card" aria-label="System health 99.97% uptime over 30 days">
        <div class="health-card-title">Uptime (30 d)</div>
        <div class="health-pct" aria-label="99.97 percent">99.97%</div>
        <div class="health-sublabel">Last incident: 18 days ago</div>
        <div class="health-bar-track" role="presentation">
          <div class="health-bar-fill" style="width:99.97%"></div>
        </div>
      </div>
    </nav>

    <!-- ── Main area ── -->
    <main id="main-area" role="main" aria-label="Main content">

      <section id="view-dashboard" class="view" aria-label="Dashboard">
        <div class="strip-mount">
          <div id="strip-zone" aria-label="Operations instrument strip"></div>
        </div>
        <div class="charts-row">
          <div class="chart-card">
            <div class="chart-card-label">Request Throughput (req/s)</div>
            <canvas id="sparkline-canvas" role="img" aria-label="Request throughput over the last 10 intervals"></canvas>
          </div>
          <div class="chart-card">
            <div class="chart-card-label">Errors by Service</div>
            <canvas id="bar-canvas" role="img" aria-label="Error counts per service"></canvas>
          </div>
        </div>
      </section>

      <section id="view-alerts" class="view" hidden aria-label="Alerts">
        <div class="table-mount" id="alerts-table-mount"></div>
      </section>

      <section id="view-deployments" class="view" hidden aria-label="Deployments">
        <div class="table-mount" id="deploys-table-mount"></div>
      </section>

      <section id="view-infrastructure" class="view" hidden aria-label="Infrastructure">
        <div class="status-mount" id="infra-status-mount"></div>
      </section>

    </main>

    <!-- ── Detail panel ── -->
    <aside id="detail-panel" hidden aria-label="Item detail">
      <div class="detail-topbar">
        <span class="detail-title" id="detail-panel-title">Detail</span>
        <button class="detail-close-btn" id="detail-close-btn" type="button" aria-label="Close detail panel">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <line x1="12" y1="4" x2="4" y2="12"/>
            <line x1="4" y1="4" x2="12" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="detail-tabs-bar" role="tablist" aria-label="Detail section tabs" id="detail-tablist">
        <button class="detail-tab-btn" type="button" role="tab" data-pane="dp-details"
          aria-selected="true" aria-controls="dp-details">Details</button>
        <button class="detail-tab-btn" type="button" role="tab" data-pane="dp-timeline"
          aria-selected="false" aria-controls="dp-timeline">Timeline</button>
        <button class="detail-tab-btn" type="button" role="tab" data-pane="dp-related"
          aria-selected="false" aria-controls="dp-related">Related</button>
      </div>
      <div class="detail-pane" id="dp-details"  role="tabpanel" tabindex="0"></div>
      <div class="detail-pane" id="dp-timeline" role="tabpanel" tabindex="0" hidden></div>
      <div class="detail-pane" id="dp-related"  role="tabpanel" tabindex="0" hidden></div>
    </aside>

  </div><!-- #app-body -->
</div><!-- #app-root -->

<script src="../dist/iife/maranello.min.js"></script>
<script type="module" src="../packages/elements/dist/wc/mn-header-shell.js"></script>
<script>

    { id:'ALT-012', severity:'critical', service:'redis-cache',  message:'Node cache-03 unresponsive',            time:'1h 38m ago',  status:'resolved', assignee:'Pavel Novak',      node:'cache-03',      region:'eu-west-1'  },
    { id:'ALT-013', severity:'info',     service:'user-db',      message:'Slow query avg 2.1s on users_idx',      time:'1h 55m ago',  status:'open',     assignee:'Omar Eriksson',    node:'db-primary',    region:'us-east-1'  },
    { id:'ALT-014', severity:'warning',  service:'blob-storage', message:'Bucket policy drift detected',          time:'2h ago',      status:'open',     assignee:'Yuki Tanaka',      node:'blob-eu-1',     region:'eu-west-1'  },
    { id:'ALT-015', severity:'info',     service:'api-gateway',  message:'Rate limit hit on /v1/export',          time:'2h 15m ago',  status:'resolved', assignee:'Fatima Al-Rashid', node:'gw-prod-3',     region:'us-east-1'  },
    { id:'ALT-016', severity:'critical', service:'task-queue',   message:'Dead-letter queue 312 messages',        time:'2h 30m ago',  status:'open',     assignee:'Pavel Novak',      node:'tq-dlq-01',     region:'us-east-1'  },
    { id:'ALT-017', severity:'warning',  service:'auth-service', message:'JWKS rotation failed (retry 2/3)',      time:'3h ago',      status:'ack',      assignee:'Omar Eriksson',    node:'auth-pod-1',    region:'ap-south-1' },
    { id:'ALT-018', severity:'info',     service:'user-db',      message:'Vacuum scheduled on users table',       time:'3h 20m ago',  status:'resolved', assignee:'Yuki Tanaka',      node:'db-primary',    region:'us-east-1'  },
    { id:'ALT-019', severity:'info',     service:'blob-storage', message:'Lifecycle rule expired 4.2 TB',         time:'4h ago',      status:'resolved', assignee:'Fatima Al-Rashid', node:'blob-ap-1',     region:'ap-south-1' },
    { id:'ALT-020', severity:'warning',  service:'api-gateway',  message:'Upstream timeout on auth-service call', time:'4h 40m ago',  status:'resolved', assignee:'Pavel Novak',      node:'gw-prod-2',     region:'eu-west-1'  }
  ];

  var DEPLOYS = [
    { id:'DPL-001', service:'api-gateway',  version:'v3.2.1', env:'prod',    status:'success', deployer:'Omar Eriksson',    time:'14m ago',    region:'us-east-1'  },
    { id:'DPL-002', service:'auth-service', version:'v2.8.0', env:'prod',    status:'running', deployer:'Yuki Tanaka',      time:'28m ago',    region:'eu-west-1'  },
    { id:'DPL-003', service:'user-db',      version:'v1.5.4', env:'staging', status:'success', deployer:'Fatima Al-Rashid', time:'1h ago',     region:'us-east-1'  },
    { id:'DPL-004', service:'redis-cache',  version:'v4.0.2', env:'prod',    status:'failed',  deployer:'Pavel Novak',      time:'1h 12m ago', region:'eu-west-1'  },
    { id:'DPL-005', service:'task-queue',   version:'v2.1.9', env:'staging', status:'success', deployer:'Omar Eriksson',    time:'2h ago',     region:'ap-south-1' },
    { id:'DPL-006', service:'blob-storage', version:'v1.9.3', env:'prod',    status:'success', deployer:'Yuki Tanaka',      time:'2h 30m ago', region:'us-east-1'  },
    { id:'DPL-007', service:'api-gateway',  version:'v3.1.8', env:'dev',     status:'success', deployer:'Fatima Al-Rashid', time:'3h ago',     region:'us-east-1'  },
    { id:'DPL-008', service:'auth-service', version:'v2.7.5', env:'staging', status:'pending', deployer:'Pavel Novak',      time:'3h 20m ago', region:'eu-west-1'  },
    { id:'DPL-009', service:'user-db',      version:'v1.5.3', env:'prod',    status:'success', deployer:'Omar Eriksson',    time:'4h ago',     region:'ap-south-1' },
    { id:'DPL-010', service:'task-queue',   version:'v2.1.8', env:'prod',    status:'success', deployer:'Yuki Tanaka',      time:'5h ago',     region:'us-east-1'  },
    { id:'DPL-011', service:'redis-cache',  version:'v3.9.7', env:'dev',     status:'success', deployer:'Fatima Al-Rashid', time:'6h ago',     region:'eu-west-1'  },
    { id:'DPL-012', service:'blob-storage', version:'v1.8.9', env:'staging', status:'success', deployer:'Pavel Novak',      time:'7h ago',     region:'us-east-1'  }
  ];

  var INFRA = [
    { name: 'API Gateway',   check: function () { return Promise.resolve({ ok: true,  ms: 42   }); } },
    { name: 'Auth Service',  check: function () { return Promise.resolve({ ok: true,  ms: 78   }); } },
    { name: 'User Database', check: function () { return Promise.resolve({ ok: true,  ms: 134  }); } },
    { name: 'Redis Cache',   check: function () { return Promise.resolve({ ok: true,  ms: 1240 }); } },
    { name: 'Task Queue',    check: function () { return Promise.resolve({ ok: false, ms: 0    }); } },
    { name: 'Blob Storage',  check: function () { return Promise.resolve({ ok: true,  ms: 88   }); } }
  ];

  /* ── App state ── */
  var state = { view: 'dashboard', severity: 'all', query: '' };
  var alertsInst = null;
  var deploysInst = null;
  var statusCtrl = null;
  var stripCtrl = null;

  /* ── Utilities ── */
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function sevBadge(v) {
    return '<span class="sev-badge sev-badge--' + esc(v) + '">' + esc(v) + '</span>';
  }
  function stBadge(v) {
    return '<span class="st-badge st-badge--' + esc(v) + '">' + esc(v) + '</span>';
  }
  function envBadge(v) {
    return '<span class="env-badge env-badge--' + esc(v) + '">' + esc(v) + '</span>';
  }

  /* ── Filtered data ── */
  function filteredAlerts() {
    return ALERTS.filter(function (a) {
      if (state.severity !== 'all' && a.severity !== state.severity) return false;
      if (!state.query) return true;
      var q = state.query.toLowerCase();
      return (a.service + ' ' + a.message + ' ' + a.id).toLowerCase().indexOf(q) !== -1;
    });
  }

  function filteredDeploys() {
    if (!state.query) return DEPLOYS;
    var q = state.query.toLowerCase();
    return DEPLOYS.filter(function (d) {
      return (d.service + ' ' + d.version + ' ' + d.id).toLowerCase().indexOf(q) !== -1;
    });
  }

  /* ── Sidebar ── */
  function buildSidebar() {
    var list = document.getElementById('service-list');
    if (!list) return;
    list.textContent = '';
    SERVICES.forEach(function (svc) {
      var li = document.createElement('li');
      li.setAttribute('role', 'listitem');
      var btn = document.createElement('button');
      btn.className = 'service-item';
      btn.setAttribute('type', 'button');
      btn.setAttribute('aria-label', svc.label + ': status ' + svc.status);
      var dotClass = svc.status === 'ok' ? 'svc-dot--ok' : svc.status === 'warn' ? 'svc-dot--warn' : 'svc-dot--error';
      var dot = document.createElement('span');
      dot.className = 'svc-dot ' + dotClass;
      dot.setAttribute('aria-hidden', 'true');
      var labelEl = document.createElement('span');
      labelEl.textContent = svc.label;
      btn.appendChild(dot);
      btn.appendChild(labelEl);
      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  /* ── View management ── */
  var VIEW_IDS = ['dashboard', 'alerts', 'deployments', 'infrastructure'];

  function showView(id) {
    state.view = id;
    VIEW_IDS.forEach(function (v) {
      var el = document.getElementById('view-' + v);
      if (!el) return;
      if (v === id) el.removeAttribute('hidden');
      else el.setAttribute('hidden', '');
    });
    if (id === 'dashboard')       mountDashboard();
    else if (id === 'alerts')     mountAlerts();
    else if (id === 'deployments') mountDeploys();
    else if (id === 'infrastructure') mountInfra();
    syncNavButtons();
  }

  function syncNavButtons() {
    VIEW_IDS.forEach(function (v) {
      var btn = document.querySelector('[data-header-shell-action-id="' + v + '"]');
      if (!btn) return;
      if (v === state.view) btn.classList.add('mn-header-shell__action--active');
      else btn.classList.remove('mn-header-shell__action--active');
    });
  }

  /* ── Dashboard view ── */
  function mountDashboard() {
    var stripEl = document.getElementById('strip-zone');
    if (stripEl && M.dashboardStrip && !stripCtrl) {
      stripCtrl = M.dashboardStrip(stripEl, {
        ariaLabel: 'Operations metrics',
        animate: true,
        zones: [
          {
            type: 'gauge',
            label: 'Utilization',
            value: 86,
            max: 100,
            unit: '%',
            thresholds: [{ value: 75, color: 'warning' }, { value: 90, color: 'danger' }]
          },
          {
            type: 'pipeline',
            label: 'Pipeline',
            stages: [
              { label: 'Build',  value: 100, status: 'ok'   },
              { label: 'Test',   value: 98,  status: 'ok'   },
              { label: 'Stage',  value: 94,  status: 'warn' },
              { label: 'Deploy', value: 87,  status: 'warn' }
            ]
          },
          {
            type: 'trend',
            label: 'Traffic',
            metrics: [
              { label: 'Req/s', value: '4,218', trend: [38, 42, 39, 48, 51, 47, 53, 55, 52, 58] },
              { label: 'Err/s', value: '1.3',   trend: [0.8, 1.1, 0.9, 1.4, 1.2, 1.5, 1.3, 1.1, 1.4, 1.3] }
            ]
          },
          {
            type: 'board',
            label: 'Status',
            cells: [
              { label: 'Uptime',    value: '99.97%' },
              { label: 'Deploys',   value: '12'     },
              { label: 'Incidents', value: '3'      },
              { label: 'Resp ms',   value: '142'    }
            ]
          }
        ]
      });
    }

    var sparkCanvas = document.getElementById('sparkline-canvas');
    if (sparkCanvas && M.sparkline) {
      M.sparkline(sparkCanvas, [3810, 3940, 4120, 3980, 4050, 4210, 4180, 4318, 4100, 4218], {
        color: 'var(--mn-accent)', fillOpacity: 0.18, smooth: true, showDot: true
      });
    }

    var barCanvas = document.getElementById('bar-canvas');
    if (barCanvas && M.charts && M.charts.barChart) {
      M.charts.barChart(barCanvas, [
        { label: 'api-gw',  value: 14 },
        { label: 'auth',    value: 7  },
        { label: 'user-db', value: 3  },
        { label: 'redis',   value: 21 },
        { label: 'queue',   value: 38 },
        { label: 'blob',    value: 5  }
      ], { showLabels: true, animate: true });
    }
  }

  /* ── Alerts view ── */
  function mountAlerts() {
    var host = document.getElementById('alerts-table-mount');
    if (!host || !M.dataTable) return;
    if (alertsInst) { alertsInst.destroy(); alertsInst = null; }
    host.textContent = '';
    alertsInst = M.dataTable(host, {
      columns: [
        { key: 'severity', label: 'Severity', type: 'badge', sortable: true, width: 100, render: sevBadge },
        { key: 'service',  label: 'Service',  type: 'text',  sortable: true, width: 140 },
        { key: 'message',  label: 'Message',  type: 'text',  sortable: false },
        { key: 'time',     label: 'Time',     type: 'text',  sortable: true, width: 105 },
        { key: 'status',   label: 'Status',   type: 'badge', sortable: true, width: 110, render: stBadge }
      ],
      data: filteredAlerts(),
      selectable: true,
      stickyHeader: true,
      onRowClick: function (row) { openDetail('alert', row); }
    });
  }

  /* ── Deployments view ── */
  function mountDeploys() {
    var host = document.getElementById('deploys-table-mount');
    if (!host || !M.dataTable) return;
    if (deploysInst) { deploysInst.destroy(); deploysInst = null; }
    host.textContent = '';
    deploysInst = M.dataTable(host, {
      columns: [
        { key: 'service',  label: 'Service',     type: 'text',  sortable: true, width: 130 },
        { key: 'version',  label: 'Version',     type: 'text',  sortable: true, width: 90  },
        { key: 'env',      label: 'Environment', type: 'badge', sortable: true, width: 110, render: envBadge },
        { key: 'status',   label: 'Status',      type: 'badge', sortable: true, width: 110, render: stBadge },
        { key: 'deployer', label: 'Deployed By', type: 'text',  sortable: true, width: 155 },
        { key: 'time',     label: 'Time',        type: 'text',  sortable: true, width: 110 },
        { key: 'region',   label: 'Region',      type: 'text',  sortable: true, width: 110 }
      ],
      data: filteredDeploys(),
      selectable: true,
      stickyHeader: true,
      onRowClick: function (row) { openDetail('deploy', row); }
    });
  }

  /* ── Infrastructure view ── */
  function mountInfra() {
    var host = document.getElementById('infra-status-mount');
    if (!host || !M.systemStatus) return;
    host.textContent = '';
    if (statusCtrl && statusCtrl.destroy) statusCtrl.destroy();
    statusCtrl = M.systemStatus(host, {
      version: 'v3.2.1',
      environment: 'production',
      services: INFRA
    });
  }

  /* ── Detail panel ── */
  function openDetail(type, row) {
    var titleEl = document.getElementById('detail-panel-title');
    var panel   = document.getElementById('detail-panel');
    var body    = document.getElementById('app-body');
    if (titleEl) titleEl.textContent = type === 'alert' ? 'Alert ' + row.id : 'Deploy ' + row.id;
    renderDetailRows(row, type);
    renderTimeline(row, type);
    renderRelated(row, type);
    activateTab('dp-details');
    if (panel) panel.removeAttribute('hidden');
    if (body)  body.classList.add('detail-open');
  }

  function closeDetail() {
    var panel = document.getElementById('detail-panel');
    var body  = document.getElementById('app-body');
    if (panel) panel.setAttribute('hidden', '');
    if (body)  body.classList.remove('detail-open');
  }

  function detailRow(key, val) {
    return '<div class="detail-row">'
      + '<span class="detail-row-key">' + esc(key) + '</span>'
      + '<span class="detail-row-val">' + esc(val) + '</span>'
      + '</div>';
  }

  function renderDetailRows(row, type) {
    var el = document.getElementById('dp-details');
    if (!el) return;
    var pairs;
    if (type === 'alert') {
      pairs = [
        ['ID', row.id], ['Severity', row.severity], ['Service', row.service],
        ['Message', row.message], ['Time', row.time], ['Status', row.status],
        ['Assigned To', row.assignee], ['Node', row.node], ['Region', row.region]
      ];
    } else {
      pairs = [
        ['ID', row.id], ['Service', row.service], ['Version', row.version],
        ['Environment', row.env], ['Status', row.status],
        ['Deployed By', row.deployer], ['Time', row.time], ['Region', row.region]
      ];
    }
    var html = '';
    pairs.forEach(function (p) { html += detailRow(p[0], p[1]); });
    el.innerHTML = html;
  }

  function renderTimeline(row, type) {
    var el = document.getElementById('dp-timeline');
    if (!el) return;
    var events;
    if (type === 'alert') {
      events = [
        { text: 'Alert triggered on ' + row.node, time: row.time },
        { text: 'On-call notified: ' + row.assignee, time: 'shortly after' },
        { text: 'Status set to ' + row.status, time: 'current' }
      ];
    } else {
      events = [
        { text: 'Deploy queued by ' + row.deployer, time: row.time },
        { text: 'Container image built and pushed', time: 'in progress' },
        { text: 'Rollout to ' + row.region + ' — ' + row.status, time: 'current' }
      ];
    }
    var html = '';
    events.forEach(function (e) {
      html += '<div class="detail-timeline-item">'
        + '<span class="detail-tl-dot" aria-hidden="true"></span>'
        + '<div><div class="detail-tl-text">' + esc(e.text) + '</div>'
        + '<div class="detail-tl-time">' + esc(e.time) + '</div></div>'
        + '</div>';
    });
    el.innerHTML = html;
  }

  function renderRelated(row, type) {
    var el = document.getElementById('dp-related');
    if (!el) return;
    var items;
    if (type === 'alert') {
      items = ALERTS.filter(function (a) { return a.service === row.service && a.id !== row.id; }).slice(0, 5);
    } else {
      items = DEPLOYS.filter(function (d) { return d.service === row.service && d.id !== row.id; }).slice(0, 5);
    }
    if (!items.length) {
      el.innerHTML = '<p style="color:var(--mn-text-muted);font-size:0.8rem;padding:0.5rem 0">No related items found.</p>';
      return;
    }
    var html = '';
    items.forEach(function (r) {
      var desc = type === 'alert' ? r.severity + ' — ' + r.message : r.version + ' — ' + r.status;
      html += '<div class="detail-related-item">'
        + '<span class="detail-related-id">' + esc(r.id) + '</span>'
        + '<span>' + esc(desc) + '</span>'
        + '</div>';
    });
    el.innerHTML = html;
  }

  function activateTab(paneId) {
    var tablist = document.getElementById('detail-tablist');
    if (!tablist) return;
    var tabs  = tablist.querySelectorAll('.detail-tab-btn');
    var panes = ['dp-details', 'dp-timeline', 'dp-related'];
    var i;
    for (i = 0; i < tabs.length; i++) {
      tabs[i].setAttribute('aria-selected', tabs[i].getAttribute('data-pane') === paneId ? 'true' : 'false');
    }
    panes.forEach(function (p) {
      var paneEl = document.getElementById(p);
      if (!paneEl) return;
      if (p === paneId) paneEl.removeAttribute('hidden');
      else paneEl.setAttribute('hidden', '');
    });
  }

  /* Tab and close button wiring */
  var tablistEl = document.getElementById('detail-tablist');
  if (tablistEl) {
    tablistEl.addEventListener('click', function (e) {
      var btn = e.target.closest('.detail-tab-btn');
      if (btn) activateTab(btn.getAttribute('data-pane'));
    });
  }
  var closeBtn = document.getElementById('detail-close-btn');
  if (closeBtn) closeBtn.addEventListener('click', closeDetail);

  /* ── Build sidebar ── */
  buildSidebar();

  /* ── Mount header shell ── */
  var navbar = document.getElementById('navbar');
  if (!navbar) return;

  function icon(name) {
    if (M.icons && typeof M.icons[name] === 'function') return M.icons[name]();
    return '';
  }

  var headerHost = document.createElement('mn-header-shell');
  headerHost.config = {
    ariaLabel: 'ConvergIO Operations navigation',
    sections: [
      {
        type: 'brand',
        label: 'ConvergIO Operations',
        logoSrc: '../src/assets/favicon.svg',
        logoAlt: 'ConvergIO Operations logo',
        href: './index.html'
      },
      {
        type: 'actions',
        role: 'pre',
        presentation: 'segmented',
        items: [
          { id: 'dashboard',      label: 'Dashboard',      active: true },
          { id: 'alerts',         label: 'Alerts' },
          { id: 'deployments',    label: 'Deployments' },
          { id: 'infrastructure', label: 'Infrastructure' }
        ]
      },
      {
        type: 'search',
        placeholder: 'Search alerts, services...',
        shortcut: 'Cmd-K',
        filterButtonLabel: 'Severity',
        filters: [
          {
            id: 'severity',
            label: 'Severity',
            options: [
              { id: 'all',      label: 'All' },
              { id: 'critical', label: 'Critical' },
              { id: 'warning',  label: 'Warning' },
              { id: 'info',     label: 'Info' }
            ]
          }
        ]
      },
      {
        type: 'actions',
        role: 'post',
        presentation: 'cluster',
        items: [
          { id: 'notifications', title: 'Notifications (3 unread)', icon: icon('bell') },
          { id: 'settings',      title: 'Settings',                 icon: icon('settings') }
        ]
      },
      { type: 'divider' },
      { type: 'theme' },
      { type: 'profile', name: 'Omar Eriksson' }
    ],
    callbacks: {
      onAction: function (payload) {
        var viewList = ['dashboard', 'alerts', 'deployments', 'infrastructure'];
        if (viewList.indexOf(payload.id) !== -1) showView(payload.id);
      },
      onSearch: function (payload) {
        state.query = payload.query;
        if (state.view === 'alerts' && alertsInst && alertsInst.setData) {
          alertsInst.setData(filteredAlerts());
        } else if (state.view === 'deployments' && deploysInst && deploysInst.setData) {
          deploysInst.setData(filteredDeploys());
        }
      },
      onFilter: function (payload) {
        if (payload.groupId === 'severity') {
          var val = payload.values && payload.values.length ? payload.values[0] : 'all';
          state.severity = val;
          if (state.view === 'alerts' && alertsInst && alertsInst.setData) {
            alertsInst.setData(filteredAlerts());
          }
        }
      }
    }
  };

  navbar.textContent = '';
  navbar.appendChild(headerHost);

  /* After header mounts: add notification badge, sync buttons */
  var whenReady = typeof headerHost.whenReady === 'function'
    ? headerHost.whenReady()
    : Promise.resolve();

  whenReady.then(function () {
    if (!headerHost.isConnected) return;
    syncNavButtons();
    var bellBtn = headerHost.querySelector('[data-header-shell-action-id="notifications"]');
    if (bellBtn) {
      bellBtn.style.position = 'relative';
      var badge = document.createElement('span');
      badge.className = 'mn-bell-badge';
      badge.setAttribute('aria-hidden', 'true');
      badge.textContent = '3';
      bellBtn.appendChild(badge);
    }
  });

  /* Initial mount */
  mountDashboard();

})();
</script>

</body>
</html>

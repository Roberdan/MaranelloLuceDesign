<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvergIO Operations — NOC/DevOps Dashboard</title>
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    body { margin: 0; background: var(--mn-surface); color: var(--mn-text); }

    /* ── Toolbar ── */
    .toolbar-inner {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0 0.75rem; flex-wrap: nowrap;
      background: var(--mn-surface-raised);
      border-bottom: 1px solid var(--mn-border);
      min-height: 48px;
    }
    .toolbar-brand {
      font-family: var(--font-display); font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--mn-accent); white-space: nowrap; margin-right: 0.5rem;
    }
    .toolbar-sep { width: 1px; height: 20px; background: var(--mn-border); margin: 0 0.25rem; }
    .toolbar-spacer { flex: 1; min-width: 0.5rem; }
    .view-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-family: var(--font-display); font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 6px 10px; border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); background: transparent;
      color: var(--mn-text-muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap; min-height: 32px;
    }
    .view-btn:hover { border-color: var(--mn-accent); color: var(--mn-text); }
    .view-btn[aria-pressed="true"] {
      border-color: var(--mn-accent); color: var(--mn-accent);
      background: var(--mn-surface-sunken);
    }
    .view-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
    .toolbar-icon-btn {
      position: relative; display: inline-flex; align-items: center;
      justify-content: center; width: 32px; height: 32px;
      border: 1px solid var(--mn-border); border-radius: var(--radius-md);
      background: transparent; color: var(--mn-text-muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s; flex-shrink: 0;
    }
    .toolbar-icon-btn:hover { border-color: var(--mn-accent); color: var(--mn-text); }
    .toolbar-icon-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .badge-count {
      position: absolute; top: -4px; right: -4px;
      background: var(--mn-error); color: var(--mn-text-inverse);
      font-family: var(--font-mono); font-size: 0.55rem; font-weight: 700;
      border-radius: 8px; padding: 1px 4px; line-height: 1.4;
      pointer-events: none;
    }
    .toolbar-avatar {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--mn-accent); color: var(--mn-surface);
      font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700;
      flex-shrink: 0; cursor: default;
    }

    /* ── Sidebar ── */
    .sidebar-section-label {
      font-family: var(--font-display); font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); padding: 0.75rem 0.75rem 0.25rem;
    }
    .service-list { list-style: none; margin: 0; padding: 0 0.5rem; }
    .service-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.5rem; border-radius: var(--radius-md);
      font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--mn-text); cursor: pointer;
      transition: background 0.12s;
    }
    .service-item:hover { background: var(--mn-surface-raised); }
    .service-item.is-active { background: var(--mn-surface-sunken); color: var(--mn-accent); }
    .service-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-green  { background: var(--mn-success); }
    .dot-amber  { background: var(--mn-warning); }
    .dot-red    { background: var(--mn-error); }
    .health-summary {
      margin: 0.75rem 0.5rem 0; padding: 0.6rem 0.75rem;
      background: var(--mn-surface-raised); border-radius: var(--radius-md);
      border: 1px solid var(--mn-border);
    }
    .health-label {
      font-family: var(--font-display); font-size: 0.55rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); margin-bottom: 0.35rem;
    }
    .health-value {
      font-family: var(--font-mono); font-size: 0.9rem;
      color: var(--mn-accent); font-weight: 700; margin-bottom: 0.35rem;
    }
    .health-bar {
      height: 4px; border-radius: 2px;
      background: var(--mn-surface-sunken);
      overflow: hidden;
    }
    .health-bar-fill {
      height: 100%; border-radius: 2px;
      background: var(--mn-accent); width: 99.97%;
    }

    /* ── Layout slots ── */
    #mn-slot-page .mn-panel-view,
    #mn-slot-side-panel .mn-panel-view { height: 100%; }

    /* ── View container padding ── */
    .view-pad { padding: 1rem; height: 100%; box-sizing: border-box; overflow: auto; }

    /* ── Panel box ── */
    .panel-box {
      border: 1px solid var(--mn-border); border-radius: var(--radius-md);
      background: var(--mn-surface-raised); padding: 0.75rem;
    }
    .panel-title {
      font-family: var(--font-display); font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); margin: 0 0 0.5rem;
    }

    /* ── Dashboard charts row ── */
    .charts-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; margin-top: 1rem;
    }
    .chart-canvas-wrap { height: 120px; position: relative; }
    .chart-canvas-wrap canvas { width: 100% !important; height: 100% !important; }

    /* ── Infrastructure grid ── */
    .infra-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .infra-card {
      padding: 0.75rem; border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); background: var(--mn-surface-raised);
    }
    .infra-card-name {
      font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--mn-text); margin-bottom: 0.4rem; font-weight: 600;
    }
    .infra-card-row {
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 0.6rem;
      color: var(--mn-text-muted); margin-bottom: 0.25rem;
    }
    .infra-card-row .value { color: var(--mn-text); font-weight: 600; }
    .infra-status { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
    .infra-status .label {
      font-family: var(--font-display); font-size: 0.55rem;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--mn-text-muted);
    }

    /* ── Side detail panel ── */
    .detail-panel {
      display: flex; flex-direction: column; height: 100%;
      background: var(--mn-surface); overflow: hidden;
    }
    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--mn-border);
      background: var(--mn-surface-raised); flex-shrink: 0;
    }
    .detail-title {
      font-family: var(--font-display); font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--mn-text);
    }
    .detail-close {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); background: transparent;
      color: var(--mn-text-muted); cursor: pointer; font-size: 1rem;
      line-height: 1;
    }
    .detail-close:hover { border-color: var(--mn-error); color: var(--mn-error); }
    .detail-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--mn-border);
      background: var(--mn-surface-raised); flex-shrink: 0;
    }
    .detail-tab {
      padding: 0.5rem 1rem; font-family: var(--font-display); font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--mn-text-muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      background: transparent; border-top: none; border-left: none; border-right: none;
      transition: color 0.12s, border-color 0.12s;
    }
    .detail-tab:hover { color: var(--mn-text); }
    .detail-tab.is-active { color: var(--mn-accent); border-bottom-color: var(--mn-accent); }
    .detail-body { flex: 1; overflow: auto; padding: 1rem; }
    .detail-tab-pane { display: none; }
    .detail-tab-pane.is-active { display: block; }
    .detail-field { margin-bottom: 0.75rem; }
    .detail-field-label {
      font-family: var(--font-display); font-size: 0.55rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); margin-bottom: 0.2rem;
    }
    .detail-field-value {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--mn-text);
    }
    .timeline { list-style: none; margin: 0; padding: 0; }
    .timeline-item {
      display: flex; gap: 0.6rem; padding: 0.4rem 0;
      border-bottom: 1px solid var(--mn-border); font-size: 0.65rem;
    }
    .timeline-time { color: var(--mn-text-muted); font-family: var(--font-mono); white-space: nowrap; }
    .timeline-msg { color: var(--mn-text); font-family: var(--font-mono); }
    .log-block {
      background: var(--mn-surface-sunken); border-radius: var(--radius-md);
      padding: 0.6rem; font-family: var(--font-mono); font-size: 0.6rem;
      color: var(--mn-text-muted); white-space: pre-wrap; word-break: break-all;
      max-height: 180px; overflow: auto; line-height: 1.5;
    }
    .affected-list { list-style: none; margin: 0; padding: 0; }
    .affected-list li {
      font-family: var(--font-mono); font-size: 0.65rem; color: var(--mn-text);
      padding: 0.2rem 0; border-bottom: 1px solid var(--mn-border);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      font-family: var(--font-mono); font-size: 0.55rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 2px 7px; border-radius: 3px; line-height: 1.4;
    }
    .badge-critical { background: var(--mn-error);   color: var(--mn-text-inverse); }
    .badge-warning  { background: var(--mn-warning); color: var(--mn-surface); }
    .badge-info     { background: var(--mn-info);    color: var(--mn-text-inverse); }
    .badge-success  { background: var(--mn-success); color: var(--mn-text-inverse); }
    .badge-purple   { background: var(--mn-accent);  color: var(--mn-surface); }
    .badge-muted    { background: var(--mn-surface-sunken); color: var(--mn-text-muted);
                      border: 1px solid var(--mn-border); }
    .badge-active      { background: var(--mn-error);   color: var(--mn-text-inverse); }
    .badge-resolved    { background: var(--mn-success); color: var(--mn-text-inverse); }
    .badge-investigating { background: var(--mn-warning); color: var(--mn-surface); }
    .badge-deploying   { background: var(--mn-info); color: var(--mn-text-inverse); }
    .badge-rolled-back { background: var(--mn-surface-sunken); color: var(--mn-text-muted);
                         border: 1px solid var(--mn-border); }
    .badge-prod  { background: var(--mn-error);   color: var(--mn-text-inverse); }
    .badge-stage { background: var(--mn-warning); color: var(--mn-surface); }
    .badge-dev   { background: var(--mn-success); color: var(--mn-text-inverse); }

    @media (max-width: 680px) {
      .charts-row { grid-template-columns: 1fr; }
      .view-btn span { display: none; }
    }
  </style>
</head>
<body class="mn-nero">

  <mn-app-shell id="ops-shell" layout="full">

    <!-- NAV SLOT: Service tree sidebar -->
    <div slot="nav">
      <aside class="mn-sidebar" aria-label="Service navigation">
        <div class="mn-sidebar__header">
          <span class="mn-sidebar__brand">Ops Center</span>
        </div>
        <p class="sidebar-section-label">Services</p>
        <ul class="service-list" id="service-list" role="list" aria-label="Service status">
          <li class="service-item is-active" data-service="all" role="button" tabindex="0"
              aria-pressed="true" aria-label="All services">
            <span class="service-dot dot-green" aria-hidden="true"></span>All Services
          </li>
          <li class="service-item" data-service="api-gateway" role="button" tabindex="0"
              aria-label="API Gateway - operational">
            <span class="service-dot dot-green" aria-hidden="true"></span>API Gateway
          </li>
          <li class="service-item" data-service="auth-service" role="button" tabindex="0"
              aria-label="Auth Service - operational">
            <span class="service-dot dot-green" aria-hidden="true"></span>Auth Service
          </li>
          <li class="service-item" data-service="user-db" role="button" tabindex="0"
              aria-label="User Database - operational">
            <span class="service-dot dot-green" aria-hidden="true"></span>User Database
          </li>
          <li class="service-item" data-service="redis-cache" role="button" tabindex="0"
              aria-label="Redis Cache - degraded">
            <span class="service-dot dot-amber" aria-hidden="true"></span>Redis Cache
          </li>
          <li class="service-item" data-service="task-queue" role="button" tabindex="0"
              aria-label="Task Queue - critical">
            <span class="service-dot dot-red" aria-hidden="true"></span>Task Queue
          </li>
          <li class="service-item" data-service="blob-storage" role="button" tabindex="0"
              aria-label="Blob Storage - operational">
            <span class="service-dot dot-green" aria-hidden="true"></span>Blob Storage
          </li>
        </ul>

        <div class="health-summary" role="region" aria-label="System health summary">
          <div class="health-label">System Health</div>
          <div class="health-value" aria-live="polite">99.97%</div>
          <div class="health-bar" role="progressbar" aria-valuenow="99.97"
               aria-valuemin="0" aria-valuemax="100" aria-label="System health 99.97%">
            <div class="health-bar-fill"></div>
          </div>
        </div>
      </aside>
    </div>

    <!-- TOOLBAR SLOT -->
    <div slot="toolbar">
      <div class="toolbar-inner" role="toolbar" aria-label="Operations toolbar">
        <span class="toolbar-brand" aria-label="ConvergIO Operations">ConvergIO Operations</span>
        <div class="toolbar-sep" aria-hidden="true"></div>

        <!-- View switcher -->
        <button type="button" class="view-btn" id="btn-view-dashboard"
                aria-pressed="true" data-view="dashboard" aria-label="Dashboard view">
          <svg aria-hidden="true" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button type="button" class="view-btn" id="btn-view-alerts"
                aria-pressed="false" data-view="alerts" aria-label="Alerts view">
          <svg aria-hidden="true" viewBox="0 0 16 16"><path d="M8 1a5 5 0 0 0-5 5v3L1 11h14l-2-2V6a5 5 0 0 0-5-5zm0 14a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2z"/></svg>
          <span>Alerts</span>
        </button>
        <button type="button" class="view-btn" id="btn-view-deployments"
                aria-pressed="false" data-view="deployments" aria-label="Deployments view">
          <svg aria-hidden="true" viewBox="0 0 16 16"><path d="M8 1l7 4v6l-7 4-7-4V5l7-4zm0 2L3 6v4l5 3 5-3V6L8 3z"/></svg>
          <span>Deployments</span>
        </button>
        <button type="button" class="view-btn" id="btn-view-infrastructure"
                aria-pressed="false" data-view="infrastructure" aria-label="Infrastructure view">
          <svg aria-hidden="true" viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="3" rx="1"/><rect x="1" y="8" width="14" height="3" rx="1"/><rect x="1" y="13" width="14" height="2" rx="1"/><circle cx="4" cy="4.5" r="1"/><circle cx="4" cy="9.5" r="1"/><circle cx="4" cy="14" r="1"/></svg>
          <span>Infrastructure</span>
        </button>

        <div class="toolbar-sep" aria-hidden="true"></div>

        <!-- Severity filter -->
        <label for="severity-filter" class="mn-sr-only">Filter by severity</label>
        <select id="severity-filter" class="mn-form-select" aria-label="Filter alerts by severity">
          <option value="all">All Severities</option>
          <option value="critical">Critical</option>
          <option value="warning">Warning</option>
          <option value="info">Info</option>
        </select>

        <div class="toolbar-spacer"></div>

        <!-- Cmd-K -->
        <button type="button" class="view-btn" id="cmd-k-btn"
                aria-label="Open command palette (Ctrl+K)">
          <svg aria-hidden="true" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Cmd-K</span>
        </button>

        <!-- Alert bell -->
        <button type="button" class="toolbar-icon-btn" aria-label="Alerts: 3 active">
          <svg aria-hidden="true" viewBox="0 0 16 16"><path d="M8 1a5 5 0 0 0-5 5v3L1 11h14l-2-2V6a5 5 0 0 0-5-5zm0 14a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2z"/></svg>
          <span class="badge-count" aria-hidden="true">3</span>
        </button>

        <!-- Settings -->
        <button type="button" class="toolbar-icon-btn" aria-label="Settings">
          <svg aria-hidden="true" viewBox="0 0 16 16"><path d="M8 10a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm4.94-1a5.06 5.06 0 0 0 .06-.99 5.06 5.06 0 0 0-.06-1l1.52-1.19a.5.5 0 0 0 .12-.64l-1.44-2.49a.5.5 0 0 0-.61-.22l-1.79.72A5.02 5.02 0 0 0 9.5 2.4l-.27-1.9A.49.49 0 0 0 8.75 0h-1.5a.49.49 0 0 0-.48.41l-.27 1.9a5.02 5.02 0 0 0-1.14.63l-1.79-.72a.5.5 0 0 0-.61.22L1.52 4.93a.49.49 0 0 0 .12.64L3.16 6.76A5.29 5.29 0 0 0 3.1 7.75a5.06 5.06 0 0 0 .06 1L1.64 9.94a.5.5 0 0 0-.12.64l1.44 2.49a.5.5 0 0 0 .61.22l1.79-.72c.35.24.74.45 1.14.63l.27 1.9c.05.23.26.4.48.4h1.5c.23 0 .43-.17.48-.41l.27-1.9a5.02 5.02 0 0 0 1.14-.63l1.79.72a.5.5 0 0 0 .61-.22l1.44-2.49a.49.49 0 0 0-.12-.64L12.94 8.75z"/></svg>
        </button>

        <!-- Theme -->
        <label for="theme-select" class="mn-sr-only">Theme</label>
        <select id="theme-select" class="mn-form-select" aria-label="Select theme">
          <option value="nero" selected>Nero</option>
          <option value="editorial">Editorial</option>
          <option value="avorio">Avorio</option>
          <option value="colorblind">Colorblind</option>
          <option value="sugar">Sugar</option>
          <option value="navy">Navy</option>
        </select>

        <!-- Avatar -->
        <div class="toolbar-avatar" aria-label="Omar Eriksson" title="Omar Eriksson">OE</div>
      </div>
    </div>

    <!-- MAIN SLOT -->
    <div slot="main" id="mn-slot-page" class="mn-slot mn-slot--page"></div>

    <!-- DETAIL SLOT -->
    <div slot="detail" id="mn-slot-side-panel" class="mn-slot mn-slot--side-panel"></div>

  </mn-app-shell>

  <script src="../dist/iife/maranello.min.js"></script>
  <script type="module" src="../dist/wc/mn-app-shell.js"></script>
  <script>
    (function () {
      var M = window.Maranello;
      if (!M) return;

      var shellEl = document.getElementById('ops-shell');
      var pageSlot = document.getElementById('mn-slot-page');
      var currentService = 'all';
      var currentSeverity = 'all';

      /* ── Registry & Orchestrator ── */
      var registry = M.ViewRegistry.getInstance();
      registry.clear();
      var navigation = new M.NavigationModel();
      var orchestrator = new M.PanelOrchestrator(registry, navigation);
      shellEl.orchestrator = orchestrator;

      /* ── Data ── */
      var SERVICES = ['api-gateway', 'auth-service', 'user-db', 'redis-cache', 'task-queue', 'blob-storage'];

      var ALERTS = [
        { id: 'A-001', severity: 'CRITICAL', service: 'task-queue',   message: 'CPU utilization exceeded 95%',          time: '08:14:02', status: 'Active',        first: '2024-01-15 08:14', last: '2024-01-15 08:42', affected: ['task-queue', 'api-gateway'] },
        { id: 'A-002', severity: 'CRITICAL', service: 'redis-cache',  message: 'Connection pool exhausted',             time: '08:21:17', status: 'Investigating',  first: '2024-01-15 08:21', last: '2024-01-15 08:55', affected: ['redis-cache', 'auth-service'] },
        { id: 'A-003', severity: 'CRITICAL', service: 'task-queue',   message: 'Memory pressure above threshold',       time: '08:33:45', status: 'Active',        first: '2024-01-15 08:33', last: '2024-01-15 09:01', affected: ['task-queue'] },
        { id: 'A-004', severity: 'WARNING',  service: 'api-gateway',  message: 'P99 latency above 500ms SLO',           time: '07:58:11', status: 'Investigating',  first: '2024-01-15 07:58', last: '2024-01-15 08:30', affected: ['api-gateway'] },
        { id: 'A-005', severity: 'WARNING',  service: 'user-db',      message: 'Replication lag 42s on replica-3',      time: '07:45:33', status: 'Resolved',      first: '2024-01-15 07:45', last: '2024-01-15 08:10', affected: ['user-db'] },
        { id: 'A-006', severity: 'WARNING',  service: 'blob-storage', message: 'Storage capacity at 87%',               time: '06:30:00', status: 'Active',        first: '2024-01-14 22:00', last: '2024-01-15 06:30', affected: ['blob-storage'] },

                  '<div class="detail-field"><div class="detail-field-label">Service</div><div class="detail-field-value">' + d.service + '</div></div>' +
                  '<div class="detail-field"><div class="detail-field-label">Version</div><div class="detail-field-value">' + d.version + '</div></div>' +
                  '<div class="detail-field"><div class="detail-field-label">Environment</div><div class="detail-field-value">' + envBadge(d.env) + '</div></div>' +
                  '<div class="detail-field"><div class="detail-field-label">Status</div><div class="detail-field-value">' + statusBadge(d.status) + '</div></div>' +
                  '<div class="detail-field"><div class="detail-field-label">Deployed By</div><div class="detail-field-value">' + d.deployer + '</div></div>' +
                  '<div class="detail-field"><div class="detail-field-label">Region</div><div class="detail-field-value">' + d.region + '</div></div>' +
                  '<div class="detail-field"><div class="detail-field-label">Duration</div><div class="detail-field-value">' + d.duration + '</div></div>' +
                  '<div class="detail-field"><div class="detail-field-label">Build Log</div><pre class="log-block">' + d.buildLog + '</pre></div>' +
                '</div>' +
                '<div class="detail-tab-pane" id="dp-timeline" role="tabpanel">' +
                  '<ul class="timeline" aria-label="Deployment timeline">' +
                    '<li class="timeline-item"><span class="timeline-time">' + d.time + '</span><span class="timeline-msg">Deployment initiated by ' + d.deployer + '</span></li>' +
                    '<li class="timeline-item"><span class="timeline-time">+' + d.duration + '</span><span class="timeline-msg">Deployment finished — status: ' + d.status + '</span></li>' +
                  '</ul>' +
                '</div>' +
                '<div class="detail-tab-pane" id="dp-related" role="tabpanel">' +
                  '<div class="detail-field"><div class="detail-field-label">Other Deploys: ' + d.service + '</div>' +
                    '<ul class="affected-list">' +
                      DEPLOYMENTS.filter(function (x) { return x.service === d.service && x.id !== d.id; }).slice(0, 3).map(function (x) {
                        return '<li>' + x.id + ' ' + x.version + ' — ' + x.status + '</li>';
                      }).join('') +
                    '</ul>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>';

          container.querySelector('.detail-close').addEventListener('click', function () {
            orchestrator.close('deploy-detail');
            shellEl.setAttribute('layout', 'full');
          });
          makeTabs(container);

          return function () {};
        }
      });

      /* ── View switching ── */
      var currentView = 'dashboard';
      var viewBtns = document.querySelectorAll('.view-btn[data-view]');

      function switchView(viewId) {
        viewBtns.forEach(function (b) {
          var active = b.getAttribute('data-view') === viewId;
          b.setAttribute('aria-pressed', String(active));
        });

        orchestrator.closeAll();
        shellEl.setAttribute('layout', 'full');
        currentView = viewId;

        var scaffold = new M.StateScaffold(pageSlot, { state: 'loading' });
        setTimeout(function () {
          scaffold.destroy();
          pageSlot.innerHTML = '';
          orchestrator.open(viewId, 'page');
        }, 600);
      }

      viewBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var view = btn.getAttribute('data-view');
          if (view && view !== currentView) switchView(view);
        });
      });

      /* ── Severity filter ── */
      document.getElementById('severity-filter').addEventListener('change', function (e) {
        currentSeverity = e.target.value;
        if (currentView === 'alerts' && alertsTableInst) {
          alertsTableInst.setData(filteredAlerts());
        }
      });

      /* ── Service tree ── */
      var serviceItems = document.querySelectorAll('.service-item');
      serviceItems.forEach(function (item) {
        item.addEventListener('click', function () {
          currentService = item.getAttribute('data-service') || 'all';
          serviceItems.forEach(function (s) {
            s.classList.remove('is-active');
            s.setAttribute('aria-pressed', 'false');
          });
          item.classList.add('is-active');
          item.setAttribute('aria-pressed', 'true');

          if (currentView === 'alerts' && alertsTableInst) {
            alertsTableInst.setData(filteredAlerts());
          } else if (currentView === 'deployments' && deploysTableInst) {
            deploysTableInst.setData(filteredDeployments());
          }
        });
        item.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); item.click(); }
        });
      });

      /* ── Theme ── */
      document.getElementById('theme-select').addEventListener('change', function (e) {
        if (M.setTheme) M.setTheme(e.target.value);
      });

      /* ── Command palette ── */
      function openCommandPalette() {
        if (!M.commandPalette) return;
        M.commandPalette({
          placeholder: 'Search views, services, commands...',
          items: [
            { label: 'Go to Dashboard',        action: function () { switchView('dashboard'); } },
            { label: 'Go to Alerts',           action: function () { switchView('alerts'); } },
            { label: 'Go to Deployments',      action: function () { switchView('deployments'); } },
            { label: 'Go to Infrastructure',   action: function () { switchView('infrastructure'); } },
            { label: 'Filter: API Gateway',    action: function () { document.querySelector('[data-service="api-gateway"]').click(); } },
            { label: 'Filter: Task Queue',     action: function () { document.querySelector('[data-service="task-queue"]').click(); } },
            { label: 'Filter: Redis Cache',    action: function () { document.querySelector('[data-service="redis-cache"]').click(); } },
            { label: 'Filter: All Services',   action: function () { document.querySelector('[data-service="all"]').click(); } },
            { label: 'Theme: Nero',            action: function () { M.setTheme('nero');       document.getElementById('theme-select').value = 'nero'; } },
            { label: 'Theme: Editorial',       action: function () { M.setTheme('editorial');  document.getElementById('theme-select').value = 'editorial'; } },
            { label: 'Theme: Avorio',          action: function () { M.setTheme('avorio');     document.getElementById('theme-select').value = 'avorio'; } },
            { label: 'Theme: Colorblind',      action: function () { M.setTheme('colorblind'); document.getElementById('theme-select').value = 'colorblind'; } },
            { label: 'Theme: Sugar',           action: function () { M.setTheme('sugar');      document.getElementById('theme-select').value = 'sugar'; } },
            { label: 'Theme: Navy',            action: function () { M.setTheme('navy');       document.getElementById('theme-select').value = 'navy'; } }
          ]
        });
      }

      document.getElementById('cmd-k-btn').addEventListener('click', openCommandPalette);
      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openCommandPalette(); }
      });

      /* ── Boot ── */
      switchView('dashboard');
    })();
  </script>
</body>
</html>

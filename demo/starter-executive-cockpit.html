<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvergIO Executive — Maranello Luce Design</title>
  <link rel="icon" href="../src/assets/favicon.svg">
  <link rel="stylesheet" href="../src/fonts/local-fonts.css">
  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    /* === Base === */
    body { margin: 0; background: var(--mn-surface); color: var(--mn-text); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* === Toolbar === */
    .exec-toolbar {
      display: flex; align-items: center; gap: 0.5rem; padding: 0 1rem; height: 100%;
      background: var(--mn-surface-raised); border-bottom: 1px solid var(--mn-border);
      overflow: hidden; min-width: 0;
    }
    .exec-brand { font-family: var(--font-display); white-space: nowrap; flex-shrink: 0; }
    .exec-view-switcher { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .exec-view-btn { display: flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.6rem; font-size: 0.73rem; }
    .exec-view-btn.is-active { outline: 2px solid var(--mn-accent); outline-offset: -2px; }
    .exec-toolbar-spacer { flex: 1; min-width: 0; }
    .exec-quarter-select,
    .exec-theme-select { font-size: 0.73rem; padding: 0.25rem 0.5rem; flex-shrink: 0; }
    .exec-cmd-btn { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; }
    .exec-toolbar-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .exec-icon-btn { padding: 0.35rem; line-height: 0; }
    .exec-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--mn-accent);
      color: var(--mn-surface); font-size: 0.63rem; font-family: var(--font-display);
      font-weight: 700; letter-spacing: 0.02em; display: flex; align-items: center;
      justify-content: center; border: none; cursor: pointer; flex-shrink: 0;
    }

    /* === Funnel Sidebar === */
    .exec-funnel { display: grid; gap: 0.35rem; padding: 0.75rem; }
    .funnel-card {
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
      padding: 0.5rem 0.75rem; border: 1px solid var(--mn-border);
      border-left: 3px solid var(--funnel-color, var(--mn-border));
      border-radius: var(--radius-md); background: var(--mn-surface-raised);
      color: var(--mn-text); cursor: pointer; text-align: left;
      font-family: var(--font-mono); font-size: 0.72rem; transition: border-color 0.15s;
    }
    .funnel-card:hover { border-color: var(--funnel-color, var(--mn-accent)); }
    .funnel-card.is-active { background: var(--mn-surface); border-left-width: 4px; }
    .funnel-card--all { border-left-color: var(--mn-border-strong); }
    .funnel-card__name { text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.67rem; }
    .funnel-card__meta { display: flex; align-items: baseline; gap: 0.3rem; }
    .funnel-card__count { font-weight: 700; font-size: 0.82rem; }
    .funnel-card__pct { font-size: 0.63rem; color: var(--mn-text-muted); }

    /* === View layout === */
    .view-pad { padding: 1rem; height: 100%; box-sizing: border-box; overflow: auto; }
    .cockpit-wrap { display: flex; flex-direction: column; gap: 1.25rem; }
    .cockpit-gauge-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .gauge-card {
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      border-radius: var(--radius-md); padding: 1.25rem; text-align: center;
    }
    .gauge-card canvas { display: block; margin: 0 auto 0.75rem; }
    .gauge-label {
      font-family: var(--font-mono); font-size: 0.63rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--mn-text-muted);
    }
    .portfolio-wrap { height: 100%; min-height: 520px; }

    /* === Detail Panel === */
    .detail-wrap { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    .detail-header {
      padding: 1rem; border-bottom: 1px solid var(--mn-border);
      background: var(--mn-surface-raised); flex-shrink: 0;
    }
    .detail-title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 0.75rem; margin-bottom: 0.5rem;
    }
    .detail-company { font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; }
    .detail-project { font-size: 0.73rem; color: var(--mn-text-muted); margin-top: 0.15rem; }
    .detail-header-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .detail-tabs {
      display: flex; border-bottom: 1px solid var(--mn-border); flex-shrink: 0;
      background: var(--mn-surface-raised); overflow-x: auto; scrollbar-width: none;
    }
    .detail-tabs::-webkit-scrollbar { display: none; }
    .detail-tab {
      padding: 0.6rem 1rem; font-family: var(--font-mono); font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.04em; border: none;
      border-bottom: 2px solid transparent; background: none; color: var(--mn-text-muted);
      cursor: pointer; white-space: nowrap; transition: color 0.15s, border-color 0.15s;
    }
    .detail-tab:hover { color: var(--mn-text); }
    .detail-tab.is-active { color: var(--mn-accent); border-bottom-color: var(--mn-accent); }
    .detail-panel-content { padding: 1rem; overflow: auto; flex: 1; }
    .detail-panel-content.is-hidden { display: none; }
    .detail-field { margin-bottom: 1rem; }
    .detail-field-label {
      font-family: var(--font-mono); font-size: 0.63rem; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--mn-text-muted); margin-bottom: 0.25rem;
    }
    .detail-field-value { font-size: 0.83rem; color: var(--mn-text); }
    .detail-fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }
    .detail-description {
      font-size: 0.82rem; color: var(--mn-text); line-height: 1.65; margin-bottom: 1.25rem;
      padding: 0.75rem; background: var(--mn-surface); border-radius: var(--radius-sm);
      border: 1px solid var(--mn-border);
    }
    .detail-placeholder {
      padding: 2.5rem 1rem; text-align: center; color: var(--mn-text-muted);
      font-size: 0.78rem; font-family: var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .state-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--state-color, var(--mn-border)); margin-right: 0.4rem;
      vertical-align: middle;
    }
    @media (max-width: 700px) {
      .cockpit-gauge-row { grid-template-columns: 1fr; }
      .exec-brand { display: none; }
    }
  </style>
</head>
<body class="mn-nero">
  <script>
    try {
      var t = localStorage.getItem('mn-theme');
      if (t && t !== 'editorial') document.body.classList.add('mn-' + t);
    } catch (_) {}

    <!-- TOOLBAR -->

        <div class="exec-toolbar-spacer"></div>

        <label for="quarter-filter" class="sr-only">Quarter</label>

          <option value="Q2" selected>Q2 2026</option>

          </button>
          <button type="button" class="mn-btn mn-btn--ghost exec-icon-btn" aria-label="Messages">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"><path d="M2.5 2.5h10a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H5l-3.5 2V3.5a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
          <button type="button" class="mn-btn mn-btn--ghost exec-icon-btn" aria-label="Settings">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M7.5 1v2M7.5 12v2M1 7.5h2M12 7.5h2M2.9 2.9l1.4 1.4M10.7 10.7l1.4 1.4M10.7 4.3l1.4-1.4M2.9 12.1l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>

        <label for="theme-select" class="sr-only">Theme</label>
        <select id="theme-select" class="mn-form-select exec-theme-select" aria-label="Select theme">
          <option value="editorial">Editorial</option>
          <option value="nero" selected>Nero</option>
          <option value="avorio">Avorio</option>
          <option value="colorblind">Colorblind</option>
          <option value="sugar">Sugar</option>
          <option value="navy">Navy</option>
        </select>

        <button type="button" class="exec-avatar" aria-label="User: Roberto D'Angelo — RD">
          <span aria-hidden="true">RD</span>
        </button>
      </div>
    </div>

    <div slot="main"   id="mn-slot-page"       class="mn-slot mn-slot--page"></div>
    <div slot="detail" id="mn-slot-side-panel" class="mn-slot mn-slot--side-panel"></div>
    <div slot="overlay" id="mn-slot-overlay"  class="mn-slot mn-slot--overlay"></div>

  </mn-app-shell>

    (function () {

      if (!M) return;

        'Sprint':      '#7C4DFF',

        'On Hold':     '#9e9e9e',

      };

      var ENGAGEMENTS = [
        { id: 'AUR-001', company: 'Aurelia Dynamics',   project: 'Velocity ERP Rollout',      state: 'Sprint',      owner: 'Mara Fossati',  pm: 'Leo Hartmann',   account: 'Enterprise',  start: '2026-01-15', end: '2026-08-30', progress: 62, description: 'Full ERP implementation across 3 business units, replacing legacy Oracle stack with a cloud-native platform.' },

        { initiative: 'Talent Pipeline Development',      owner: 'Suki Tanaka',   role: 'COO',    status: 'On Track',    budget: '$1.8M', progress: { value: 61, max: 100, label: '61%' } },
        { initiative: 'ESG Compliance Framework',         owner: 'Jonas Eriksson',role: 'CLO',    status: 'In Progress', budget: '$0.9M', progress: { value: 52, max: 100, label: '52%' } }
      ];

         SHELL / ORCHESTRATOR SETUP
      ====================================================== */
      var shellEl   = document.getElementById('exec-shell');
      var pageSlot  = document.getElementById('mn-slot-page');

      var registry     = M.ViewRegistry.getInstance();
      registry.clear();
      var navigation   = new M.NavigationModel();
      var orchestrator = new M.PanelOrchestrator(registry, navigation);
      shellEl.orchestrator = orchestrator;

      var currentView  = 'cockpit';
      var activeFilter = 'all';
      var ganttCtrl    = null;

      /* ======================================================
         HELPERS
      ====================================================== */
      function findEng(id) {
        for (var i = 0; i < ENGAGEMENTS.length; i++) {
          if (ENGAGEMENTS[i].id === id) return ENGAGEMENTS[i];
        }
        return null;
      }

      function filteredGanttTasks() {
        var list = activeFilter === 'all'
          ? ENGAGEMENTS
          : ENGAGEMENTS.filter(function (e) { return e.state === activeFilter; });
        return list.map(function (e) {
          return {
            id: e.id,
            title: e.company + ' \u2014 ' + e.project,
            start: e.start,
            end: e.end,
            progress: e.progress,
            color: STATE_COLORS[e.state] || '#888'
          };
        });

        var wrap = document.createElement('div');
        wrap.className = 'detail-field';
        var lbl = document.createElement('div');

            btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
            btn.setAttribute('id', 'etab-' + i);

            for (var k = 0; k < tabs.length; k++) {

      /* ======================================================
         VIEW SWITCHING
      ====================================================== */
      function switchView(viewId) {
        currentView = viewId;

        /* Update toolbar buttons */
        var viewBtns = document.querySelectorAll('.exec-view-btn');
        for (var i = 0; i < viewBtns.length; i++) {
          var vb = viewBtns[i];
          if (vb.getAttribute('data-view') === viewId) {
            vb.classList.add('is-active');
            vb.setAttribute('aria-pressed', 'true');
          } else {
            vb.classList.remove('is-active');
            vb.setAttribute('aria-pressed', 'false');
          }
        }

        orchestrator.closeAll();
        shellEl.setAttribute('layout', 'full');

        var scaffold = new M.StateScaffold(pageSlot, { state: 'loading' });
        setTimeout(function () {
          scaffold.destroy();
          pageSlot.innerHTML = '';
          orchestrator.open(viewId, 'page');
        }, 600);
      }

      /* ======================================================
         VIEW-SWITCHER CLICKS
      ====================================================== */
      document.getElementById('view-switcher').addEventListener('click', function (e) {
        var btn = e.target.closest('.exec-view-btn');
        if (!btn) return;
        var view = btn.getAttribute('data-view');
        if (view && view !== currentView) switchView(view);
      });

      /* ======================================================
         FUNNEL SIDEBAR FILTER
      ====================================================== */
      var funnelNav = document.getElementById('funnel-nav');
      funnelNav.addEventListener('click', function (e) {
        var card = e.target.closest('.funnel-card');
        if (!card) return;
        var state = card.getAttribute('data-state');
        if (!state) return;

        activeFilter = state;

        /* Update active state on cards */
        var cards = funnelNav.querySelectorAll('.funnel-card');
        for (var i = 0; i < cards.length; i++) {
          var c = cards[i];
          var pressed = c.getAttribute('data-state') === state;
          if (pressed) { c.classList.add('is-active'); } else { c.classList.remove('is-active'); }
          c.setAttribute('aria-pressed', pressed ? 'true' : 'false');
        }

        if (currentView === 'portfolio' && ganttCtrl) {
          ganttCtrl.setTasks(filteredGanttTasks());
        } else {
          switchView('portfolio');
        }
      });

      /* ======================================================
         COMMAND PALETTE
      ====================================================== */
      function openCommandPalette() {
        if (!M.commandPalette) return;
        M.commandPalette({
          placeholder: 'Search engagements, views, commands\u2026',
          items: [
            { label: 'Go to Cockpit',           action: function () { switchView('cockpit'); } },
            { label: 'Go to Portfolio',          action: function () { switchView('portfolio'); } },
            { label: 'Go to Market',             action: function () { switchView('market'); } },
            { label: 'Go to Board',              action: function () { switchView('board'); } },
            { label: 'Filter: Prospect',         action: function () { activeFilter = 'Prospect';    switchView('portfolio'); } },
            { label: 'Filter: Sprint',           action: function () { activeFilter = 'Sprint';      switchView('portfolio'); } },
            { label: 'Filter: On Hold',          action: function () { activeFilter = 'On Hold';     switchView('portfolio'); } },
            { label: 'Filter: All Stages',       action: function () { activeFilter = 'all';         switchView('portfolio'); } },
            { label: 'Theme: Editorial',         action: function () { M.setTheme('editorial'); setThemeSelect('editorial'); } },
            { label: 'Theme: Nero',              action: function () { M.setTheme('nero');      setThemeSelect('nero'); } },
            { label: 'Theme: Avorio',            action: function () { M.setTheme('avorio');    setThemeSelect('avorio'); } },
            { label: 'Theme: Colorblind',        action: function () { M.setTheme('colorblind');setThemeSelect('colorblind'); } },
            { label: 'Theme: Sugar',             action: function () { M.setTheme('sugar');     setThemeSelect('sugar'); } },
            { label: 'Theme: Navy',              action: function () { M.setTheme('navy');      setThemeSelect('navy'); } }
          ]
        });
      }

      document.getElementById('cmd-k-btn').addEventListener('click', openCommandPalette);

      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          openCommandPalette();
        }
      });

      /* ======================================================
         THEME SWITCHING
      ====================================================== */
      var THEMES = ['editorial', 'nero', 'avorio', 'colorblind', 'sugar', 'navy'];
      var themeSelect = document.getElementById('theme-select');

      function setThemeSelect(theme) {
        for (var i = 0; i < themeSelect.options.length; i++) {
          if (themeSelect.options[i].value === theme) {
            themeSelect.selectedIndex = i;
            break;
          }
        }
      }

      /* Restore theme selection to match persisted theme */
      try {
        var persisted = localStorage.getItem('mn-theme');
        if (persisted && THEMES.indexOf(persisted) !== -1) setThemeSelect(persisted);
      } catch (_) {}

      themeSelect.addEventListener('change', function () {
        var theme = themeSelect.value;
        if (THEMES.indexOf(theme) !== -1 && M.setTheme) M.setTheme(theme);
      });

      /* ======================================================
         INITIAL LOAD
      ====================================================== */
      switchView('cockpit');

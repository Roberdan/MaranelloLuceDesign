<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../src/assets/favicon.svg">

  <link rel="stylesheet" href="../dist/css/maranello.css">
  <style>
    /* === Shell theme palette (matching header-responsive.html) === */
    body {
      --shell-bg: #0a0a0a; --shell-nav: #141414; --shell-card: #171717; --shell-card-2: #1d1d1d;
      --shell-border: #262626; --shell-text: #eee; --shell-muted: #9a9a9a; --shell-ghost: #666;
      --shell-accent: #FFC72C; --shell-accent-text: #111;
      margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
      background: var(--mn-surface); color: var(--mn-text); font-family: var(--font-body, sans-serif);
    }
    body.mn-avorio {
      --shell-bg: #f5efe4; --shell-nav: #f8f1e6; --shell-card: #fffaf4; --shell-card-2: #fffdf8;
      --shell-border: #d9cbb7; --shell-text: #241f19; --shell-muted: #7b6d5a; --shell-ghost: #8e7f6b;
      --shell-accent: #b7410e; --shell-accent-text: #fff8ef;
    }
    body.mn-colorblind { --shell-accent: #0072B2; --shell-accent-text: #fff; }
    body.mn-sugar {
      --shell-bg: #f4f4f6; --shell-nav: #fff; --shell-card: #fff; --shell-card-2: #ffffff;
      --shell-border: #d8d8de; --shell-text: #111; --shell-muted: #666; --shell-ghost: #888;
      --shell-accent: #111; --shell-accent-text: #fff;
    }
    body.mn-navy {
      --shell-bg: #0e1628; --shell-nav: #111d33; --shell-card: #162040; --shell-card-2: #1c2a4e;
      --shell-border: #243360; --shell-text: #e8eaf6; --shell-muted: #7f8db5; --shell-ghost: #505c8a;
      --shell-accent: #d4a843; --shell-accent-text: #0e1628;
    }
    body.mn-editorial {
      --shell-bg: #fafafa; --shell-nav: #fff; --shell-card: #fff; --shell-card-2: #f8f8f8;
      --shell-border: #e2e2e2; --shell-text: #121212; --shell-muted: #777; --shell-ghost: #aaa;
      --shell-accent: #cc1f1f; --shell-accent-text: #fff;
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* === Navbar === */
    #navbar { flex-shrink: 0; position: sticky; top: 0; z-index: 20; backdrop-filter: blur(12px); }
    body.mn-avorio #navbar, body.mn-sugar #navbar, body.mn-editorial #navbar {
      background: color-mix(in srgb, var(--shell-nav) 96%, transparent);
    }

    /* === Header Shell overrides (exact header-responsive.html pattern) === */
    #navbar .mn-header-shell { gap: 12px; background: var(--shell-nav); border-bottom-color: var(--shell-border); }
    #navbar .mn-header-shell__brand { color: var(--shell-text); font-size: 1rem; }
    #navbar .mn-header-shell__brand-logo { width: 28px; height: 28px; filter: drop-shadow(0 0 8px color-mix(in srgb, var(--shell-accent) 35%, transparent)); }
    #navbar .mn-header-shell__actions--segmented,
    #navbar .mn-header-shell__actions--cluster { border-color: var(--shell-border); border-radius: 14px; background: var(--shell-card); box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 4%, transparent); }
    #navbar .mn-header-shell__action { min-width: 48px; min-height: 48px; border-radius: 10px; color: var(--shell-muted); }
    #navbar .mn-header-shell__action:hover { background: color-mix(in srgb, var(--shell-card-2) 92%, var(--shell-accent) 8%); color: var(--shell-text); }
    #navbar .mn-header-shell__action--active { background: color-mix(in srgb, var(--shell-accent) 20%, transparent); color: var(--shell-accent); }
    #navbar .mn-header-shell__action:disabled { opacity: .35; cursor: not-allowed; }
    #navbar .mn-header-shell__icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    #navbar .mn-header-shell__search { width: 100%; min-width: 0; min-height: 52px; padding: 8px 12px; gap: 12px; border-color: var(--shell-border); border-radius: 14px; background: var(--shell-card); }
    #navbar .mn-header-shell__search-input { flex: 1 1 14rem; min-width: 10rem; color: var(--shell-text); font-size: 1.0625rem; }
    #navbar .mn-header-shell__search-input::placeholder { color: color-mix(in srgb, var(--shell-muted) 78%, transparent); }
    #navbar .mn-header-shell__shortcut { border-color: var(--shell-border); background: var(--shell-card); color: var(--shell-ghost); font-size: 0.875rem; }
    #navbar .mn-header-shell__filters { display: none; }
    #navbar .mn-header-shell__filter-group legend { color: var(--shell-ghost); font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
    #navbar .mn-header-shell__filter-option { min-height: 36px; border-color: var(--shell-border); background: transparent; color: var(--shell-text); }
    #navbar .mn-header-shell__filter-option.is-selected { color: var(--shell-accent); border-color: color-mix(in srgb, var(--shell-accent) 55%, var(--shell-border)); background: color-mix(in srgb, var(--shell-accent) 12%, transparent); }
    #navbar .mn-header-shell__theme { padding-left: 14px; border-left-color: var(--shell-border); }
    #navbar .mn-profile-trigger { width: 42px; height: 42px; border-radius: 50%; background: color-mix(in srgb, var(--shell-accent) 18%, transparent); color: var(--shell-accent); font-weight: 700; display: inline-flex; align-items: center; justify-content: center; border: 1px solid color-mix(in srgb, var(--shell-accent) 30%, var(--shell-border)); }

    /* === Shell layout === */
    .exec-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 240px 1fr;
      overflow: hidden;
    }
    .exec-layout.has-detail { grid-template-columns: 240px 1fr 380px; }

    /* === Sidebar === */
    .exec-sidebar {
      border-right: 1px solid var(--mn-border);
      background: var(--mn-surface-raised);
      overflow-y: auto; overflow-x: hidden;
    }
    .sidebar-label {
      padding: 0.65rem 0.75rem 0.45rem;
      font-family: var(--font-mono); font-size: 0.63rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--mn-text-muted); border-bottom: 1px solid var(--mn-border);
    }
    .exec-funnel { display: grid; gap: 0.2rem; padding: 0.45rem; }
    .funnel-card {
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
      padding: 0.45rem 0.65rem;
      border: 1px solid var(--mn-border);
      border-left: 3px solid var(--funnel-color, var(--mn-border));
      border-radius: var(--radius-md, 6px);
      background: var(--mn-surface-raised);
      color: var(--mn-text); cursor: pointer; text-align: left;
      font-family: var(--font-mono); font-size: 0.69rem;
      transition: background 0.12s, border-color 0.12s;
    }
    .funnel-card:hover { background: var(--mn-surface); border-color: var(--funnel-color, var(--mn-accent)); }
    .funnel-card.is-active { background: var(--mn-surface); border-left-width: 4px; }
    .funnel-card--all { border-left-color: var(--mn-border-strong, var(--mn-border)); }
    .funnel-card__name { text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.64rem; }
    .funnel-card__meta { display: flex; align-items: baseline; gap: 0.3rem; }
    .funnel-card__count { font-weight: 700; font-size: 0.79rem; }
    .funnel-card__pct { font-size: 0.61rem; color: var(--mn-text-muted); }

    /* === Main area === */
    .exec-main { overflow: hidden; background: var(--mn-surface); display: flex; flex-direction: column; }
    .exec-view { flex: 1; min-height: 0; display: none; overflow: auto; }
    .exec-view.is-active { display: flex; flex-direction: column; }

    /* === Cockpit view === */
    .cockpit-wrap { padding: 1rem; display: flex; flex-direction: column; gap: 1.25rem; overflow: auto; }
    .cockpit-gauge-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .gauge-card {
      background: var(--mn-surface-raised); border: 1px solid var(--mn-border);
      border-radius: var(--radius-md, 6px); padding: 1.25rem; text-align: center;
    }
    .gauge-card canvas { display: block; margin: 0 auto 0.75rem; }
    .gauge-label {
      font-family: var(--font-mono); font-size: 0.63rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--mn-text-muted); margin: 0;
    }

    /* === Portfolio view === */
    .portfolio-wrap { flex: 1; min-height: 520px; }

    /* === Market view === */
    .market-wrap { flex: 1; padding: 1rem; }

    /* === Board view === */
    .board-wrap { flex: 1; padding: 1rem; }

    /* === Detail panel === */
    .exec-detail {
      border-left: 1px solid var(--mn-border);
      background: var(--mn-surface-raised);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .exec-detail[hidden] { display: none; }
    .detail-header {
      padding: 1rem; border-bottom: 1px solid var(--mn-border);
      background: var(--mn-surface-raised); flex-shrink: 0;
    }
    .detail-title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 0.75rem; margin-bottom: 0.5rem;
    }
    .detail-company { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; }
    .detail-project { font-size: 0.73rem; color: var(--mn-text-muted); margin-top: 0.15rem; }
    .detail-close {
      background: none; border: none; cursor: pointer;
      color: var(--mn-text-muted); padding: 0.25rem; line-height: 0;
      border-radius: var(--radius-sm, 4px); min-width: 28px; min-height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-close:hover { color: var(--mn-text); background: var(--mn-surface); }
    .detail-close svg { width: 16px; height: 16px; }
    .detail-tabs {
      display: flex; border-bottom: 1px solid var(--mn-border); flex-shrink: 0;
      background: var(--mn-surface-raised); overflow-x: auto; scrollbar-width: none;
    }
    .detail-tabs::-webkit-scrollbar { display: none; }
    .detail-tab {
      padding: 0.6rem 1rem; font-family: var(--font-mono); font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.04em; border: none;
      border-bottom: 2px solid transparent; background: none; color: var(--mn-text-muted);
      cursor: pointer; white-space: nowrap; transition: color 0.15s, border-color 0.15s;
      min-height: 40px;
    }
    .detail-tab:hover { color: var(--mn-text); }
    .detail-tab.is-active { color: var(--mn-accent); border-bottom-color: var(--mn-accent); }
    .detail-panel-body { padding: 1rem; overflow: auto; flex: 1; }
    .detail-tab-content { display: none; }
    .detail-tab-content.is-active { display: block; }
    .detail-field { margin-bottom: 1rem; }
    .detail-field-label {
      font-family: var(--font-mono); font-size: 0.63rem; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--mn-text-muted); margin-bottom: 0.25rem;
    }
    .detail-field-value { font-size: 0.83rem; color: var(--mn-text); }
    .detail-fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }
    .detail-description {
      font-size: 0.82rem; color: var(--mn-text); line-height: 1.65; margin-bottom: 1.25rem;
      padding: 0.75rem; background: var(--mn-surface);
      border-radius: var(--radius-sm, 4px); border: 1px solid var(--mn-border);
    }
    .detail-placeholder {
      padding: 2.5rem 1rem; text-align: center; color: var(--mn-text-muted);
      font-size: 0.78rem; font-family: var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .state-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--state-color, var(--mn-border)); margin-right: 0.4rem; vertical-align: middle;
    }

    @media (max-width: 1200px) {
      #navbar .mn-header-shell__search { min-height: 48px; }
      #navbar .mn-header-shell__action { min-width: 42px; min-height: 42px; }
      #navbar .mn-header-shell__theme { padding-left: 10px; }
    }
    @media (max-width: 900px) {
      .exec-layout, .exec-layout.has-detail { grid-template-columns: 1fr; }
      .exec-sidebar { display: none; }
    }
    @media (max-width: 640px) {
      #navbar .mn-header-shell__shortcut { display: none; }
      #navbar .mn-header-shell__actions--segmented,
      #navbar .mn-header-shell__actions--cluster { width: 100%; justify-content: space-between; }
      #navbar .mn-header-shell__search { max-width: none; }
      #navbar .mn-header-shell__theme { width: 100%; justify-content: flex-end; border-left: none; padding-left: 0; }
      .cockpit-gauge-row { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      .funnel-card { transition: none; }
      .detail-tab { transition: none; }
    }
  </style>
</head>

    ============================================================ */
    function icon(name) {
      if (!M.icons || typeof M.icons[name] !== 'function') return '';
      return M.icons[name]();
    }

    function setClass(node, cls, on) {
      if (!node) return;
      if (on) node.classList.add(cls);
      else node.classList.remove(cls);
    }

    function findEng(id) {
      for (var i = 0; i < ENGAGEMENTS.length; i++) {
        if (ENGAGEMENTS[i].id === id) return ENGAGEMENTS[i];
      }
      return null;
    }

    function filteredGanttTasks() {
      var list = activeFilter === 'all'
        ? ENGAGEMENTS
        : ENGAGEMENTS.filter(function (e) { return e.state === activeFilter; });
      return list.map(function (e) {
        return {
          id: e.id,
          title: e.company + ' \u2014 ' + e.project,
          start: e.start,
          end: e.end,
          progress: e.progress,
          color: STATE_COLORS[e.state] || '#888'
        };
      });
    }

    function makeField(label, value) {
      var wrap = document.createElement('div');
      wrap.className = 'detail-field';
      var lbl = document.createElement('div');
      lbl.className = 'detail-field-label';
      lbl.textContent = label;
      var val = document.createElement('div');
      val.className = 'detail-field-value';
      val.textContent = value;
      wrap.appendChild(lbl);
      wrap.appendChild(val);
      return wrap;
    }

    /* ============================================================
       DETAIL PANEL
    ============================================================ */
    function openDetail(eng) {
      var inner = document.getElementById('detail-inner');
      inner.innerHTML = '';

      /* Header */
      var hdr = document.createElement('div');
      hdr.className = 'detail-header';
      var titleRow = document.createElement('div');
      titleRow.className = 'detail-title-row';
      var titleBlock = document.createElement('div');
      var companyEl = document.createElement('div');
      companyEl.className = 'detail-company';
      companyEl.textContent = eng.company;
      var projectEl = document.createElement('div');
      projectEl.className = 'detail-project';
      projectEl.textContent = eng.project;
      titleBlock.appendChild(companyEl);
      titleBlock.appendChild(projectEl);
      var closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'detail-close';
      closeBtn.setAttribute('aria-label', 'Close detail panel');
      closeBtn.innerHTML = icon('close');
      closeBtn.addEventListener('click', closeDetail);
      titleRow.appendChild(titleBlock);
      titleRow.appendChild(closeBtn);
      hdr.appendChild(titleRow);

      var stateLine = document.createElement('div');
      var stateDot = document.createElement('span');
      stateDot.className = 'state-dot';
      stateDot.style.setProperty('--state-color', STATE_COLORS[eng.state] || '#888');
      var stateText = document.createElement('span');
      stateText.style.cssText = 'font-family:var(--font-mono);font-size:0.7rem;color:var(--mn-text-muted);';
      stateText.textContent = eng.state;
      stateLine.appendChild(stateDot);
      stateLine.appendChild(stateText);
      hdr.appendChild(stateLine);
      inner.appendChild(hdr);

      /* Tabs */
      var tabNames = ['Overview', 'Activities', 'Impact', 'Quality', 'Comments'];
      var tabsEl = document.createElement('div');
      tabsEl.className = 'detail-tabs';
      tabsEl.setAttribute('role', 'tablist');
      var panelBody = document.createElement('div');
      panelBody.className = 'detail-panel-body';
      var tabPanels = [];

      tabNames.forEach(function (name, idx) {
        var tabBtn = document.createElement('button');
        tabBtn.type = 'button';
        tabBtn.className = 'detail-tab' + (idx === 0 ? ' is-active' : '');
        tabBtn.setAttribute('role', 'tab');
        tabBtn.setAttribute('aria-selected', idx === 0 ? 'true' : 'false');
        tabBtn.textContent = name;
        tabsEl.appendChild(tabBtn);

        var panel = document.createElement('div');
        panel.className = 'detail-tab-content' + (idx === 0 ? ' is-active' : '');
        panel.setAttribute('role', 'tabpanel');
        tabPanels.push(panel);

        (function (i) {
          tabBtn.addEventListener('click', function () {
            tabsEl.querySelectorAll('.detail-tab').forEach(function (b, j) {
              setClass(b, 'is-active', j === i);
              b.setAttribute('aria-selected', j === i ? 'true' : 'false');
            });
            tabPanels.forEach(function (p, j) { setClass(p, 'is-active', j === i); });
          });
        }(idx));
      });

      /* Overview content */
      var desc = document.createElement('p');
      desc.className = 'detail-description';
      desc.textContent = eng.description;
      tabPanels[0].appendChild(desc);
      var fieldsGrid = document.createElement('div');
      fieldsGrid.className = 'detail-fields-grid';
      fieldsGrid.appendChild(makeField('State', eng.state));
      fieldsGrid.appendChild(makeField('Account', eng.account));
      fieldsGrid.appendChild(makeField('Owner', eng.owner));
      fieldsGrid.appendChild(makeField('PM', eng.pm));
      fieldsGrid.appendChild(makeField('Start', eng.start));
      fieldsGrid.appendChild(makeField('End', eng.end));
      tabPanels[0].appendChild(fieldsGrid);

      /* Other tab placeholders */
      for (var t = 1; t < tabPanels.length; t++) {
        var ph = document.createElement('div');
        ph.className = 'detail-placeholder';
        ph.textContent = tabNames[t] + ' — coming soon';
        tabPanels[t].appendChild(ph);
      }

      inner.appendChild(tabsEl);
      tabPanels.forEach(function (p) { panelBody.appendChild(p); });
      inner.appendChild(panelBody);

      detailEl.hidden = false;
      setClass(layoutEl, 'has-detail', true);
    }

    function closeDetail() {
      detailEl.hidden = true;
      setClass(layoutEl, 'has-detail', false);
      document.getElementById('detail-inner').innerHTML = '';
    }

    /* ============================================================
       VIEW: COCKPIT
    ============================================================ */
    function initCockpit() {
      var container = document.getElementById('view-cockpit');
      container.innerHTML = '';
      var wrap = document.createElement('div');
      wrap.className = 'cockpit-wrap';

      var stripMount = document.createElement('div');
      wrap.appendChild(stripMount);

      var gaugeRow = document.createElement('div');
      gaugeRow.className = 'cockpit-gauge-row';

      var revCard = document.createElement('div');
      revCard.className = 'gauge-card';
      revCard.setAttribute('role', 'group');
      revCard.setAttribute('aria-label', 'Revenue performance gauge');
      var revCanvas = document.createElement('canvas');
      revCanvas.id = 'cockpit-gauge-rev';
      revCanvas.setAttribute('width', '200');
      revCanvas.setAttribute('height', '200');
      revCanvas.setAttribute('role', 'img');
      revCanvas.setAttribute('aria-label', 'Revenue at $42.3M, 84.6 percent of $50M target');
      var revSR = document.createElement('span');
      revSR.className = 'sr-only';
      revSR.textContent = 'Revenue: $42.3M of $50M target (84.6%)';
      var revLbl = document.createElement('p');
      revLbl.className = 'gauge-label';
      revLbl.textContent = 'Revenue';
      revCard.appendChild(revCanvas);
      revCard.appendChild(revSR);
      revCard.appendChild(revLbl);

      var qualCard = document.createElement('div');
      qualCard.className = 'gauge-card';
      qualCard.setAttribute('role', 'group');
      qualCard.setAttribute('aria-label', 'Delivery quality gauge');
      var qualCanvas = document.createElement('canvas');
      qualCanvas.id = 'cockpit-gauge-qual';
      qualCanvas.setAttribute('width', '200');
      qualCanvas.setAttribute('height', '200');
      qualCanvas.setAttribute('role', 'img');
      qualCanvas.setAttribute('aria-label', 'Delivery quality at 60 percent');
      var qualSR = document.createElement('span');
      qualSR.className = 'sr-only';
      qualSR.textContent = 'Delivery quality: 60%';
      var qualLbl = document.createElement('p');
      qualLbl.className = 'gauge-label';
      qualLbl.textContent = 'Delivery Quality';
      qualCard.appendChild(qualCanvas);
      qualCard.appendChild(qualSR);
      qualCard.appendChild(qualLbl);

      gaugeRow.appendChild(revCard);
      gaugeRow.appendChild(qualCard);
      wrap.appendChild(gaugeRow);
      container.appendChild(wrap);

      M.dashboardStrip(stripMount, {
        ariaLabel: 'Executive instrument strip',
        zones: [
          {
            type: 'gauge',
            label: 'UTILIZATION',
            size: 'sm',
            gaugeConfig: {
              value: 86, max: 100, color: '#FFC72C', colorMode: 'lower-better',
              ticks: 10, subticks: 5, startAngle: -225, endAngle: 45, showNeedle: true,
              numbers: [0, 25, 50, 75, 100],
              complications: {
                centerValue: '86', centerUnit: '%', centerLabel: 'UTILIZATION',
                arcBar: { labelLeft: '0', labelRight: '100' },
                statusLed: { color: '#FFC72C', label: 'HIGH' }
              }
            }
          },
          {
            type: 'pipeline',
            title: 'PIPELINE AND AVG DURATION',
            rows: [
              { label: 'PROSPECT',    value: 47,  color: '#FFC72C', secondary: '47d' },
              { label: 'EXPLORATION', value: 48,  color: '#448AFF', secondary: '119d' },
              { label: 'SPRINT',      value: 40,  color: '#7C4DFF', secondary: '141d' },
              { label: 'WRAP UP',     value: 4,   color: '#DC0000', secondary: '181d' },
              { label: 'ON HOLD',     value: 14,  color: '#9e9e9e', secondary: '118d' },
              { label: 'COMPLETED',   value: 138, color: '#00A651', secondary: '166d' },
              { label: 'WITHDRAWN',   value: 81,  color: '#616161', secondary: '142d' }
            ],
            footer: { label: 'E2E', value: '157d' }
          },
          {
            type: 'trend',
            title: '6 MONTH TREND',
            items: [
              { label: 'PROSPECTS', value: 47,  color: '#FFC72C', data: [32, 28, 35, 42, 38, 47] },
              { label: 'IN FLIGHT', value: 94,  color: '#448AFF', data: [60, 68, 72, 78, 85, 94] },
              { label: 'CLOSED',    value: 126, color: '#00A651', data: [80, 90, 95, 105, 118, 126] }
            ]
          },
          {
            type: 'board',
            title: 'KEY METRICS',
            stats: [
              { label: 'REVENUE',      value: '$42.3M' },
              { label: 'MARGIN',       value: '68.2%' },
              { label: 'NPS',          value: '72' },
              { label: 'GROWTH',       value: '23.4%' },
              { label: 'ENGAGEMENTS',  value: '377' },
              { label: 'FTE',          value: '260' }
            ]
          }
        ]
      });

      M.createGauge({
        target: '#cockpit-gauge-rev',
        size: 'md',
        config: {
          value: 84.6, max: 100, color: '#00A651', colorMode: 'higher-better',
          ticks: 10, subticks: 5, startAngle: -225, endAngle: 45, showNeedle: true,
          numbers: [0, 25, 50, 75, 100],
          complications: {
            centerValue: '$42.3M', centerUnit: '', centerLabel: 'REVENUE',
            arcBar: { labelLeft: '0', labelRight: '$50M' },
            statusLed: { color: '#00A651', label: 'ON TRACK' }
          }
        }
      });

      M.createGauge({
        target: '#cockpit-gauge-qual',
        size: 'md',
        config: {
          value: 60, max: 100, color: '#DC0000', colorMode: 'higher-better',
          ticks: 10, subticks: 5, startAngle: -225, endAngle: 45, showNeedle: true,
          numbers: [0, 25, 50, 75, 100],
          complications: {
            centerValue: '60', centerUnit: '%', centerLabel: 'QUALITY',
            arcBar: { labelLeft: '0', labelRight: '100' },
            statusLed: { color: '#DC0000', label: 'ALERT' }
          }
        }
      });
    }

    /* ============================================================
       VIEW: PORTFOLIO
    ============================================================ */
    function initPortfolio() {
      var container = document.getElementById('view-portfolio');
      container.innerHTML = '';
      var wrap = document.createElement('div');
      wrap.className = 'portfolio-wrap';
      container.appendChild(wrap);
      if (ganttCtrl && ganttCtrl.destroy) ganttCtrl.destroy();
      ganttCtrl = M.gantt(wrap, filteredGanttTasks(), {
        onClick: function (task) {
          var eng = findEng(task.id);
          if (eng) openDetail(eng);
        }
      });
    }

    /* ============================================================
       VIEW: MARKET
    ============================================================ */
    function initMarket() {
      var container = document.getElementById('view-market');
      container.innerHTML = '';
      var wrap = document.createElement('div');
      wrap.className = 'market-wrap';
      var mountId = 'exec-heatmap-mount';
      var mount = document.createElement('div');
      mount.id = mountId;
      wrap.appendChild(mount);
      container.appendChild(wrap);

      M.heatmap(mountId, {
        ariaLabel: 'Market opportunity matrix by region and product line',
        columnLabels: ['Platform', 'Analytics', 'Services', 'Cloud'],
        showValues: true,
        cellSize: 'md',
        colorScale: ['#DC0000', '#FFC72C', '#00A651'],
        minValue: 0,
        maxValue: 100,
        rows: [
          { label: 'North America', cells: [{ value: 92, label: '92' }, { value: 78, label: '78' }, { value: 85, label: '85' }, { value: 71, label: '71' }] },
          { label: 'EMEA',          cells: [{ value: 74, label: '74' }, { value: 82, label: '82' }, { value: 68, label: '68' }, { value: 59, label: '59' }] },
          { label: 'APAC',          cells: [{ value: 88, label: '88' }, { value: 55, label: '55' }, { value: 91, label: '91' }, { value: 77, label: '77' }] },
          { label: 'LATAM',         cells: [{ value: 45, label: '45' }, { value: 62, label: '62' }, { value: 38, label: '38' }, { value: 51, label: '51' }] }
        ],
        onCellClick: function (row, cell) {
          console.log('Market cell:', row.label, cell.label);
        }
      });
    }

    /* ============================================================
       VIEW: BOARD
    ============================================================ */
    function initBoard() {
      var container = document.getElementById('view-board');
      container.innerHTML = '';
      var wrap = document.createElement('div');
      wrap.className = 'board-wrap';
      container.appendChild(wrap);
      if (tableCtrl && tableCtrl.destroy) tableCtrl.destroy();
      tableCtrl = M.dataTable(wrap, {
        ariaLabel: 'Board strategic initiatives',
        stickyHeader: true,
        stripedRows: true,
        columns: [
          { key: 'initiative', label: 'Initiative', type: 'text',     sortable: true },
          { key: 'owner',      label: 'Owner',      type: 'text',     sortable: true },
          { key: 'role',       label: 'Role',       type: 'text' },
          { key: 'status',     label: 'Status',     type: 'status',   sortable: true },
          { key: 'budget',     label: 'Budget',     type: 'text',     sortable: true },
          { key: 'progress',   label: 'Progress',   type: 'progress' }
        ],
        data: BOARD_ITEMS,
        onRowClick: function (row) {
          openDetail({
            id: row.initiative,
            company: 'Board Initiative',
            project: row.initiative,
            state: row.status,
            owner: row.owner,
            pm: row.role,
            account: row.budget,
            start: '2026-01-01',
            end: '2026-12-31',
            progress: row.progress.value,
            description: row.initiative + ' — owned by ' + row.owner + ' (' + row.role + '). Allocated budget: ' + row.budget + '. Current progress: ' + row.progress.label + '.'
          });
        }
      });
    }

    /* ============================================================
       VIEW SWITCHING
    ============================================================ */
    function showView(id) {
      VIEW_IDS.forEach(function (vid) {
        var el = document.getElementById('view-' + vid);
        setClass(el, 'is-active', vid === id);
      });
      currentView = id;
      syncViewButtons();
      closeDetail();
      if (viewInited[id]) return;
      viewInited[id] = true;
      if (id === 'cockpit')   initCockpit();
      else if (id === 'portfolio') initPortfolio();
      else if (id === 'market')    initMarket();
      else if (id === 'board')     initBoard();
    }

    function syncViewButtons() {
      VIEW_IDS.forEach(function (id) {
        var btn = document.querySelector('[data-header-shell-action-id="' + id + '"]');
        setClass(btn, 'mn-header-shell__action--active', id === currentView);
      });
    }

    /* ============================================================
       FUNNEL SIDEBAR
    ============================================================ */
    document.getElementById('funnel-nav').addEventListener('click', function (e) {
      var btn = e.target;
      while (btn && btn !== this) {
        if (btn.classList && btn.classList.contains('funnel-card')) break;
        btn = btn.parentElement;
      }
      if (!btn || !btn.classList.contains('funnel-card')) return;
      var state = btn.getAttribute('data-state');
      if (!state) return;
      activeFilter = state;
      this.querySelectorAll('.funnel-card').forEach(function (card) {
        var on = card.getAttribute('data-state') === state;
        setClass(card, 'is-active', on);
        card.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      if (currentView === 'portfolio' && ganttCtrl && ganttCtrl.setTasks) {
        ganttCtrl.setTasks(filteredGanttTasks());
      } else {
        viewInited['portfolio'] = false;
      }
    });

    /* ============================================================
       HEADER (exact header-responsive-shell.js pattern)
    ============================================================ */
    function mountHeader() {
      var headerHost = document.createElement('mn-header-shell');
      headerHost.config = {
        ariaLabel: 'ConvergIO Executive navigation',
        sections: [
          {
            type: 'brand',
            label: 'ConvergIO Executive',
            logoSrc: '../src/assets/favicon.svg',
            logoAlt: 'ConvergIO mark',
            href: './index.html'
          },
          {
            type: 'actions',
            role: 'pre',
            presentation: 'segmented',
            items: [
              { id: 'cockpit',   label: 'Cockpit',   icon: icon('dashboard'), active: true },
              { id: 'portfolio', label: 'Portfolio', icon: icon('gantt') },
              { id: 'market',    label: 'Market',    icon: icon('heatmap') },
              { id: 'board',     label: 'Board',     icon: icon('table') }
            ]
          },
          {
            type: 'search',
            placeholder: 'Search engagements, accounts...',
            shortcut: 'Cmd+K',
            filterButtonLabel: 'Filters',
            filters: [
              {
                id: 'quarter',
                label: 'Quarter',
                options: [
                  { id: 'all', label: 'All Quarters' },
                  { id: 'Q1', label: 'Q1 2026' },
                  { id: 'Q2', label: 'Q2 2026' },
                  { id: 'Q3', label: 'Q3 2026' },
                  { id: 'Q4', label: 'Q4 2026' }
                ]
              }
            ]
          },
          {
            type: 'actions',
            role: 'post',
            presentation: 'cluster',
            items: [
              { id: 'notifications', title: 'Notifications', icon: icon('bell') },
              { id: 'messages',      title: 'Messages',      icon: icon('message') },
              { id: 'settings',      title: 'Settings',      icon: icon('settings') }
            ]
          },
          { type: 'divider' },
          { type: 'theme' },
          { type: 'profile', name: 'RD' }
        ],
        callbacks: {
          onAction: function (payload) {
            if (VIEW_IDS.indexOf(payload.id) !== -1) showView(payload.id);
          },
          onSearch: function (payload) {
            console.log('Search:', payload.query);
          },
          onFilter: function (payload) {
            console.log('Filter:', payload.groupId, payload.values);
          }
        }
      };
      navbar.textContent = '';
      navbar.appendChild(headerHost);
      headerCtrl = headerHost;

      var ready = typeof headerHost.whenReady === 'function'
        ? headerHost.whenReady()
        : Promise.resolve();
      ready.then(function () {
        if (!headerHost.isConnected) return;
        syncViewButtons();
      });
    }

    /* ============================================================
       INIT
    ============================================================ */
    mountHeader();
    showView('cockpit');

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        var inp = navbar.querySelector('.mn-header-shell__search-input');
        if (inp) inp.focus();
      }
    });

  }());
  </script>
</body>
</html>
